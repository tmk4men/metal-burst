<style>
  :root{ --bg:#0a1426; --tx:#eaf3ff; --tx2:#b8cce6; --c1:#5fd0ff; --c2:#ff7a8e; --gold:#ffd45e; }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
  html,body{ height:100%; background:var(--bg); overflow:hidden; font-family:"Exo 2",sans-serif; color:var(--tx2); }

  #stage canvas{ position:absolute; inset:0; width:100%; height:100%; }
  canvas#cv{ z-index:1; touch-action:none; background:#0c1830; image-rendering:pixelated; image-rendering:crisp-edges; }
  canvas#ui{ z-index:3; pointer-events:none; }   /* crisp full-res layer for HUD / text / controls — above the vignette */
  #stage::after{ content:""; position:absolute; inset:0; pointer-events:none; z-index:2;
    background:radial-gradient(130% 130% at 50% 40%, #0000 56%, #00000055 100%); }

  /* rotate gate */
  #rotate{ position:fixed; inset:0; z-index:60; display:none; flex-direction:column; align-items:center; justify-content:center;
    gap:14px; background:#070d18; text-align:center; }
  #rotate.show{ display:flex; }
  #rotate .phone{ width:74px; height:46px; border:3px solid var(--tx2); border-radius:9px; animation:rot 1.8s ease-in-out infinite; }
  @keyframes rot{ 0%,40%{ transform:rotate(0) } 60%,100%{ transform:rotate(-90deg) } }
  #rotate h2{ font-family:"Orbitron"; color:var(--tx); letter-spacing:3px; }

  /* overlay (home / result) */
  #overlay{ position:fixed; inset:0; z-index:40; display:flex; align-items:center; justify-content:center; text-align:center;
    overflow:auto; padding:16px;
    background:radial-gradient(120% 120% at 50% 30%, #112b4a 0%, #081223 60%, #060b16 100%); }
  #overlay.hide{ display:none; }
  .inner{ display:flex; flex-direction:column; align-items:center; gap:18px; padding:24px; margin:auto; max-width:560px; }
  #logo{ font-family:"Noto Sans JP",sans-serif; font-weight:900; font-size:clamp(40px,10vw,82px); letter-spacing:6px; color:var(--tx);

  #logo .b{ color:var(--c1); }

<body>
<div id="stage"><canvas id="cv"></canvas><canvas id="ui"></canvas></div>

<div id="rotate"><div class="phone"></div><h2>PLEASE ROTATE</h2><p>横画面（ヨコ向き）でプレイしてください</p></div>

<div id="overlay">
  <div class="inner">
    <div class="tagline" id="tagline">REAL-TIME SNOWBALL BATTLE</div>
    <div id="logo">雪<span class="b">合戦</span><span class="on">O N L I N E</span></div>
    <div id="resTitle" class="orb"></div>
    <div id="resSub"></div>
    <div class="btnrow">
      <button class="start orb" id="startBtn">はじめる</button>
      <button class="ghost orb" id="homeBtn" style="display:none">ホーム</button>
    </div>
    <div class="credit">プロトタイプ ／ 横画面・スマホ対応 ／ オリジナル作品</div>
  </div>
</div>

<script>
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const uic=document.getElementById('ui'), uctx=uic.getContext('2d');
let W=1280,H=720,VW=1280,VH=720,drawScale=1,uiScale=1,DPR=1; const ZOOM=1.5, PX=2;
function fitCanvas(){
  VW=Math.max(320,Math.floor(window.innerWidth));
  VH=Math.max(320,Math.floor(window.innerHeight));
  DPR=Math.min(window.devicePixelRatio||1, 2.5);
  W=Math.round(VW*ZOOM); H=Math.round(VH*ZOOM);
  const pw=Math.max(180,Math.round(VW/PX)), ph=Math.max(140,Math.round(VH/PX));
  cv.width=pw; cv.height=ph; drawScale=pw/W;
  uic.width=Math.round(VW*DPR); uic.height=Math.round(VH*DPR); uiScale=uic.width/W;   // world coords -> crisp device px
}
window.addEventListener('resize',()=>{ fitCanvas(); buildWorld(); layoutUI(); checkRotate();
  for(const r of P){ r.x=Math.max(18,Math.min(r.x,W-18)); r.y=groundY(r.x)-FOOT; r.vx=r.vy=0; r.grounded=true; } });

/* ---------- constants ---------- */
const GRAV=0.42;          // body gravity (jump/fall) — heavier = more grounded
const BALL_GRAV=0.24;     // snowball gravity — separate so snowballs stay floaty/slow
const JUMP_V=-7.4;        // jump impulse (lower = heavier, less floaty)
const MAXBALL=3;          // snowballs carried
const WIN_HITS=3;         // HP per round (hits to KO)
const ROUNDS_TO_WIN=2;    // best-of-3 match
const THROW_CD=14;        // frames between throws
const PACK_FRAMES=26;     // frames to pack one snowball
const CHARGE_MAX=46;      // frames to reach full charge
const STUN_FRAMES=26;     // hit stun
const JUMP_THRESH=0.55;   // fraction of pad radius for a jump flick
const PADR=()=> Math.max(60, Math.min(W,H)*0.15);

/* ---------- progression / rounds ---------- */
let stage=1, round=1, roundWins=[0,0], introT=0, banner='', bannerT=0;
/* ---------- field items (special snowballs) ---------- */
const ITEMS=[ {id:'big',name:'大玉',col:'#ff9d5c'}, {id:'rapid',name:'連射',col:'#9dff6b'}, {id:'freeze',name:'凍結',col:'#7ad7ff'} ];
const BUFF_T=360;         // buff duration (frames ~6s)
let items=[], itemTimer=360;
/* ---------- stage themes (background changes per stage) ---------- */
const THEMES=[
  {sky:['#0b1830','#13243f','#1b3354'], aur:['120,255,190','130,200,255'], moon:'#eef5ff', name:'NIGHT'},
  {sky:['#181033','#281a44','#3a2656'], aur:['200,150,255','255,170,220'], moon:'#ffe9f5', name:'TWILIGHT'},
  {sky:['#2a1326','#3c1f30','#5a3550'], aur:['255,175,120','255,120,150'], moon:'#fff0e0', name:'DUSK'},
  {sky:['#08221f','#0e3330','#16463f'], aur:['120,255,190','150,255,210'], moon:'#e8fff5', name:'AURORA'},
  {sky:['#090e22','#121a3a','#1d2a55'], aur:['150,180,255','120,150,255'], moon:'#eef2ff', name:'MIDNIGHT'},
];
let theme=THEMES[0];
function applyTheme(s){ theme=THEMES[(s-1)%THEMES.length]; }
function aiParams(){ return {
  err: Math.max(0.012, 0.07 - stage*0.009),         // aim gets tighter with stage
  throwChance: Math.min(0.11, 0.035 + stage*0.012), // throws more often
  dodge: Math.min(0.85, 0.4 + stage*0.09),          // dodges more
  chargeBias: Math.min(38, 14 + stage*4) }; }        // charges harder

/* ---------- audio ---------- */
let AC=null; const actx=()=>{ if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } return AC; };
function beep(f,d,t='sine',v=.18,slide=0){ const a=actx(); if(!a)return; const o=a.createOscillator(),g=a.createGain();
  o.type=t; o.frequency.value=f; if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(40,f+slide),a.currentTime+d);
  g.gain.value=v; g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+d); o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime+d); }
function sfxThrow(p){ beep(520+p*240,0.12,'triangle',0.12,-220); }
function sfxPof(){ const a=actx(); if(!a)return; const b=a.createBuffer(1,2600,a.sampleRate),d=b.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2.2); const s=a.createBufferSource(); s.buffer=b;
  const g=a.createGain(); g.gain.value=0.3; g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+0.16); s.connect(g); g.connect(a.destination); s.start(); }
function sfxPack(){ beep(180,0.07,'square',0.07,60); }
function sfxWin(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.18,'triangle',0.14),i*110)); }
function sfxLose(){ [392,330,262].forEach((f,i)=>setTimeout(()=>beep(f,0.22,'sine',0.14),i*150)); }

/* ---------- world ---------- */
let ground=new Float32Array(2), GSTEP=8;   // heightmap: surface y sampled every GSTEP px
let snowDepth=new Float32Array(2);         // 0..1 packable snow at each sample (0 = bare ice)
let snowMax=new Float32Array(2);           // regrow target per sample
let mounds=[];       // cover: {x,y,r,hp,max}
let snowflakes=[];   // bg particles
let bgHills=[], trees=[], cabins=[], townLights=[];
let snowPiles=[];    // discrete, clearly-marked refill spots {x,r}
let wind=0;

function groundY(x){ const i=Math.max(0,Math.min(ground.length-1,x/GSTEP)); const i0=i|0, f=i-i0;
  const a=ground[i0], b=ground[Math.min(ground.length-1,i0+1)]; return a+(b-a)*f; }
const sidx=x=>Math.max(0,Math.min(snowDepth.length-1,(x/GSTEP)|0));
function snowAt(x){ return snowDepth[sidx(x)]; }
function canPackAt(x){ return snowAt(x)>0.3; }
function depleteSnow(x,amt){ const i=sidx(x); for(let k=-2;k<=2;k++){ const j=i+k; if(j>=0&&j<snowDepth.length) snowDepth[j]=Math.max(0,snowDepth[j]-amt*(k===0?1:0.5)); } }
function regrowSnow(){ for(let i=0;i<snowDepth.length;i++){ if(snowDepth[i]<snowMax[i]) snowDepth[i]=Math.min(snowMax[i],snowDepth[i]+0.0009); } }
function nearestSnowX(from){ let best=null,bd=1e9, any=null,ad=1e9;   // prefer a pile that still has snow; fall back to nearest pile
  for(const p of snowPiles){ const d=Math.abs(p.x-from);
    if(d<ad){ad=d;any=p.x;}
    if(snowDepth[sidx(p.x)]>0.32 && d<bd){bd=d;best=p.x;} }
  return best!=null?best:any; }

function buildWorld(){
  const n=Math.ceil(W/GSTEP)+2; ground=new Float32Array(n);
  const base=H*0.58;   // battlefield floor raised so the bottom band is free for the control pads
  for(let i=0;i<n;i++){ const x=i*GSTEP;
    ground[i]=base - 26*Math.sin(x*0.0042+1.1) - 14*Math.sin(x*0.011+0.4) - 8*Math.sin(x*0.02+2.0); }
  // reload ONLY at discrete, clearly-marked snow piles — the rest of the ground is packed (no reload)
  snowMax=new Float32Array(n); snowDepth=new Float32Array(n);
  snowPiles=[]; [0.13,0.37,0.63,0.87].forEach(fx=>{ snowPiles.push({x:W*fx, r:Math.max(34,W*0.035)}); });
  for(const p of snowPiles){ const c=(p.x/GSTEP)|0, rad=Math.max(2,(p.r/GSTEP)|0);
    for(let k=-rad;k<=rad;k++){ const j=c+k; if(j>=0&&j<n){ const f=1-Math.abs(k)/rad; const v=0.85+0.15*f; if(v>snowMax[j]){ snowMax[j]=v; snowDepth[j]=v; } } } }
  // cover mounds (snow forts) — a few between the players
  mounds=[];
  const my=(fx)=>groundY(W*fx);
  [0.30,0.5,0.70].forEach((fx,k)=>{ const r=k===1?46:38; mounds.push({x:W*fx,y:my(fx)-r*0.35,r,hp:1,max:1}); });
  // background snowy hills
  bgHills=[]; for(let layer=0;layer<3;layer++){ const pts=[],step=40,amp=40+layer*26,off=H*(0.40+layer*0.05);
    for(let x=0;x<=W+step;x+=step) pts.push(off - amp*(0.5+0.5*Math.sin(x*0.003*(1+layer*0.4)+layer*2)));
    bgHills.push({pts,step,y:off,shade:layer}); }
  // snowy pines (background decoration, non-colliding)
  trees=[]; for(let t=0;t<7;t++){ const x=W*(0.08+t*0.13)+ (t%2?20:-20); const h=46+(t%3)*16; trees.push({x,gy:groundY(x),h,scale:0.8+(t%3)*0.18}); }
  // distant village on the far hillside: cabins + flickering town lights
  cabins=[]; [0.13,0.21,0.61,0.69].forEach((fx,i)=>{ const w=13+(i%2)*7; cabins.push({x:W*fx,y:H*0.53,w,h:w*0.85}); });
  townLights=[]; for(let i=0;i<26;i++) townLights.push({x:W*(0.07+Math.random()*0.8), y:H*(0.40+Math.random()*0.12), tw:Math.random()*7});
  // snowfall
  snowflakes=[]; for(let i=0;i<90;i++) snowflakes.push({x:Math.random()*W,y:Math.random()*H,r:0.6+Math.random()*1.8,sp:0.4+Math.random()*1.1,sw:Math.random()*7});
}

/* ---------- entities ---------- */
function makePlayer(side){ const x=side===0?W*0.14:W*0.86;
  return {side,x,y:groundY(x)-FOOT,vx:0,vy:0,grounded:true,balls:MAXBALL,
          cd:0,stun:0,frozenT:0,packing:0,packAcc:0,charge:0,charging:false,aimX:side===0?1:-1,aimY:-0.4,
          throwAnim:0,hits:0,flash:0,face:side===0?1:-1,
          bigT:0,rapidT:0,freezeT:0}; }   // power-up timers
const FOOT=20;            // body origin is FOOT px above the ground surface
let P=[], balls=[], puffs=[], tick=0, playing=false, over=false;

/* ---------- input (floating twin-pads + pack button) ---------- */
const pad={move:{active:false,id:-1,bx:0,by:0,tx:0,ty:0}, aim:{active:false,id:-1,bx:0,by:0,tx:0,ty:0}};
let packBtn={x:0,y:0,r:0,held:false,id:-1};
function layoutUI(){ packBtn.r=Math.max(34,Math.min(W,H)*0.072); packBtn.x=W/2; packBtn.y=H-packBtn.r-10; }
function toWorld(e){ const r=cv.getBoundingClientRect(); return { x:(e.clientX-r.left)*(W/r.width), y:(e.clientY-r.top)*(H/r.height) }; }
function inPack(p){ return Math.hypot(p.x-packBtn.x,p.y-packBtn.y)<=packBtn.r; }

function onDown(e){ if(!playing||introT>0)return; const p=toWorld(e);
  if(inPack(p) && !packBtn.held){ packBtn.held=true; packBtn.id=e.pointerId; e.preventDefault(); return; }
  const which = p.x < W/2 ? 'move' : 'aim'; const pd=pad[which];
  if(pd.active) return;
  // anchor the pad base inside the bottom control band so its ring never covers the battlefield
  const by=Math.max(p.y, H-PADR()-12);
  pd.active=true; pd.id=e.pointerId; pd.bx=pd.tx=p.x; pd.by=pd.ty=by;
  if(which==='aim'){ const me=P[0]; me.charging=true; me.charge=0; }
  e.preventDefault();
}
function onMove(e){ const p=toWorld(e);
  for(const k of ['move','aim']){ const pd=pad[k]; if(pd.active&&pd.id===e.pointerId){ pd.tx=p.x; pd.ty=p.y; e.preventDefault(); } } }
function onUp(e){
  if(packBtn.held&&packBtn.id===e.pointerId){ packBtn.held=false; packBtn.id=-1; }
  for(const k of ['move','aim']){ const pd=pad[k]; if(pd.active&&pd.id===e.pointerId){
    if(k==='aim') releaseThrow();
    pd.active=false; pd.id=-1; } } }
cv.addEventListener('pointerdown',onDown);
window.addEventListener('pointermove',onMove,{passive:false});
window.addEventListener('pointerup',onUp); window.addEventListener('pointercancel',onUp);
// keyboard (desktop testing)
const keys={};
window.addEventListener('keydown',e=>{ keys[e.key]=true; if(e.key===' ')e.preventDefault(); });
window.addEventListener('keyup',e=>{ keys[e.key]=false; });

function resetInput(){ pad.move.active=pad.aim.active=false; pad.move.id=pad.aim.id=-1; packBtn.held=false; packBtn.id=-1; }
function releaseThrow(){ const me=P[0]; if(!me||over||!playing){ if(me){me.charging=false;me.charge=0;} return; }
  const was=me.charging; me.charging=false;
  if(!was){ me.charge=0; return; }
  const v=aimVec();
  if(v.frac<0.08 && me.charge<6){ me.charge=0; return; }   // ignore accidental quick taps (no aim & no real charge)
  const ang = v.frac>=0.08 ? v.ang : aimAtFoe(me);   // tiny/no drag -> auto-aim a lobbed shot at the opponent
  if(me.balls>0 && me.cd<=0 && me.stun<=0 && me.packing<=0){ throwBall(me, ang, me.charge/CHARGE_MAX); }
  me.charge=0;
}
function aimAtFoe(me){ const foe=P[1-me.side]; const dir=(foe&&foe.x<me.x)?-1:1;
  const dist=foe?Math.abs(foe.x-me.x):W*0.3; const up=Math.min(0.95,0.4+dist/W*0.6);
  return Math.atan2(-up, dir); }
function aimVec(){ const a=pad.aim; if(!a.active) return {ang:0,frac:0};
  let dx=a.tx-a.bx, dy=a.ty-a.by; const len=Math.hypot(dx,dy); const R=PADR();
  const frac=Math.min(1,len/R); return {ang:Math.atan2(dy,dx),frac}; }

/* ---------- throwing ---------- */
function throwBall(p, ang, chargeFrac){
  let power=4.5 + chargeFrac*7.5;                // 4.5 (tap) .. 12 (full charge) launch speed
  let size=3.2 + chargeFrac*3.6, charged=chargeFrac>0.66, big=false, freeze=false;
  if(p.bigT>0){ size*=1.9; power*=1.12; big=true; charged=true; }
  if(p.freezeT>0) freeze=true;
  const sx=p.x+Math.cos(ang)*16, sy=p.y-8+Math.sin(ang)*16;
  balls.push({x:sx,y:sy,vx:Math.cos(ang)*power,vy:Math.sin(ang)*power,r:size,dmg:1,
              side:p.side,life:0,charged,big,freeze,trail:[]});
  p.balls--; p.cd = p.rapidT>0?5:THROW_CD; p.throwAnim=1; p.face=Math.cos(ang)>=0?1:-1;
  sfxThrow(chargeFrac);
}

function stepBalls(){
  for(let i=balls.length-1;i>=0;i--){ const b=balls[i];
    b.vy+=BALL_GRAV; b.vx+=wind*0.04; b.x+=b.vx; b.y+=b.vy; b.life++;
    b.trail.push({x:b.x,y:b.y}); if(b.trail.length>7)b.trail.shift();
    // out of bounds
    if(b.x<-40||b.x>W+40||b.y>H+40){ balls.splice(i,1); continue; }
    // hit a mound (cover)
    let hitCover=false;
    for(const m of mounds){ if(Math.hypot(b.x-m.x,b.y-m.y)<m.r*0.62+b.r){ m.hp-=b.big?1.0:(b.charged?0.5:0.28); puff(b.x,b.y,'#dbe8ff',b.r); if(!b.big){ sfxPof(); hitCover=true; } break; } }
    if(hitCover){ balls.splice(i,1); continue; }
    // hit ground
    if(b.y>=groundY(b.x)-2){ puff(b.x,groundY(b.x)-2,'#eaf4ff',b.r); balls.splice(i,1); continue; }
    // hit opponent
    const foe=P[1-b.side]; if(foe && foe.stun<=0){ const hx=foe.x, hy=foe.y-8;
      if(Math.hypot(b.x-hx,b.y-hy)<12+b.r){ hitPlayer(foe,b); balls.splice(i,1); continue; } }
  }
  mounds=mounds.filter(m=>{ if(m.hp<=0){ puff(m.x,m.y,'#dbe8ff',m.r*0.8); return false; } return true; });
}
function hitPlayer(foe,b){ if(over||winner>=0)return;
  foe.stun = b.freeze?STUN_FRAMES*2:STUN_FRAMES; if(b.freeze)foe.frozenT=STUN_FRAMES*2; foe.flash=1;
  foe.vx+=Math.sign(b.vx)*(b.big?9:b.charged?6.5:3.6); foe.vy-=b.big?3.4:2.6;
  const tcol = b.side===0?'#5fd0ff':'#ff7a8e';
  P[b.side].hits++; shake=Math.max(shake,b.big?15:b.charged?12:8); hitstop=b.big?10:b.charged?8:5;
  puff(foe.x,foe.y-8, b.freeze?'#bfe8ff':'#ffffff', b.big?14:b.charged?11:7); pushFloater(foe.x,foe.y-26,'+1',tcol); sfxPof();
  if(P[b.side].hits>=WIN_HITS){ winner=b.side; hitstop=18; shake=16;
    pushFloater(foe.x,foe.y-26,'K.O.','#fff'); setTimeout(()=>endRound(winner),650); } }
/* ---------- field items + buffs ---------- */
function tickBuffs(p){ if(p.bigT>0)p.bigT--; if(p.rapidT>0)p.rapidT--; if(p.freezeT>0)p.freezeT--; if(p.frozenT>0)p.frozenT--; }
function stepItems(){ if(--itemTimer<=0 && items.length<2){ spawnItem(); itemTimer=460+(Math.random()*360|0); }
  for(let i=items.length-1;i>=0;i--){ const it=items[i]; it.life--; it.bob+=0.06; if(it.life<=0)items.splice(i,1); } }
function spawnItem(){ const t=ITEMS[(Math.random()*ITEMS.length)|0]; const x=W*(0.25+Math.random()*0.5);
  items.push({id:t.id,col:t.col,name:t.name,x,y:groundY(x)-30,life:600,bob:Math.random()*6}); }
function pickupItems(p){ for(let i=items.length-1;i>=0;i--){ const it=items[i];
  if(Math.hypot(p.x-it.x,(p.y-10)-it.y)<24){ applyItem(p,it.id); items.splice(i,1); } } }
function applyItem(p,id){ if(id==='big')p.bigT=BUFF_T; else if(id==='rapid')p.rapidT=BUFF_T; else if(id==='freeze')p.freezeT=BUFF_T;
  const it=ITEMS.find(x=>x.id===id); pushFloater(p.x,p.y-30,it.name+'!', it.col); sfxPack(); }
function drawItems(){ for(const it of items){ const yy=it.y+Math.sin(it.bob)*3;
  ctx.save(); ctx.globalCompositeOperation='lighter';
  const g=ctx.createRadialGradient(it.x,yy,1,it.x,yy,20); g.addColorStop(0,it.col+'aa'); g.addColorStop(1,it.col+'00');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(it.x,yy,20,0,7); ctx.fill(); ctx.restore();
  ctx.lineWidth=2; ctx.strokeStyle='#0b1830'; ctx.fillStyle='#ffffff'; ctx.beginPath(); ctx.arc(it.x,yy,10,0,7); ctx.fill(); ctx.stroke();
  ctx.lineWidth=3; ctx.strokeStyle=it.col; ctx.beginPath(); ctx.arc(it.x,yy,11.5,0,7); ctx.stroke();
  ctx.fillStyle=it.col;
  if(it.id==='big'){ ctx.beginPath(); ctx.arc(it.x,yy,5,0,7); ctx.fill(); }
  else if(it.id==='rapid'){ for(let k=-1;k<=1;k++){ ctx.beginPath(); ctx.arc(it.x+k*4,yy,2,0,7); ctx.fill(); } }
  else { ctx.beginPath(); ctx.moveTo(it.x,yy-5.5); ctx.lineTo(it.x+5.5,yy); ctx.lineTo(it.x,yy+5.5); ctx.lineTo(it.x-5.5,yy); ctx.closePath(); ctx.fill(); }
}}
function pushFloater(x,y,text,col){ floaters.push({x,y,vy:-0.9,life:1,text,col}); }
function stepFloaters(){ for(let i=floaters.length-1;i>=0;i--){ const f=floaters[i]; f.y+=f.vy; f.vy*=0.95; f.life-=0.016; if(f.life<=0)floaters.splice(i,1); } }
function drawFloaters(){ uctx.textAlign='center';
  for(const f of floaters){ uctx.globalAlpha=Math.min(1,f.life*1.5); uctx.fillStyle=f.col;
    uctx.font='800 '+(f.text.length>2?16:20)+'px Orbitron,sans-serif'; uctx.shadowColor='rgba(2,8,18,.8)'; uctx.shadowBlur=5;
    uctx.fillText(f.text,f.x,f.y-(1-f.life)*8); }
  uctx.shadowBlur=0; uctx.globalAlpha=1; }

/* ---------- particles ---------- */
function puff(x,y,c,r){ for(let i=0;i<6+r|0;i++){ const a=Math.random()*7,s=0.5+Math.random()*2.4;
  puffs.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-0.6,life:1,c,r:1+Math.random()*r*0.4}); } }
function stepPuffs(){ for(let i=puffs.length-1;i>=0;i--){ const p=puffs[i]; p.vy+=0.12; p.x+=p.vx; p.y+=p.vy; p.vx*=0.96; p.life-=0.045;
  if(p.life<=0)puffs.splice(i,1); } }
let shake=0, hitstop=0, winner=-1, floaters=[];

/* ---------- player physics & control ---------- */
function controlHuman(){ const me=P[0]; if(!me||over)return;
  tickBuffs(me); pickupItems(me);
  // movement from move pad (or keyboard)
  let mvx=0, jump=false;
  const m=pad.move;
  if(m.active){ const dx=m.tx-m.bx, dy=m.ty-m.by, R=PADR(); const len=Math.hypot(dx,dy);
    if(len>R*0.12) mvx=Math.max(-1,Math.min(1,dx/R));
    if(-dy > R*JUMP_THRESH) jump=true; }
  if(keys['ArrowLeft']||keys['a'])mvx=-1; if(keys['ArrowRight']||keys['d'])mvx=1;
  if(keys['ArrowUp']||keys['w']||keys[' '])jump=true;
  // packing (refill) — hold center button while grounded AND standing on deep snow
  const onSnow=canPackAt(me.x);
  const wantPack = (packBtn.held||keys['Shift']) && me.grounded && me.balls<MAXBALL && onSnow;
  me.packing = wantPack ? me.packing+1 : 0;
  if(wantPack){ mvx=0; me.charging=false; me.charge=0; me.packAcc++; depleteSnow(me.x,0.003);   // packing cancels any wind-up
    if(me.packAcc>=PACK_FRAMES){ me.packAcc=0; me.balls++; sfxPack(); puff(me.x,me.y+12,'#ffffff',5); depleteSnow(me.x,0.05); } }
  else me.packAcc=Math.max(0,me.packAcc-2);
  // safety: if the aim pointer was lost (no pointerup), don't leave the player stuck charging/slowed
  if(me.charging && !pad.aim.active){ me.charging=false; me.charge=0; }
  // charge build-up while aiming
  if(me.charging && me.balls>0 && me.stun<=0 && me.packing<=0) me.charge=Math.min(CHARGE_MAX,me.charge+1);
  applyMove(me,mvx,jump,me.charging);
  if(me.cd>0)me.cd--;
}
function applyMove(p,mvx,jump,charging){
  if(p.stun>0){ p.stun--; mvx=0; jump=false; }
  const maxs = charging?1.9:3.4;            // top walking speed (slower); even slower while winding up
  p.vx += (mvx*maxs - p.vx)*0.13;           // ease toward target -> weighty start/stop inertia
  if(Math.abs(p.vx)<0.03)p.vx=0;
  if(Math.abs(mvx)>0.05)p.face=mvx>0?1:-1;
  if(jump && p.grounded){ p.vy=JUMP_V; p.grounded=false; }
  p.vy+=GRAV; p.x+=p.vx; p.y+=p.vy;
  p.x=Math.max(18,Math.min(W-18,p.x));
  const gy=groundY(p.x)-FOOT;
  if(p.y>=gy){ p.y=gy; p.vy=0; p.grounded=true; } else p.grounded=false;
  if(p.throwAnim>0)p.throwAnim=Math.max(0,p.throwAnim-0.08);
  if(p.flash>0)p.flash=Math.max(0,p.flash-0.08);
}

/* ---------- COM AI ---------- */
let ai={think:0,wantThrow:false,throwAng:0,chargeT:0,moveDir:0,moveT:0,dodgeT:0};
function controlAI(){ const me=P[1], foe=P[0]; if(!me||over)return;
  tickBuffs(me); pickupItems(me);
  const AP=aiParams();
  if(me.cd>0)me.cd--;
  if(me.stun>0){ applyMove(me,0,false,false); return; }
  let mvx=0, jump=false, charging=false;

  // refill when empty — must reach deep snow first
  if(me.balls===0){
    if(canPackAt(me.x)){ me.packing++; me.packAcc++; depleteSnow(me.x,0.003);
      if(me.packAcc>=PACK_FRAMES){ me.packAcc=0; me.balls++; depleteSnow(me.x,0.05); }
      applyMove(me,0,false,false); }
    else { const sx=nearestSnowX(me.x); const dir=sx==null?0:(sx<me.x?-1:1); me.packAcc=0; me.packing=0; applyMove(me,dir,false,false); }
    maybeDodge(me,foe); return; }
  else { me.packing=0; }

  // dodge incoming
  const inc=incoming(me);
  if(inc){ if(me.grounded && Math.random()<AP.dodge){ jump=true; } me.moveDir = inc.vx>0?-1:1; me.moveT=14; }

  // positioning toward ideal range
  const ideal=W*0.42, dist=Math.abs(foe.x-me.x);
  if(me.moveT>0){ me.moveT--; mvx=me.moveDir; }
  else if(--ai.think<=0){ ai.think=24+(Math.random()*30|0);
    if(dist>ideal*1.25) me.moveDir=(foe.x<me.x?-1:1);
    else if(dist<ideal*0.7) me.moveDir=(foe.x<me.x?1:-1);
    else me.moveDir=Math.random()<0.5?0:(Math.random()<0.5?-1:1);
    me.moveT=16+(Math.random()*22|0); }
  else mvx=me.moveDir;

  // aim + charge + throw
  if(!ai.wantThrow && me.cd<=0 && Math.random()<AP.throwChance){ const plan=aimAt(me,foe); if(plan){ ai.wantThrow=true; ai.throwAng=plan.ang; ai.throwPw=plan.pw; ai.chargeT=8+(Math.random()*AP.chargeBias|0); } }
  if(ai.wantThrow){ charging=true; mvx*=0.4; if(--ai.chargeT<=0){
      const cf=Math.max(0,Math.min(1,(ai.throwPw-4.5)/7.5 + (Math.random()*2-1)*0.12));  // power matches the aimed shot
      throwBall(me, ai.throwAng + (Math.random()*2-1)*AP.err, cf); ai.wantThrow=false; } }

  applyMove(me,mvx,jump,charging);
}
function maybeDodge(me,foe){ const inc=incoming(me); if(inc&&me.grounded&&Math.random()<0.3){ me.vy=-8.2; me.grounded=false; } }
function incoming(me){ for(const b of balls){ if(b.side===me.side)continue;
  const dx=me.x-b.x; if(Math.sign(dx)!==Math.sign(b.vx))continue; if(Math.abs(dx)<150 && Math.abs(b.y-(me.y-8))<90) return b; } return null; }
function aimAt(me,foe){ const dir=foe.x<me.x?-1:1; let best=null;
  for(let ang=12;ang<78;ang+=4){ const a=ang*Math.PI/180;
    for(let pw=4.5;pw<=12;pw+=1){ const vx=dir*Math.cos(a)*pw, vy=-Math.sin(a)*pw; const d=simShot(me.x,me.y,vx,vy);
      if(best===null||d<best.d) best={ang:Math.atan2(vy,vx),d,pw}; } }
  return best?{ang:best.ang,pw:best.pw}:null; }
function simShot(sx,sy,vx,vy){ const foe=P[0]; let x=sx+Math.cos(Math.atan2(vy,vx))*16,y=sy-8,md=1e9;
  for(let t=0;t<260;t++){ vy+=BALL_GRAV; vx+=wind*0.04; x+=vx; y+=vy; const d=Math.hypot(x-foe.x,y-(foe.y-8)); if(d<md)md=d;
    for(const m of mounds){ if(Math.hypot(x-m.x,y-m.y)<m.r*0.62){ return md+60; } }
    if(x<0||x>W||y>groundY(x))break; } return md; }

/* ---------- render ---------- */
function draw(){
  ctx.setTransform(drawScale,0,0,drawScale,0,0); ctx.imageSmoothingEnabled=false;
  ctx.save();
  if(shake>0.4){ ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake); shake*=0.86; } else shake=0;
  // sky (theme-tinted per stage)
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,theme.sky[0]); g.addColorStop(.5,theme.sky[1]); g.addColorStop(1,theme.sky[2]);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  drawAurora();
  // moon
  const mx=W*0.8,myy=H*0.22,mr=Math.min(W,H)*0.07;
  const halo=ctx.createRadialGradient(mx,myy,mr*0.5,mx,myy,mr*3); halo.addColorStop(0,'#cfe2ff33'); halo.addColorStop(1,'#0000');
  ctx.fillStyle=halo; ctx.beginPath(); ctx.arc(mx,myy,mr*3,0,7); ctx.fill();
  ctx.fillStyle=theme.moon; ctx.beginPath(); ctx.arc(mx,myy,mr,0,7); ctx.fill();
  ctx.fillStyle='#cdd9ee'; ctx.beginPath(); ctx.arc(mx-mr*0.3,myy-mr*0.2,mr*0.5,0,7); ctx.fill();
  ctx.fillStyle=theme.sky[0]; ctx.beginPath(); ctx.arc(mx-mr*0.55,myy-mr*0.35,mr*0.9,0,7); ctx.fill();
  // bg hills (back->front) with depth, distant village nestled between ridges
  drawHill(bgHills[0],0); drawHill(bgHills[1],1); drawHill(bgHills[2],2);
  // horizon haze separates the ridges and makes the front one pop
  const hz=ctx.createLinearGradient(0,H*0.40,0,H*0.58); hz.addColorStop(0,'#1a2b4a00'); hz.addColorStop(1,'#1a2b4a55');
  ctx.fillStyle=hz; ctx.fillRect(0,H*0.40,W,H*0.18);
  drawVillage();
  // trees (behind ground line)
  for(const tr of trees) drawPine(tr);
  // ground — packed snow (plain, muted) so the bright refill piles clearly stand out
  const gg=ctx.createLinearGradient(0,H*0.54,0,H); gg.addColorStop(0,'#9fb2cc'); gg.addColorStop(1,'#7d92b0');
  ctx.fillStyle=gg; ctx.beginPath(); ctx.moveTo(0,H); let gx=0;
  for(let i=0;i<ground.length;i++){ ctx.lineTo(gx,ground[i]); gx+=GSTEP; } ctx.lineTo(W,H); ctx.closePath(); ctx.fill();
  // thin lighter crust line along the surface
  ctx.strokeStyle='#bccbe0'; ctx.lineWidth=2.5; ctx.beginPath(); gx=0;
  for(let i=0;i<ground.length;i++){ i?ctx.lineTo(gx,ground[i]):ctx.moveTo(gx,ground[i]); gx+=GSTEP; } ctx.stroke();
  // refill snow piles — bright, glowing, clearly marked
  for(const p of snowPiles) drawSnowPile(p);
  // mounds (cover forts) — muted blue so they don't look like refill piles
  for(const m of mounds){ ctx.fillStyle='#c4d3e8'; ctx.beginPath(); ctx.ellipse(m.x,m.y+m.r*0.35,m.r,m.r*0.8,0,Math.PI,0); ctx.fill();
    ctx.fillStyle='#aebfd8'; ctx.beginPath(); ctx.ellipse(m.x+m.r*0.3,m.y+m.r*0.4,m.r*0.6,m.r*0.5,0,Math.PI,0); ctx.fill();
    ctx.globalAlpha=0.5; ctx.fillStyle='#9fb0cc'; ctx.fillRect(m.x-m.r,m.y+m.r*0.3,m.r*2,2); ctx.globalAlpha=1; }
  // field items (power-ups)
  drawItems();
  // snowfall
  ctx.fillStyle='#ffffff';
  for(const f of snowflakes){ f.y+=f.sp; f.x+=wind*0.5+Math.sin(tick*0.02+f.sw)*0.3; if(f.y>H){f.y=-4;f.x=Math.random()*W;} if(f.x<0)f.x+=W; if(f.x>W)f.x-=W;
    ctx.globalAlpha=0.5+0.4*Math.sin(tick*0.05+f.sw); ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,7); ctx.fill(); }
  ctx.globalAlpha=1;
  // players
  for(const p of P) drawPlayer(p);
  // snowballs
  for(const b of balls){ ctx.strokeStyle='#bcd6f5'; ctx.lineWidth=Math.max(1,b.r*0.5); ctx.beginPath();
    b.trail.forEach((t,i)=> i?ctx.lineTo(t.x,t.y):ctx.moveTo(t.x,t.y)); ctx.globalAlpha=0.4; ctx.stroke(); ctx.globalAlpha=1;
    if(b.charged){ ctx.shadowColor='#bfe2ff'; ctx.shadowBlur=8; }
    ctx.fillStyle='#ffffff'; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,7); ctx.fill();
    ctx.fillStyle='#d6e6fb'; ctx.beginPath(); ctx.arc(b.x+b.r*0.3,b.y+b.r*0.3,b.r*0.45,0,7); ctx.fill(); ctx.shadowBlur=0; }
  // puffs
  for(const p of puffs){ ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.c; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fill(); }
  ctx.globalAlpha=1;
  // aim preview + pads + pack button (human)
  ctx.restore();
  drawUI();
}

/* ---------- aurora ---------- */
function drawAurora(){ ctx.save(); ctx.globalCompositeOperation='lighter';
  const bands=[{c:theme.aur[0],base:H*0.12,amp:20,h:H*0.22,k:0.0045,sp:0.010,ph:0.0,a:0.10},
               {c:theme.aur[1],base:H*0.18,amp:28,h:H*0.28,k:0.0060,sp:0.007,ph:2.2,a:0.085}];
  for(const b of bands){
    const top=x=> b.base + Math.sin(x*b.k+tick*b.sp+b.ph)*b.amp + Math.sin(x*b.k*2.4+tick*b.sp*1.7)*b.amp*0.35;
    ctx.beginPath(); ctx.moveTo(0,top(0)); for(let x=0;x<=W;x+=22) ctx.lineTo(x,top(x));
    for(let x=W;x>=0;x-=22) ctx.lineTo(x,top(x)+b.h); ctx.closePath();
    const g=ctx.createLinearGradient(0,b.base-b.amp,0,b.base+b.h);
    g.addColorStop(0,'rgba('+b.c+',0)'); g.addColorStop(0.4,'rgba('+b.c+','+b.a+')'); g.addColorStop(1,'rgba('+b.c+',0)');
    ctx.fillStyle=g; ctx.fill();
    // shimmering vertical streaks
    for(let x=18;x<W;x+=44){ const ty=top(x); ctx.strokeStyle='rgba('+b.c+','+(b.a*0.7)+')'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(x,ty); ctx.lineTo(x+Math.sin(tick*0.012+x)*4,ty+b.h*0.7); ctx.stroke(); }
  }
  ctx.restore();
}
/* ---------- hills / village ---------- */
function drawHill(h,i){ const hcol=[['#16294a','#1d3354'],['#1e3a5e','#274a72'],['#274d78','#356290']];
  const minY=Math.min.apply(null,h.pts);
  const g=ctx.createLinearGradient(0,minY,0,H); g.addColorStop(0,hcol[i][1]); g.addColorStop(1,hcol[i][0]);
  ctx.fillStyle=g; ctx.beginPath(); ctx.moveTo(0,H); let x=0; for(const py of h.pts){ ctx.lineTo(x,py); x+=h.step; } ctx.lineTo(W,H); ctx.closePath(); ctx.fill();
  // snow cap / rim light along ridge
  ctx.fillStyle='#dbe8fb'; ctx.globalAlpha=0.4+i*0.2; ctx.beginPath(); x=0; ctx.moveTo(0,h.pts[0]);
  for(const py of h.pts){ ctx.lineTo(x,py); x+=h.step; }
  let xx=W; for(let k=h.pts.length-1;k>=0;k--){ ctx.lineTo(xx,h.pts[k]+5+i*2); xx-=h.step; } ctx.closePath(); ctx.fill(); ctx.globalAlpha=1;
}
function drawVillage(){
  for(const c of cabins){ ctx.fillStyle='#27324c'; ctx.fillRect(c.x-c.w/2,c.y-c.h,c.w,c.h);
    ctx.fillStyle='#1c2740'; ctx.fillRect(c.x,c.y-c.h,c.w/2,c.h);                 // shaded side
    ctx.fillStyle='#e6f0ff'; ctx.beginPath(); ctx.moveTo(c.x-c.w/2-2,c.y-c.h); ctx.lineTo(c.x,c.y-c.h-c.h*0.7); ctx.lineTo(c.x+c.w/2+2,c.y-c.h); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#ffd98a'; ctx.shadowColor='#ffcf6e'; ctx.shadowBlur=6; const ww=Math.max(2,c.w*0.28);
    ctx.fillRect(c.x-ww/2,c.y-c.h*0.62,ww,ww); ctx.shadowBlur=0; }
  for(const t of townLights){ const a=0.35+0.5*Math.sin(tick*0.06+t.tw);   // no per-light shadowBlur (mobile perf): faint halo + bright core
    ctx.globalAlpha=a*0.4; ctx.fillStyle='#ffcf6e'; ctx.fillRect(t.x-1,t.y-1,3.6,3.6);
    ctx.globalAlpha=a; ctx.fillStyle='#fff0c8'; ctx.fillRect(t.x,t.y,1.6,1.6); }
  ctx.globalAlpha=1;
}
function drawPine(tr){ const x=tr.x, gy=tr.gy, h=tr.h*(tr.scale||1), w=h*0.46;
  ctx.save(); ctx.translate(x,gy);
  // trunk
  ctx.fillStyle='#5b3f2b'; ctx.fillRect(-2,-8,4,9); ctx.fillStyle='#74543a'; ctx.fillRect(-2,-8,1.6,9);
  for(let k=0;k<3;k++){ const ty=-8-k*h*0.28, tw=w*(1-k*0.24), th=h*0.4;
    ctx.fillStyle='#1c3d27'; ctx.beginPath(); ctx.moveTo(0,ty-th); ctx.lineTo(tw,ty); ctx.lineTo(-tw,ty); ctx.closePath(); ctx.fill();   // shaded base
    ctx.fillStyle='#2f5a3a'; ctx.beginPath(); ctx.moveTo(0,ty-th); ctx.lineTo(0,ty); ctx.lineTo(-tw,ty); ctx.closePath(); ctx.fill();    // lit (left) side
    ctx.fillStyle='#eef6ff'; ctx.beginPath(); ctx.moveTo(0,ty-th); ctx.lineTo(tw*0.55,ty-th*0.45); ctx.lineTo(-tw*0.55,ty-th*0.45); ctx.closePath(); ctx.fill(); // snow
    ctx.fillStyle='#cdddf2'; ctx.beginPath(); ctx.moveTo(0,ty-th); ctx.lineTo(tw*0.28,ty-th*0.72); ctx.lineTo(-tw*0.12,ty-th*0.62); ctx.closePath(); ctx.fill(); }
  ctx.restore();
}
function drawSnowPile(p){ const x=p.x, gy=groundY(x), r=p.r;
  const ratio=Math.max(0.15,Math.min(1,snowDepth[sidx(x)]/0.9));   // shrinks as it gets used up
  const h=r*0.55*ratio;
  // glow halo (clearly visible refill marker)
  ctx.save(); ctx.globalCompositeOperation='lighter';
  const g=ctx.createRadialGradient(x,gy-h*0.4,2,x,gy-h*0.4,r*1.4);
  g.addColorStop(0,'rgba(160,215,255,'+(0.22*ratio+0.06).toFixed(3)+')'); g.addColorStop(1,'rgba(160,215,255,0)');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,gy-h*0.4,r*1.4,0,7); ctx.fill(); ctx.restore();
  // bright fresh-snow drift
  ctx.fillStyle='#ffffff'; ctx.beginPath(); ctx.ellipse(x,gy,r,h,0,Math.PI,0); ctx.fill();
  ctx.fillStyle='#eaf4ff'; ctx.beginPath(); ctx.ellipse(x+r*0.22,gy,r*0.6,h*0.72,0,Math.PI,0); ctx.fill();
  // sparkles
  ctx.fillStyle='#ffffff';
  for(let s=0;s<4;s++){ const a=tick*0.04+s*1.7, sx=x+Math.cos(a)*r*0.55, sy=gy-h*0.5-Math.abs(Math.sin(a))*h*0.5;
    ctx.globalAlpha=0.35+0.5*Math.sin(tick*0.1+s*2); ctx.fillRect(sx,sy,1.6,1.6); } ctx.globalAlpha=1;
  // floating down-pointer marker so it's unmistakably a reload spot
  const my=gy-h-16-2.5*Math.sin(tick*0.09);
  ctx.globalAlpha=0.5+0.4*Math.sin(tick*0.09);
  ctx.fillStyle='#bfe4ff'; ctx.beginPath(); ctx.moveTo(x,my+6); ctx.lineTo(x+5,my-3); ctx.lineTo(x-5,my-3); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#eaf6ff'; ctx.beginPath(); ctx.arc(x,my-5,2.4,0,7); ctx.fill();
  ctx.globalAlpha=1;
}
function drawPlayer(p){
  const top=p.side===0, c=top?'#5fd0ff':'#ff7a8e', cd=top?'#2492cf':'#e0506a', cl=top?'#d6f3ff':'#ffd9e0';
  ctx.save(); ctx.translate(p.x,p.y);
  // shadow
  ctx.fillStyle='#0b162a55'; ctx.beginPath(); ctx.ellipse(0,FOOT-2,14,4,0,0,7); ctx.fill();
  // hit flash ring
  if(p.flash>0){ ctx.globalAlpha=p.flash; ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,-2,18,0,7); ctx.stroke(); ctx.globalAlpha=1; }
  const moving=Math.abs(p.vx)>0.4 && p.grounded; const walk=moving?Math.sin(tick*0.4):0;
  const crouch = p.packing>0 ? 4 : 0;
  const hipY=4-crouch*0.2, shY=-8+crouch*0.5, headY=-15+crouch*0.6;
  // legs
  ctx.strokeStyle=cd; ctx.lineWidth=3; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(0,hipY); ctx.lineTo(-4+walk*4,FOOT-2); ctx.moveTo(0,hipY); ctx.lineTo(4-walk*4,FOOT-2); ctx.stroke();
  // body
  ctx.strokeStyle=c; ctx.lineWidth=3.4; ctx.beginPath(); ctx.moveTo(0,hipY); ctx.lineTo(0,shY); ctx.stroke();
  // head + simple beanie (snow theme, original)
  ctx.fillStyle=c; ctx.beginPath(); ctx.arc(0,headY,5.4,0,7); ctx.fill();
  ctx.fillStyle=cl; ctx.beginPath(); ctx.arc(p.face*1.4,headY-1,1.3,0,7); ctx.fill();
  ctx.fillStyle=cd; ctx.beginPath(); ctx.arc(0,headY-3,5.6,Math.PI,0); ctx.fill(); ctx.fillRect(-5.6,headY-3,11.2,1.6);
  ctx.fillStyle=cl; ctx.beginPath(); ctx.arc(0,headY-8.5,2,0,7); ctx.fill();
  // packing: scooping arm down
  if(p.packing>0){
    ctx.strokeStyle=cl; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(0,shY+1); ctx.lineTo(p.face*7,hipY+6); ctx.stroke();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(p.face*7,hipY+7,3,0,7); ctx.fill();
  } else {
    // back arm
    ctx.strokeStyle=cd; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(0,shY+1); ctx.lineTo(-p.face*5,shY+7); ctx.stroke();
    // throwing arm — uses aim direction for human, face for AI
    let ang;
    if(p.side===0 && pad.aim.active){ const v=aimVec(); ang=v.frac>0.04?v.ang:(p.face>0?-0.3:Math.PI+0.3); }
    else ang = p.face>0? -0.5 : Math.PI+0.5;
    const wind2 = p.charging? -0.7*Math.min(1,p.charge/CHARGE_MAX) : -p.throwAnim*0.9;
    ctx.save(); ctx.translate(0,shY+1); ctx.rotate(ang+wind2);
    ctx.strokeStyle=cl; ctx.lineWidth=3.2; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(11,0); ctx.stroke();
    if(p.balls>0){ ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(12,0,3.4,0,7); ctx.fill(); }
    ctx.restore();
  }
  // ammo pips (snowballs held)
  for(let i=0;i<MAXBALL;i++){ ctx.beginPath(); ctx.arc(-6+i*6,headY-13,2.2,0,7);
    ctx.fillStyle=i<p.balls?'#ffffff':'#ffffff33'; ctx.fill(); }
  // frost overlay when frozen
  if(p.frozenT>0){ ctx.globalAlpha=0.32; ctx.fillStyle='#bfe8ff'; ctx.beginPath(); ctx.arc(0,-1,16,0,7); ctx.fill(); ctx.globalAlpha=1; }
  ctx.restore();
}

/* ---------- crisp UI layer (drawn on uctx, full device resolution) ---------- */
function rrect(c,x,y,w,h,r){ r=Math.min(r,w/2,h/2); c.beginPath(); c.moveTo(x+r,y);
  c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r); c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath(); }
function drawUI(){
  uctx.setTransform(uiScale,0,0,uiScale,0,0); uctx.clearRect(0,0,W,H);
  uctx.imageSmoothingEnabled=true; uctx.lineCap='round'; uctx.lineJoin='round'; uctx.textBaseline='alphabetic';
  if(playing&&!over){ drawAimPreview(); drawReloadHint(); drawPads(); drawPackBtn(); drawHUD(); drawBuffBadge(P[0]); drawBuffBadge(P[1]); drawFloaters(); }
  if(bannerT>0) drawBanner();
}
function drawBanner(){ uctx.save(); uctx.globalAlpha=Math.min(1,bannerT/16); uctx.textAlign='center';
  uctx.fillStyle='rgba(6,12,24,.5)'; uctx.fillRect(0,H*0.35,W,H*0.15);
  uctx.fillStyle='#eaf3ff'; uctx.font='900 '+Math.round(Math.min(W,H)*0.085)+'px Orbitron,sans-serif';
  uctx.shadowColor='#5fd0ff'; uctx.shadowBlur=20; uctx.fillText(banner, W/2, H*0.45); uctx.shadowBlur=0; uctx.restore();
}
function drawBuffBadge(p){ if(!p)return; let id=null,t=0;
  if(p.bigT>0){id='big';t=p.bigT;} else if(p.rapidT>0){id='rapid';t=p.rapidT;} else if(p.freezeT>0){id='freeze';t=p.freezeT;}
  if(!id)return; const it=ITEMS.find(x=>x.id===id), x=p.x, y=Math.max(p.y-44, 100);
  uctx.fillStyle='rgba(6,12,24,.7)'; uctx.beginPath(); uctx.arc(x,y,13,0,7); uctx.fill();
  uctx.strokeStyle=it.col; uctx.lineWidth=3; uctx.beginPath(); uctx.arc(x,y,13,-Math.PI/2,-Math.PI/2+7*(t/BUFF_T)); uctx.stroke();
  uctx.fillStyle=it.col; uctx.font='800 11px "Exo 2",sans-serif'; uctx.textAlign='center'; uctx.textBaseline='middle'; uctx.fillText(it.name,x,y+0.5); uctx.textBaseline='alphabetic';
}

function drawAimPreview(){ const me=P[0]; if(!me||!me.charging)return; const v=aimVec();
  const cf=me.charge/CHARGE_MAX, power=8+cf*9;
  const ang = v.frac>=0.08 ? v.ang : aimAtFoe(me);
  let x=me.x+Math.cos(ang)*16, y=me.y-8+Math.sin(ang)*16, vx=Math.cos(ang)*power, vy=Math.sin(ang)*power;
  uctx.fillStyle='#eaf6ff'; for(let t=0;t<18;t++){ vy+=BALL_GRAV; vx+=wind*0.04; x+=vx; y+=vy;
    uctx.globalAlpha=(1-t/18)*0.75; uctx.beginPath(); uctx.arc(x,y,2.1,0,7); uctx.fill(); if(y>groundY(x))break; }
  uctx.globalAlpha=1;
  // charge bar above the player
  const col=cf<0.5?'#9dff6b':cf<0.8?'#ffd45e':'#ff6f8b';
  uctx.save(); uctx.translate(me.x,me.y-34);
  uctx.fillStyle='rgba(6,14,28,.7)'; rrect(uctx,-17,-2,34,8,4); uctx.fill();
  uctx.fillStyle=col; rrect(uctx,-15,0,30*cf,4,2); uctx.fill();
  if(cf>0.99){ uctx.fillStyle='#fff'; uctx.font='700 8px Orbitron,sans-serif'; uctx.textAlign='center'; uctx.fillText('MAX',0,-6); }
  uctx.restore();
}
function drawReloadHint(){ const me=P[0]; if(!me||me.balls>0)return; uctx.textAlign='center';
  uctx.save(); uctx.globalAlpha=0.6+0.4*Math.sin(tick*0.12); uctx.shadowColor='rgba(2,8,18,.85)'; uctx.shadowBlur=4;
  if(canPackAt(me.x)){ uctx.fillStyle='#a8ff7a'; uctx.font='800 13px "Exo 2",sans-serif'; uctx.fillText('PACKで補充',me.x,me.y-44); }
  else { const sx=nearestSnowX(me.x); if(sx!=null){ const dir=sx<me.x?-1:1;
    uctx.translate(me.x,me.y-46); uctx.fillStyle='#dcecff'; uctx.font='800 12px "Exo 2",sans-serif'; uctx.fillText('雪だまりへ',0,-5);
    uctx.strokeStyle='#dcecff'; uctx.lineWidth=2.8;
    uctx.beginPath(); uctx.moveTo(-dir*10,4); uctx.lineTo(dir*10,4); uctx.lineTo(dir*3,-1); uctx.moveTo(dir*10,4); uctx.lineTo(dir*3,9); uctx.stroke(); } }
  uctx.restore();
}
function drawPads(){
  if(pad.move.active) drawPad(pad.move,'#7fe6ff'); else hintPad(PADR()+26, H-PADR()-26,'#7fe6ff','MOVE');
  if(pad.aim.active)  drawPad(pad.aim,'#ffd98a');  else hintPad(W-PADR()-26, H-PADR()-26,'#ffd98a','AIM');
}
function hintPad(x,y,col,label){ const R=PADR();
  uctx.globalAlpha=.06; uctx.fillStyle=col; uctx.beginPath(); uctx.arc(x,y,R,0,7); uctx.fill();
  uctx.globalAlpha=.28; uctx.strokeStyle=col; uctx.lineWidth=2; uctx.setLineDash([5,7]); uctx.beginPath(); uctx.arc(x,y,R,0,7); uctx.stroke(); uctx.setLineDash([]);
  uctx.globalAlpha=.5; uctx.fillStyle=col; uctx.font='700 12px Orbitron,sans-serif'; uctx.textAlign='center'; uctx.textBaseline='middle'; uctx.fillText(label,x,y); uctx.textBaseline='alphabetic'; uctx.globalAlpha=1; }
function drawPad(pd,col){ const R=PADR();
  uctx.globalAlpha=.1; uctx.fillStyle=col; uctx.beginPath(); uctx.arc(pd.bx,pd.by,R,0,7); uctx.fill();
  uctx.globalAlpha=.45; uctx.strokeStyle=col; uctx.lineWidth=2.5; uctx.beginPath(); uctx.arc(pd.bx,pd.by,R,0,7); uctx.stroke(); uctx.globalAlpha=1;
  let dx=pd.tx-pd.bx,dy=pd.ty-pd.by,len=Math.hypot(dx,dy); if(len>R){dx*=R/len;dy*=R/len;}
  uctx.fillStyle=col; uctx.shadowColor=col; uctx.shadowBlur=16; uctx.beginPath(); uctx.arc(pd.bx+dx,pd.by+dy,20,0,7); uctx.fill(); uctx.shadowBlur=0;
  uctx.fillStyle='#06101f'; uctx.beginPath(); uctx.arc(pd.bx+dx,pd.by+dy,6,0,7); uctx.fill(); }
function drawPackBtn(){ const me=P[0]; if(!me)return; const need=me.balls<MAXBALL; const onSnow=canPackAt(me.x); const R=packBtn.r;
  const active=need&&onSnow; const pulse=active?0.5+0.5*Math.sin(tick*0.12):0;
  const col=onSnow?'#cfe2ff':'#7f93b0';
  uctx.globalAlpha=packBtn.held?0.3:0.14+pulse*0.14; uctx.fillStyle=onSnow?'#ffffff':'#5a6f8c'; uctx.beginPath(); uctx.arc(packBtn.x,packBtn.y,R,0,7); uctx.fill();
  uctx.globalAlpha=active?0.55+pulse*0.4:0.32; uctx.strokeStyle=col; uctx.lineWidth=2.5; uctx.beginPath(); uctx.arc(packBtn.x,packBtn.y,R,0,7); uctx.stroke();
  uctx.globalAlpha=1;
  // little stacked-snow glyph
  uctx.fillStyle=onSnow?'#ffffff':'#8fa4c0'; uctx.beginPath(); uctx.arc(packBtn.x,packBtn.y-R*0.12,R*0.26,0,7); uctx.fill();
  uctx.beginPath(); uctx.arc(packBtn.x-R*0.2,packBtn.y+R*0.14,R*0.18,0,7); uctx.arc(packBtn.x+R*0.2,packBtn.y+R*0.14,R*0.18,0,7); uctx.fill();
  uctx.fillStyle=col; uctx.font='700 14px Orbitron,sans-serif'; uctx.textAlign='center'; uctx.fillText('PACK',packBtn.x,packBtn.y+R*0.6);
  if(!onSnow){ uctx.fillStyle='#9fb4d0'; uctx.font='700 12px "Exo 2",sans-serif'; uctx.fillText('雪だまりで',packBtn.x,packBtn.y+R*1.0); }
  if(me.packAcc>0){ uctx.strokeStyle='#9dff6b'; uctx.lineWidth=3.5; uctx.beginPath(); uctx.arc(packBtn.x,packBtn.y,R-5,-Math.PI/2,-Math.PI/2+7*(me.packAcc/PACK_FRAMES)); uctx.stroke(); }
}

/* ---------- HUD (glass panels: HP hearts + snowball ammo) ---------- */
function drawHUD(){
  const p0=P[0], p1=P[1];
  hudPanel(14,12,false, WIN_HITS-(p1?p1.hits:0), p0?p0.balls:0, '#5fd0ff', (S.name||'YOU'));
  hudPanel(W-14,12,true, WIN_HITS-(p0?p0.hits:0), p1?p1.balls:0, '#ff7a8e', 'COM');
  drawMatchInfo();
}
function drawMatchInfo(){ uctx.textAlign='center'; uctx.textBaseline='top';
  uctx.font='800 16px Orbitron,sans-serif'; uctx.fillStyle='rgba(226,240,255,.95)';
  uctx.shadowColor='rgba(2,8,18,.75)'; uctx.shadowBlur=4;
  uctx.fillText('STAGE '+stage+' ・ '+theme.name, W/2, 12); uctx.shadowBlur=0;
  const y=38, r=6.5;
  for(let i=0;i<ROUNDS_TO_WIN;i++){ uctx.beginPath(); uctx.arc(W/2-20-i*18,y,r,0,7); uctx.fillStyle=i<roundWins[0]?'#5fd0ff':'rgba(255,255,255,.2)'; uctx.fill(); }
  for(let i=0;i<ROUNDS_TO_WIN;i++){ uctx.beginPath(); uctx.arc(W/2+20+i*18,y,r,0,7); uctx.fillStyle=i<roundWins[1]?'#ff7a8e':'rgba(255,255,255,.2)'; uctx.fill(); }
  uctx.textBaseline='alphabetic';
}
function hudPanel(ax,y,right,hp,ammo,col,label){
  const hR=10, hGap=8, bR=8, bGap=6, padX=16, padY=11, labelH=20, rowGap=10, ammoLabelW=36;
  const heartsW=WIN_HITS*(hR*2)+(WIN_HITS-1)*hGap;
  const ammoW=ammoLabelW + MAXBALL*(bR*2)+(MAXBALL-1)*bGap;
  uctx.font='800 17px Orbitron,sans-serif'; const lw=uctx.measureText(label).width;
  const w=Math.max(heartsW, ammoW, lw)+padX*2;
  const h=padY*2+labelH+(hR*2)+rowGap+(bR*2)+4;
  const x = right? ax-w : ax;
  uctx.fillStyle='rgba(9,16,30,.62)'; rrect(uctx,x,y,w,h,14); uctx.fill();
  uctx.lineWidth=1.5; uctx.strokeStyle=col+'5e'; rrect(uctx,x,y,w,h,14); uctx.stroke();
  uctx.fillStyle=col; rrect(uctx, right? x+w-4 : x, y+9, 4, h-18, 2); uctx.fill();   // accent edge
  uctx.textBaseline='top'; uctx.font='800 17px Orbitron,sans-serif'; uctx.fillStyle=col; uctx.textAlign=right?'right':'left';
  uctx.fillText(label, right? x+w-padX : x+padX, y+padY);
  // HP hearts
  const hy=y+padY+labelH+hR;
  for(let i=0;i<WIN_HITS;i++){ const cx=x+padX+hR+i*(hR*2+hGap); drawHeart(cx,hy,hR, i<hp); }
  // snowball ammo
  const by=hy+hR+rowGap+bR;
  uctx.font='700 12px "Exo 2",sans-serif'; uctx.fillStyle='rgba(208,224,246,.75)'; uctx.textBaseline='middle'; uctx.textAlign='left';
  uctx.fillText('雪玉', x+padX, by);
  for(let i=0;i<MAXBALL;i++){ const cx=x+padX+ammoLabelW+bR+i*(bR*2+bGap); drawPip(cx,by,bR, i<ammo, '#bcd6f5'); }
  uctx.textBaseline='alphabetic';
}
function drawHeart(cx,cy,r,on){
  const lobeY=cy-r*0.28, lobeR=r*0.56;
  if(on){ uctx.fillStyle='#ff5267';
    uctx.beginPath(); uctx.arc(cx-r*0.45,lobeY,lobeR,0,7); uctx.arc(cx+r*0.45,lobeY,lobeR,0,7); uctx.fill();
    uctx.beginPath(); uctx.moveTo(cx-r*0.99,cy-r*0.04); uctx.lineTo(cx+r*0.99,cy-r*0.04); uctx.lineTo(cx,cy+r*1.02); uctx.closePath(); uctx.fill();
    uctx.fillStyle='rgba(255,255,255,.5)'; uctx.beginPath(); uctx.arc(cx-r*0.45,lobeY-r*0.12,r*0.2,0,7); uctx.fill();
  } else {
    uctx.fillStyle='rgba(255,255,255,.08)';
    uctx.beginPath(); uctx.arc(cx-r*0.45,lobeY,lobeR,0,7); uctx.arc(cx+r*0.45,lobeY,lobeR,0,7); uctx.fill();
    uctx.beginPath(); uctx.moveTo(cx-r*0.99,cy-r*0.04); uctx.lineTo(cx+r*0.99,cy-r*0.04); uctx.lineTo(cx,cy+r*1.02); uctx.closePath(); uctx.fill();
  }
}
function drawPip(cx,cy,r,on,col,col2){
  if(on){ uctx.fillStyle='#ffffff'; uctx.beginPath(); uctx.arc(cx,cy,r,0,7); uctx.fill();
    uctx.fillStyle='rgba(255,255,255,.55)'; uctx.beginPath(); uctx.arc(cx-r*0.3,cy-r*0.32,r*0.34,0,7); uctx.fill();
    uctx.lineWidth=1.5; uctx.strokeStyle=col; uctx.beginPath(); uctx.arc(cx,cy,r,0,7); uctx.stroke(); }
  else { uctx.fillStyle='rgba(255,255,255,.08)'; uctx.beginPath(); uctx.arc(cx,cy,r,0,7); uctx.fill();
    uctx.lineWidth=1.4; uctx.strokeStyle='rgba(255,255,255,.28)'; uctx.beginPath(); uctx.arc(cx,cy,r,0,7); uctx.stroke(); }
}

/* ---------- loop ---------- */
function loop(){ tick++;
  if(hitstop>0)hitstop--;
  if(bannerT>0)bannerT--;
  if(introT>0){ introT--; stepPuffs(); stepFloaters(); draw(); requestAnimationFrame(loop); return; }
  if(playing&&!over&&hitstop<=0){ regrowSnow(); controlHuman(); controlAI(); stepBalls(); stepItems(); stepPuffs(); stepFloaters(); }
  else { stepPuffs(); stepFloaters(); }
  draw();
  requestAnimationFrame(loop);
}

/* ---------- flow ---------- */
const S={name:'YOU'};
const ovEl=document.getElementById('overlay'), taglineEl=document.getElementById('tagline'),
  logoEl=document.getElementById('logo'), resTitleEl=document.getElementById('resTitle'),
  resSubEl=document.getElementById('resSub'), startBtn=document.getElementById('startBtn'),
  homeBtn=document.getElementById('homeBtn');
function showHome(){ playing=false; over=false; stage=1; resetInput();
  ovEl.classList.remove('hide');
  taglineEl.style.display=''; logoEl.style.display='';
  resTitleEl.style.display='none'; resSubEl.style.display='none';
  homeBtn.style.display='none'; startBtn.textContent='はじめる';
}
function startMatch(){ actx(); roundWins=[0,0]; round=1; startRound(); }
function startRound(){ fitCanvas(); applyTheme(stage); buildWorld(); layoutUI();
  wind=(Math.random()*2-1)*1.4;
  P=[makePlayer(0),makePlayer(1)]; balls=[]; puffs=[]; floaters=[]; items=[]; itemTimer=300;
  winner=-1; hitstop=0; over=false; playing=true; resetInput();
  ai={think:0,wantThrow:false,throwAng:0,chargeT:0,moveDir:0,moveT:0,dodgeT:0};
  banner='STAGE '+stage+'　ROUND '+round; bannerT=70; introT=70;
  ovEl.classList.add('hide');
}
function endRound(w){ if(over)return; roundWins[w]++; playing=false;
  banner = w===0?'ROUND WON!':'ROUND LOST'; bannerT=70;
  if(roundWins[w]>=ROUNDS_TO_WIN){ setTimeout(()=>endMatch(w),1000); }
  else { round++; setTimeout(startRound,1550); }
}
function endMatch(w){ over=true; playing=false; resetInput();
  ovEl.classList.remove('hide'); taglineEl.style.display=''; logoEl.style.display='none';
  resTitleEl.style.display='block'; resSubEl.style.display='block';
  const score=roundWins[0]+' - '+roundWins[1];
  if(w===0){ resTitleEl.textContent='STAGE '+stage+' CLEAR'; resTitleEl.style.color='#5fd0ff';
    resSubEl.textContent='勝利！（'+score+'）次のステージへ'; startBtn.textContent='次のステージ'; stage++; sfxWin(); }
  else { resTitleEl.textContent='YOU LOSE'; resTitleEl.style.color='#ff7a8e';
    resSubEl.textContent='STAGE '+stage+' で敗北（'+score+'）'; startBtn.textContent='もう一度'; sfxLose(); }
  homeBtn.style.display='';
}
startBtn.onclick=startMatch; homeBtn.onclick=showHome;

function checkRotate(){ const portrait=window.innerHeight>window.innerWidth;
  document.getElementById('rotate').classList.toggle('show', portrait && 'ontouchstart' in window); }
window.addEventListener('orientationchange',()=>setTimeout(()=>{fitCanvas();buildWorld();layoutUI();checkRotate();},200));

fitCanvas(); buildWorld(); layoutUI(); checkRotate(); loop();
</script>
</body>
