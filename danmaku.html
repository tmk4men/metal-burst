<style>
  :root{ --bg:#0a1426; --tx:#f2f8ff; --tx2:#a9bdd8; --c1:#7edcff; --c2:#ff7f93; --gold:#ffd76a;
    --glass:linear-gradient(180deg,rgba(15,29,52,.9),rgba(8,17,33,.94)); --line:rgba(126,220,255,.2); --rad:18px; }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
  html,body{ height:100%; background:var(--bg); overflow:hidden; font-family:"DotGothic16","Exo 2",sans-serif; color:var(--tx2); }
  .px{ font-family:"Press Start 2P",monospace; }
  #stage{ position:fixed; inset:0; }
  #stage canvas{ position:absolute; inset:0; width:100%; height:100%; image-rendering:pixelated; }
  canvas#cv{ z-index:1; touch-action:none; background:#0a1426; }
  canvas#ui{ z-index:3; pointer-events:none; image-rendering:auto; }
  #stage::after{ content:""; position:absolute; inset:0; pointer-events:none; z-index:2; background:radial-gradient(140% 140% at 50% 40%, #0000 58%, #00000066 100%); }
  #rotate{ position:fixed; inset:0; z-index:60; display:none; flex-direction:column; align-items:center; justify-content:center; gap:14px; background:#070d18; text-align:center; }
  #rotate.show{ display:flex; }
  #rotate .phone{ width:46px; height:74px; border:3px solid var(--tx2); border-radius:9px; animation:rot 1.8s ease-in-out infinite; }
  @keyframes rot{ 0%,40%{transform:rotate(-90deg)} 60%,100%{transform:rotate(0)} }
  #rotate h2{ font-family:"Orbitron"; color:var(--tx); letter-spacing:3px; }
  #muteBtn{ position:fixed; top:calc(10px + env(safe-area-inset-top)); right:12px; z-index:50; width:40px; height:40px; display:grid; place-items:center;
    border-radius:12px; cursor:pointer; color:#cfe2f7; background:rgba(9,17,32,.66); border:1px solid rgba(126,220,255,.24); -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px); }
  #muteBtn svg{ width:20px; height:20px; }
  #overlay{ position:fixed; inset:0; z-index:40; display:flex; align-items:center; justify-content:center; text-align:center; overflow:auto; padding:16px;
    background:radial-gradient(130% 130% at 50% 26%, rgba(10,20,38,.42), rgba(4,8,16,.66)); }
  #overlay::after{ content:""; position:absolute; inset:0; pointer-events:none; opacity:.3; background:repeating-linear-gradient(0deg,#0000 0 2px,#0000000d 2px 3px); }
  #overlay.hide{ display:none; }
  .inner{ position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:16px; padding:30px 32px; margin:auto; width:min(520px,92vw);
    background:var(--glass); border:1px solid var(--line); border-radius:var(--rad); box-shadow:0 38px 100px -26px #000e, inset 0 1px 0 #ffffff18; -webkit-backdrop-filter:blur(12px); backdrop-filter:blur(12px); }
  .tagline{ font-family:"Press Start 2P",monospace; font-size:9px; letter-spacing:3px; color:#8fb6dd; }
  #logo{ font-family:"DotGothic16",sans-serif; font-weight:400; font-size:clamp(30px,8vw,54px); letter-spacing:1px; color:var(--tx); line-height:1.12; text-shadow:0 0 34px rgba(255,127,147,.34),3px 3px 0 #081223; }
  #logo .b{ color:var(--c2); }
  #logo .on{ display:block; font-family:"Press Start 2P",monospace; font-size:clamp(10px,2.6vw,13px); letter-spacing:4px; color:var(--c2); margin-top:12px; }
  #resTitle{ font-family:"DotGothic16",sans-serif; font-size:clamp(30px,7.5vw,50px); letter-spacing:2px; display:none; text-shadow:0 0 28px currentColor,2px 2px 0 #06101f; }
  #resSub{ font-size:14px; color:var(--tx2); display:none; }
  .best{ font-family:"DotGothic16",sans-serif; font-size:15px; color:var(--gold); }
  .howlist{ display:flex; flex-direction:column; gap:9px; width:100%; max-width:380px; }
  .howrow{ display:flex; align-items:center; gap:11px; font-size:13.5px; color:var(--tx2); text-align:left; line-height:1.4; }
  .howrow b{ color:var(--tx); }
  .howrow .ic{ flex:0 0 34px; height:34px; border-radius:10px; display:grid; place-items:center; background:rgba(126,220,255,.08); border:1px solid rgba(126,220,255,.16); }
  .howrow .ic svg{ width:19px; height:19px; }
  .seg{ display:inline-flex; background:rgba(126,220,255,.06); border:1px solid rgba(126,220,255,.18); border-radius:12px; padding:3px; gap:2px; }
  .seg button{ font-family:"DotGothic16",sans-serif; font-weight:400; font-size:14px; color:#a9bdd8; background:none; border:none; border-radius:9px; padding:8px 17px; cursor:pointer; transition:background .12s,color .12s; }
  .seg button.on{ background:linear-gradient(180deg,#ff9fb0,#e0506a); color:#1a0810; box-shadow:0 6px 16px -8px rgba(224,80,106,.8); }
  .btnrow{ display:flex; gap:11px; flex-wrap:wrap; justify-content:center; margin-top:4px; }
  .start{ font-family:"DotGothic16",sans-serif; font-weight:400; letter-spacing:2px; font-size:19px; color:#1a0810; cursor:pointer; padding:16px 46px; border:none; border-radius:14px;
    background:linear-gradient(180deg,#ffb0c0,#e85d77); box-shadow:0 16px 32px -10px rgba(232,93,119,.72), inset 0 1px 0 #ffffffb8; transition:transform .06s,filter .12s; }
  .start:hover{ filter:brightness(1.06); } .start:active{ transform:translateY(2px); }
  .ghost{ font-family:"DotGothic16",sans-serif; font-weight:400; letter-spacing:2px; font-size:15px; cursor:pointer; color:#cfe2f7; padding:15px 24px; border-radius:14px;
    background:rgba(126,220,255,.07); border:1px solid rgba(126,220,255,.22); transition:transform .06s,background .12s; }
  .ghost:hover{ background:rgba(126,220,255,.13); } .ghost:active{ transform:translateY(2px); }
  .orow{ display:flex; align-items:center; gap:10px; }
  @media (max-height:560px){ .inner{ gap:10px; padding:16px 22px;} #logo{ font-size:clamp(26px,7vh,42px);} .howrow{ font-size:11.5px;} .howrow .ic{ flex-basis:28px; height:28px;} }
</style>
</head>
<body>
<div id="stage"><canvas id="cv"></canvas><canvas id="ui"></canvas></div>
<div id="rotate"><div class="phone"></div><h2>PLEASE ROTATE</h2><p>縦画面（タテ向き）でプレイしてください</p></div>
<button id="muteBtn" aria-label="sound"></button>
<div id="overlay"><div class="inner">
  <div class="tagline" id="tagline">BULLET-HELL SURVIVAL</div>
  <div id="logo">あやうし！<span class="b">ボム兵</span><span class="on">BULLET HELL</span></div>
  <div id="resTitle"></div>
  <div id="resSub"></div>
  <div id="opts">
    <div class="best" id="bestLine"></div>
    <div class="howlist" id="howlist">
      <div class="howrow"><span class="ic" id="icBomb"></span><span>あなたは<b>ボム兵</b>。<b>画面の外</b>から飛んでくる<b>弾幕</b>をよけろ！</span></div>
      <div class="howrow"><span class="ic" id="icMove"></span><span>画面を<b>ドラッグ</b>してボム兵を動かし、弾をよけろ！</span></div>
      <div class="howrow"><span class="ic" id="icHeart"></span><span>当たり判定は<b>中心の点</b>だけ。ライフ2・生存<b>秒数</b>がスコア！</span></div>
    </div>
    <div class="orow"><span style="font-size:12px;color:#9fb4d0">つよさ</span><div class="seg" id="diffSeg"></div></div>
  </div>
  <div class="btnrow"><button class="start" id="startBtn">はじめる</button><button class="ghost" id="homeBtn" style="display:none">ホーム</button></div>
</div></div>

<script>
const cv=document.getElementById('cv'),screen2=cv.getContext('2d');
const uic=document.getElementById('ui'),uctx=uic.getContext('2d');
const PX=3;                         // pixel-art block size (CSS px) -> low-res buffer upscaled nearest-neighbour
const bf=document.createElement('canvas'); const ctx=bf.getContext('2d');   // scene is drawn here (chunky), then blitted
let W=720,H=1280,VW=720,VH=1280,DPR=1,BW=240,BH=427;
function fitCanvas(){ VW=Math.max(300,Math.floor(window.innerWidth)); VH=Math.max(360,Math.floor(window.innerHeight));
  DPR=Math.min(window.devicePixelRatio||1,2); W=VW; H=VH;
  cv.width=Math.round(VW*DPR); cv.height=Math.round(VH*DPR);
  uic.width=Math.round(VW*DPR); uic.height=Math.round(VH*DPR);
  BW=Math.max(1,Math.ceil(W/PX)); BH=Math.max(1,Math.ceil(H/PX)); bf.width=BW; bf.height=BH; computeArena(); }
window.addEventListener('resize',()=>{ fitCanvas(); layoutUI(); checkRotate(); });

/* ---------- constants ---------- */
const PR=16, R_HIT=4.6, MAX_RUN=3.7, FOCUS_RUN=1.5, ACC=0.55, FRIC=0.78, LIVES=2, IFRAME=110, WARN_T=10;
const DIFF=[{n:'やさしい',gap:1.4,sp:0.82},{n:'ふつう',gap:1.1,sp:1.0},{n:'つよい',gap:0.88,sp:1.16}];
let diff=1;
/* ---------- save ---------- */
const SK='danmaku_save_v2'; let save={diff:0,best:[0,0,0]};
try{const s=JSON.parse(localStorage.getItem(SK)); if(s){ if(typeof s.best==='number')s.best=[s.best,0,0]; save=Object.assign(save,s); if(!Array.isArray(save.best))save.best=[0,0,0]; }}catch(e){}
function persist(){ try{localStorage.setItem(SK,JSON.stringify(save));}catch(e){} }

/* ---------- audio ---------- */
let AC=null; const actx=()=>{ if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}return AC; };
let muted=(()=>{try{return localStorage.getItem('dm_mute')==='1';}catch(e){return false;}})(), master=null;
function bus(){ const a=actx(); if(!a)return null; if(!master){master=a.createGain(); master.gain.value=muted?0:1; master.connect(a.destination);} return master; }
function note(f,d,t='sine',v=.16,s=0){ const a=actx(),m=bus(); if(!a||!m)return; const o=a.createOscillator(),g=a.createGain(); o.type=t; o.frequency.value=f;
  if(s)o.frequency.exponentialRampToValueAtTime(Math.max(40,f+s),a.currentTime+d); g.gain.value=0; const tt=a.currentTime;
  g.gain.linearRampToValueAtTime(v,tt+0.012); g.gain.exponentialRampToValueAtTime(0.0001,tt+d); o.connect(g); g.connect(m); o.start(); o.stop(tt+d+0.02); }
function sfxShot(){ note(520,0.05,'square',0.02,-150); }
function sfxWarn(){ note(300,0.07,'square',0.02,120); }
function sfxCharge(){ note(220,0.4,'sawtooth',0.05,260); }
function sfxFlame(){ const a=actx(),m=bus(); if(!a||!m)return; const b=a.createBuffer(1,11000,a.sampleRate),d=b.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.1)*0.55; const s=a.createBufferSource(); s.buffer=b; const g=a.createGain();
  g.gain.value=0.34; g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+0.95); s.connect(g); g.connect(m); s.start(); note(130,0.7,'sawtooth',0.05,-50); }
function sfxHit(){ const a=actx(),m=bus(); if(!a||!m)return; const b=a.createBuffer(1,4800,a.sampleRate),d=b.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.8); const s=a.createBufferSource(); s.buffer=b; const g=a.createGain();
  g.gain.value=0.5; g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+0.4); s.connect(g); g.connect(m); s.start(); note(80,0.3,'sine',0.16,-34); }
function sfxLevel(){ note(740,0.1,'triangle',0.07); setTimeout(()=>note(988,0.12,'triangle',0.07),90); }
function sfxBest(){ [659,880,1175].forEach((f,i)=>setTimeout(()=>note(f,0.18,'triangle',0.12),i*90)); }
let bgmTimer=null,bgmStep=0; const MEL=[440,523,587,523,494,587,659,587],BASS=[110,131,147,98];
function bgmTick(){ const i=bgmStep%MEL.length; if(MEL[i])note(MEL[i],0.26,'triangle',0.026); if(i%4===0)note(BASS[(bgmStep/4|0)%BASS.length],0.55,'sine',0.038); bgmStep++; }
function startBGM(){ bus(); if(bgmTimer)return; bgmStep=0; bgmTimer=setInterval(bgmTick,300); }
function stopBGM(){ if(bgmTimer){clearInterval(bgmTimer);bgmTimer=null;} }
function setMuted(m){ muted=m; try{localStorage.setItem('dm_mute',m?'1':'0');}catch(e){} const b=bus(); if(b&&AC)b.gain.setTargetAtTime(m?0:1,AC.currentTime,0.02); }

/* ---------- arena ---------- */
let AX0=0,AY0=0,AX1=0,AY1=0;
function computeArena(){ const pr=PADR(); AX0=12; AX1=W-12; AY0=Math.max(64,Math.round(H*0.085)); AY1=H-Math.round(pr*2+26); }
const PADR=()=>Math.max(50,Math.min(W,H)*0.145);

/* ---------- state ---------- */
let player=null, boss=null, warns=[], bullets=[], puffs=[], stars=[];
let surviveT=0, level=0, lives=LIVES, playing=false, dead=false, volleyT=70;
function makePlayer(){ return {x:(AX0+AX1)/2, y:(AY0+AY1)/2+40, vx:0, vy:0, focus:false, invuln:80}; }
function resetWorld(){ player=makePlayer(); bullets=[]; warns=[]; puffs=[]; surviveT=0; level=0; lives=LIVES; dead=false; volleyT=150;
  boss={ x:(AX0+AX1)/2, y:AY0+(AY1-AY0)*0.15, phase:0, state:'idle', t:300, ang:0 };   // upper-half stage boss (original) that spits a flame line
  stars=[]; for(let i=0;i<74;i++){ const far=i<48; stars.push({x:Math.random()*W,y:AY0+Math.random()*(AY1-AY0),r:far?1:2,a:Math.random()*7,sp:far?0.12:0.4,far}); } }

/* ---------- input ---------- */
const pad={a:false,id:-1,bx:0,by:0,tx:0,ty:0};
function layoutUI(){}
function toW(e){ const r=cv.getBoundingClientRect(); return {x:(e.clientX-r.left)*(W/r.width),y:(e.clientY-r.top)*(H/r.height)}; }
function onDown(e){ if(!playing)return; const p=toW(e);
  if(!pad.a){ pad.a=true; pad.id=e.pointerId; pad.bx=pad.tx=p.x; pad.by=pad.ty=p.y; e.preventDefault(); } }
function onMove(e){ if(pad.a&&pad.id===e.pointerId){ const p=toW(e); pad.tx=p.x; pad.ty=p.y; e.preventDefault(); } }
function onUp(e){ if(pad.a&&pad.id===e.pointerId){ pad.a=false; pad.id=-1; } }
cv.addEventListener('pointerdown',onDown); window.addEventListener('pointermove',onMove,{passive:false});
window.addEventListener('pointerup',onUp); window.addEventListener('pointercancel',onUp);
const keys={}; window.addEventListener('keydown',e=>{ keys[e.key]=true; }); window.addEventListener('keyup',e=>{ keys[e.key]=false; });

/* ---------- volleys: attacks come from OFF-SCREEN, telegraphed at the edge ---------- */
function shoot(x,y,ang,sp,col,r){ bullets.push({x,y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,r:r||5,col:col||'#ff9d5c',ph:Math.random()*7}); }
const VCOL=['#ff9d5c','#7ad7ff','#ffd76a','#b69dff'];
function spawnVolley(){ const D=DIFF[diff]||DIFF[1], sp=(0.85+level*0.08)*D.sp, col=VCOL[(Math.random()*3|0)];
  const pool=['ring','fan','rain','rain']; if(surviveT>=480&&level>=1)pool.push('homing'); if(surviveT>=720&&level>=2)pool.push('wall');
  const kind=pool[Math.random()*pool.length|0];
  if(kind==='wall'){ const gx=AX0+50+Math.random()*((AX1-AX0)-100); warns.push({kind,ox:gx,oy:AY0-20,mx:gx,my:AY0+14,ang:1.5708,sp,col,gap:gx,t:WARN_T+12}); sfxWarn(); return; }
  const side=Math.random()<0.5?0:(Math.random()<0.5?1:2); let ox,oy,mx,my; const off=40;
  if(side===0){ ox=AX0+Math.random()*(AX1-AX0); oy=AY0-off; mx=ox; my=AY0+14; }
  else if(side===1){ oy=AY0+Math.random()*(AY1-AY0)*0.85; ox=AX0-off; mx=AX0+14; my=oy; }
  else { oy=AY0+Math.random()*(AY1-AY0)*0.85; ox=AX1+off; mx=AX1-14; my=oy; }
  let n = kind==='ring'?(8+Math.min(8,level)):(kind==='homing'?(2+Math.min(2,level/2|0)):(3+Math.min(4,Math.floor(level/1.5))));
  if(surviveT<480) n=Math.min(n, kind==='ring'?6:3); if(surviveT<240) n=Math.min(n, kind==='ring'?5:2);   // gentle start
  warns.push({ox,oy,mx,my,kind,n,sp,col,t:WARN_T,ang:Math.atan2(player.y-oy,player.x-ox)}); sfxWarn(); }
function emitVolley(v){
  if(v.kind==='wall'){ const gw=Math.max(74,118-level*4); for(let x=AX0+18;x<=AX1-18;x+=32){ if(Math.abs(x-v.gap)<gw/2)continue; shoot(x,AY0-18,1.5708,v.sp,v.col,5); } sfxShot(); return; }
  const aim=Math.atan2(player.y-v.oy,player.x-v.ox);
  if(v.kind==='ring'){ for(let i=0;i<v.n;i++) shoot(v.ox,v.oy, i/v.n*Math.PI*2, v.sp, v.col, i%2?5.2:3.8); }
  else if(v.kind==='fan'){ for(let i=0;i<v.n;i++){ const a=aim+(i-(v.n-1)/2)*0.16; shoot(v.ox,v.oy,a,v.sp+0.2,v.col, i===((v.n-1)/2|0)?5.6:4.6); } }
  else if(v.kind==='homing'){ for(let i=0;i<v.n;i++){ const a=aim+(i-(v.n-1)/2)*0.4; shoot(v.ox,v.oy,a,v.sp*0.85,'#b69dff',6.2); bullets[bullets.length-1].homing=170; } }   // slow steerers
  else { for(let i=0;i<v.n;i++){ const a=aim+(i-(v.n-1)/2)*0.34; shoot(v.ox,v.oy,a,v.sp,v.col,5); } }   // spread rain
  sfxShot(); }
function puff(x,y,c,n){ for(let i=0;i<n;i++){ const a=Math.random()*7,s=1+Math.random()*4; puffs.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,c,r:2+Math.random()*3}); } }
function stepPuffs(){ for(let i=puffs.length-1;i>=0;i--){ const p=puffs[i]; p.x+=p.vx; p.y+=p.vy; p.vx*=0.9; p.vy*=0.9; p.life-=0.04; if(p.life<=0)puffs.splice(i,1); } }
let shake=0;

/* ---------- step ---------- */
function pointNearRay(px,py,bx,by,ang,hw){ const dx=px-bx,dy=py-by, t=dx*Math.cos(ang)+dy*Math.sin(ang); if(t<0)return false; const ex=bx+Math.cos(ang)*t, ey=by+Math.sin(ang)*t; return Math.hypot(px-ex,py-ey)<hw; }
function stepBoss(){ const b=boss; b.phase+=0.01; b.x=(AX0+AX1)/2+Math.sin(b.phase)*((AX1-AX0)*0.3);
  if(b.state==='idle'){ if(surviveT>300 && --b.t<=0){ b.state='charge'; b.t=46; b.ang=Math.atan2(player.y-(b.y+10),player.x-b.x); sfxCharge(); } }
  else if(b.state==='charge'){ if(--b.t<=0){ b.state='fire'; b.t=56; sfxFlame(); shake=Math.max(shake,7); } }
  else { if(player.invuln<=0 && pointNearRay(player.x,player.y,b.x,b.y+10,b.ang,13+R_HIT)) hurt();
    if(--b.t<=0){ b.state='idle'; b.t=Math.round(520-Math.min(220,level*30)+Math.random()*200); } } }
function hurt(){ lives--; player.invuln=IFRAME; puff(player.x,player.y,'#ff7f93',24); sfxHit(); shake=Math.max(shake,13);
  bullets=bullets.filter(b=>Math.hypot(b.x-player.x,b.y-player.y)>140);
  if(lives<=0){ die(); } else { banner='のこり '+lives; bannerT=54; } }
function die(){ dead=true; playing=false; puff(player.x,player.y,'#ff7f93',30); sfxHit(); shake=Math.max(shake,16);
  const sec=surviveT/60, best=sec>save.best[diff]; if(best)save.best[diff]=sec; persist(); setTimeout(()=>endGame(sec,best),700); }
function step(){ surviveT++; const D=DIFF[diff]||DIFF[1];
  const nl=Math.floor(surviveT/900); if(nl>level){ level=nl; sfxLevel(); banner='レベル '+(level+1); bannerT=56; }
  // player move
  let mvx=0,mvy=0; const m=pad; if(m.a){ const dx=m.tx-m.bx,dy=m.ty-m.by,R=PADR(),len=Math.hypot(dx,dy); if(len>R*0.16){ mvx=Math.max(-1,Math.min(1,dx/R)); mvy=Math.max(-1,Math.min(1,dy/R)); } }
  if(keys['ArrowLeft']||keys['a'])mvx=-1; if(keys['ArrowRight']||keys['d'])mvx=1; if(keys['ArrowUp']||keys['w'])mvy=-1; if(keys['ArrowDown']||keys['s'])mvy=1;
  const l=Math.hypot(mvx,mvy); if(l>1){mvx/=l;mvy/=l;}
  const spd=MAX_RUN; player.vx+=mvx*ACC; player.vy+=mvy*ACC; player.vx*=FRIC; player.vy*=FRIC;
  const ps=Math.hypot(player.vx,player.vy); if(ps>spd){ player.vx*=spd/ps; player.vy*=spd/ps; }
  player.x+=player.vx; player.y+=player.vy;
  player.x=Math.max(AX0+PR,Math.min(AX1-PR,player.x)); player.y=Math.max(AY0+PR,Math.min(AY1-PR,player.y));
  if(player.invuln>0)player.invuln--;
  // schedule volleys
  if(--volleyT<=0){ if(bullets.length<240) spawnVolley(); const early=surviveT<900?(2.6-surviveT/900*1.6):1; volleyT=Math.max(30,Math.round((66-level*4)*D.gap*early)); }   // very sparse at first, eases in over ~15s
  for(let i=warns.length-1;i>=0;i--){ if(--warns[i].t<=0){ emitVolley(warns[i]); warns.splice(i,1); } }
  if(boss) stepBoss();
  // bullets — slow base velocity + gentle perpendicular sway = ふわふわ
  for(let i=bullets.length-1;i>=0;i--){ const b=bullets[i];
    if(b.homing){ b.homing--; const ta=Math.atan2(player.y-b.y,player.x-b.x); let ca=Math.atan2(b.vy,b.vx),d=ta-ca; while(d>Math.PI)d-=6.283; while(d<-Math.PI)d+=6.283; const na=ca+Math.max(-0.03,Math.min(0.03,d)),s=Math.hypot(b.vx,b.vy); b.vx=Math.cos(na)*s; b.vy=Math.sin(na)*s; }
    const pa=Math.atan2(b.vy,b.vx)+1.5708, sway=Math.sin(tick*0.05+b.ph)*0.34;
    b.x+=b.vx+Math.cos(pa)*sway; b.y+=b.vy+Math.sin(pa)*sway;
    if(b.x<AX0-70||b.x>AX1+70||b.y<AY0-70||b.y>AY1+70){ bullets.splice(i,1); continue; }
    if(player.invuln<=0 && Math.hypot(b.x-player.x,b.y-player.y)<b.r+R_HIT){ bullets.splice(i,1); hurt(); if(dead)return; } }
  stepPuffs();
}

/* ---------- render (low-res pixel buffer) ---------- */
let tick=0,banner='',bannerT=0;
function rr(c,x,y,w,h,r){ r=Math.min(r,w/2,h/2); c.beginPath(); c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r); c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath(); }
function draw(){ ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,BW,BH);
  ctx.setTransform(1/PX,0,0,1/PX,0,0);
  if(shake>0.4){ ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake); shake*=0.85; } else shake=0;
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#0a1326'); g.addColorStop(1,'#101a32'); ctx.fillStyle=g; ctx.fillRect(-20,-20,W+40,H+40);
  drawArena();
  ctx.save(); rr(ctx,AX0,AY0,AX1-AX0,AY1-AY0,18); ctx.clip();
  drawNebula();
  if(boss) drawBoss();
  for(const s of stars){ s.y+=s.sp; if(s.y>AY1)s.y=AY0; ctx.globalAlpha=(s.far?0.10:0.22)+(s.far?0.05:0.12)*Math.sin(tick*0.05+s.a); ctx.fillStyle=s.far?'#5f6f8c':'#9fb6d8'; ctx.fillRect(s.x|0,s.y|0,s.r,s.r); } ctx.globalAlpha=1;
  for(const b of bullets){
    for(let k=2;k>=1;k--){ ctx.globalAlpha=0.16/k; ctx.fillStyle=b.col; ctx.beginPath(); ctx.arc(b.x-b.vx*k*1.7,b.y-b.vy*k*1.7,b.r*(0.85-0.15*k),0,7); ctx.fill(); } ctx.globalAlpha=1;   // floaty trail
    ctx.globalAlpha=.16; ctx.fillStyle=b.col; ctx.beginPath(); ctx.arc(b.x,b.y,b.r*1.9,0,7); ctx.fill(); ctx.globalAlpha=1;
    ctx.fillStyle=b.col; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,7); ctx.fill();
    if(b.homing){ ctx.globalAlpha=.55; ctx.strokeStyle='#e0d4ff'; ctx.lineWidth=1; ctx.beginPath(); ctx.arc(b.x,b.y,b.r+2,0,7); ctx.stroke(); ctx.globalAlpha=1; }
    ctx.fillStyle='rgba(255,255,255,.85)'; ctx.beginPath(); ctx.arc(b.x-b.r*0.32,b.y-b.r*0.32,b.r*0.34,0,7); ctx.fill(); }
  if(player&&!dead) drawPlayer();
  for(const p of puffs){ ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.c; ctx.fillRect((p.x-p.r)|0,(p.y-p.r)|0,(p.r*2)|0,(p.r*2)|0); } ctx.globalAlpha=1;
  ctx.restore();
  // blit chunky buffer -> screen (nearest neighbour)
  screen2.setTransform(1,0,0,1,0,0); screen2.imageSmoothingEnabled=false; screen2.clearRect(0,0,cv.width,cv.height);
  screen2.drawImage(bf,0,0,BW,BH,0,0,cv.width,cv.height);
  drawUI();
}
function drawArena(){ const w=AX1-AX0,h=AY1-AY0;
  const g=ctx.createLinearGradient(0,AY0,0,AY1); g.addColorStop(0,'#15233f'); g.addColorStop(0.5,'#0f1a32'); g.addColorStop(1,'#0b1428'); ctx.fillStyle=g; rr(ctx,AX0,AY0,w,h,18); ctx.fill();
  ctx.save(); rr(ctx,AX0,AY0,w,h,18); ctx.clip(); ctx.strokeStyle='rgba(126,180,255,.04)'; ctx.lineWidth=1;
  for(let x=AX0+36;x<AX1;x+=36){ ctx.beginPath(); ctx.moveTo(x,AY0); ctx.lineTo(x,AY1); ctx.stroke(); }
  for(let y=AY0+36;y<AY1;y+=36){ ctx.beginPath(); ctx.moveTo(AX0,y); ctx.lineTo(AX1,y); ctx.stroke(); } ctx.restore();
  ctx.lineWidth=2; ctx.strokeStyle='rgba(126,200,255,.55)'; rr(ctx,AX0,AY0,w,h,18); ctx.stroke(); }
const NEB=[[0.28,0.24,'rgba(86,120,205,0.11)'],[0.74,0.46,'rgba(150,92,205,0.10)'],[0.5,0.82,'rgba(58,165,170,0.09)']];
function drawNebula(){ const w=AX1-AX0,h=AY1-AY0,rr2=Math.min(w,h)*0.62;
  for(let i=0;i<NEB.length;i++){ const b=NEB[i], cx=AX0+w*b[0]+Math.sin(tick*0.004+i)*26, cy=AY0+h*b[1]+Math.cos(tick*0.005+i*2)*26;
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,rr2); g.addColorStop(0,b[2]); g.addColorStop(1,'rgba(0,0,0,0)'); ctx.fillStyle=g; ctx.fillRect(AX0,AY0,w,h); } }
function drawBoss(){ const b=boss, mx=b.x, my=b.y+10, L=(AX1-AX0)+(AY1-AY0), charging=b.state!=='idle';
  if(b.state==='charge'){ const u=1-b.t/46; ctx.globalAlpha=0.25+0.35*Math.abs(Math.sin(tick*0.6)); ctx.strokeStyle='#ff7a3a'; ctx.lineWidth=1+u*2.5; ctx.beginPath(); ctx.moveTo(mx,my); ctx.lineTo(mx+Math.cos(b.ang)*L,my+Math.sin(b.ang)*L); ctx.stroke(); ctx.globalAlpha=1; }   // charge telegraph
  if(b.state==='fire'){ ctx.save(); ctx.translate(mx,my); ctx.rotate(b.ang); const w=15+Math.sin(tick*0.8)*3;   // flame line
    const g=ctx.createLinearGradient(0,-w,0,w); g.addColorStop(0,'rgba(255,110,40,0)'); g.addColorStop(0.5,'#ffb24a'); g.addColorStop(1,'rgba(255,110,40,0)'); ctx.fillStyle=g; ctx.fillRect(0,-w,L,w*2);
    const cw=w*0.42+Math.sin(tick*1.1)*2; ctx.fillStyle='#fff3c0'; ctx.fillRect(0,-cw,L,cw*2); ctx.restore(); }
  ctx.save(); ctx.translate(b.x,b.y);
  ctx.globalAlpha=charging?0.32:0.16; ctx.fillStyle='#ff5a3a'; ctx.beginPath(); ctx.arc(0,4,30,0,7); ctx.fill(); ctx.globalAlpha=1;
  ctx.fillStyle='#e8d8c0'; ctx.beginPath(); ctx.moveTo(-15,-12); ctx.lineTo(-26,-30); ctx.lineTo(-6,-16); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(15,-12); ctx.lineTo(26,-30); ctx.lineTo(6,-16); ctx.closePath(); ctx.fill();   // horns
  const hg=ctx.createRadialGradient(-6,-8,3,0,0,24); hg.addColorStop(0,'#834040'); hg.addColorStop(1,'#3a1018'); ctx.fillStyle=hg; ctx.beginPath(); ctx.arc(0,0,22,0,7); ctx.fill();
  ctx.lineWidth=2.4; ctx.strokeStyle='#ff7a5a'; ctx.stroke();
  ctx.fillStyle=charging?'#fff0a0':'#ffd23a'; ctx.beginPath(); ctx.arc(-8,-3,4.2,0,7); ctx.arc(8,-3,4.2,0,7); ctx.fill();
  ctx.fillStyle='#2a0a10'; ctx.beginPath(); ctx.arc(-8,-3,1.8,0,7); ctx.arc(8,-3,1.8,0,7); ctx.fill();
  ctx.strokeStyle='#2a0a10'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(-14,-10); ctx.lineTo(-3,-6); ctx.moveTo(14,-10); ctx.lineTo(3,-6); ctx.stroke();   // brows
  const mo=b.state==='fire'?7:(charging?4:2); ctx.fillStyle='#1a0408'; ctx.beginPath(); ctx.ellipse(0,12,10,mo,0,0,7); ctx.fill();
  if(charging){ ctx.fillStyle=b.state==='fire'?'#fff3c0':'#ff8a3a'; ctx.beginPath(); ctx.ellipse(0,12,6,mo*0.7,0,0,7); ctx.fill(); }
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.moveTo(-5,10); ctx.lineTo(-3,15); ctx.lineTo(-1,10); ctx.closePath(); ctx.moveTo(5,10); ctx.lineTo(3,15); ctx.lineTo(1,10); ctx.closePath(); ctx.fill();   // fangs
  ctx.restore(); }
function drawPlayer(){ const p=player; ctx.save(); ctx.translate(p.x,p.y); const blink=p.invuln>0&&Math.floor(tick*0.4)%2===0;
  ctx.globalAlpha=blink?0.05:(p.focus?.2:.13); ctx.fillStyle='#7edcff'; ctx.beginPath(); ctx.arc(0,0,PR*1.8,0,7); ctx.fill(); ctx.globalAlpha=1;
  ctx.fillStyle='rgba(4,9,20,.35)'; ctx.beginPath(); ctx.ellipse(0,PR*0.92,PR*0.78,PR*0.3,0,0,7); ctx.fill();
  ctx.globalAlpha=blink?0.5:1;
  ctx.fillStyle='#ffd07a'; ctx.beginPath(); ctx.ellipse(-PR*0.38,PR*0.74,PR*0.26,PR*0.16,0,0,7); ctx.ellipse(PR*0.38,PR*0.74,PR*0.26,PR*0.16,0,0,7); ctx.fill();   // feet
  ctx.strokeStyle='#b9a98f'; ctx.lineWidth=2.2; ctx.beginPath(); ctx.moveTo(PR*0.2,-PR*0.74); ctx.quadraticCurveTo(PR*0.75,-PR*1.15,PR*0.5,-PR*1.5); ctx.stroke();
  const sp=2.3+Math.sin(tick*0.5)*0.8; ctx.fillStyle='#ffd76a'; ctx.beginPath(); ctx.arc(PR*0.5,-PR*1.5,sp,0,7); ctx.fill(); ctx.fillStyle='#fff3c0'; ctx.beginPath(); ctx.arc(PR*0.5,-PR*1.5,sp*0.5,0,7); ctx.fill();
  const bg=ctx.createRadialGradient(-PR*0.3,-PR*0.34,2,0,0,PR*0.86); bg.addColorStop(0,'#46546f'); bg.addColorStop(1,'#1a2233'); ctx.fillStyle=bg;
  ctx.beginPath(); ctx.arc(0,0,PR*0.86,0,7); ctx.fill(); ctx.lineWidth=2.2; ctx.strokeStyle='#7edcff'; ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.22)'; ctx.beginPath(); ctx.ellipse(-PR*0.3,-PR*0.34,PR*0.26,PR*0.16,-0.6,0,7); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-PR*0.26,-PR*0.04,PR*0.21,0,7); ctx.arc(PR*0.26,-PR*0.04,PR*0.21,0,7); ctx.fill();
  ctx.fillStyle='#16324a'; ctx.beginPath(); ctx.arc(-PR*0.22,0,PR*0.1,0,7); ctx.arc(PR*0.3,0,PR*0.1,0,7); ctx.fill();
  ctx.globalAlpha=1;
  if(p.focus){ ctx.globalAlpha=.55; ctx.strokeStyle='#aee9ff'; ctx.lineWidth=1.4; ctx.setLineDash([4,4]); ctx.beginPath(); ctx.arc(0,0,PR+5,tick*0.06,tick*0.06+7); ctx.stroke(); ctx.setLineDash([]); ctx.globalAlpha=1; }
  ctx.fillStyle='#ff2f5f'; ctx.beginPath(); ctx.arc(0,0,R_HIT,0,7); ctx.fill(); ctx.lineWidth=1.2; ctx.strokeStyle='#fff'; ctx.beginPath(); ctx.arc(0,0,R_HIT,0,7); ctx.stroke();
  ctx.restore(); }

/* ---------- UI layer (crisp) ---------- */
function drawUI(){ uctx.setTransform(DPR,0,0,DPR,0,0); uctx.clearRect(0,0,W,H); uctx.lineCap='round'; uctx.lineJoin='round';
  if(playing||dead){ timeHUD(); livesHUD(); if(playing){ drawPad(); } if(bannerT>0)drawBanner(); } }
function timeHUD(){ const t=(surviveT/60).toFixed(1); uctx.textAlign='center'; uctx.textBaseline='top';
  uctx.font='30px "Press Start 2P",monospace'; uctx.fillStyle='#f6fbff'; uctx.shadowColor='rgba(0,0,0,.9)'; uctx.shadowBlur=8; uctx.fillText(t,W/2,14); uctx.shadowBlur=0;
  uctx.font='9px "Press Start 2P",monospace'; uctx.fillStyle='rgba(207,226,247,.72)'; uctx.fillText('SEC  BEST '+save.best[diff].toFixed(1),W/2,56); uctx.textBaseline='alphabetic'; }
function livesHUD(){ uctx.save();
  uctx.font='9px "Press Start 2P",monospace'; uctx.fillStyle='rgba(207,226,247,.7)'; uctx.textAlign='left'; uctx.textBaseline='middle'; uctx.fillText('LIFE',16,36);
  for(let i=0;i<LIVES;i++){ const x=66+i*32, y=36, on=i<lives, danger=on&&lives===1;
    uctx.save(); uctx.translate(x,y); const s=danger?(1+0.14*Math.sin(tick*0.32)):1; uctx.scale(s,s);
    uctx.fillStyle=on?(danger?'#ff4d66':'#46546f'):'rgba(34,42,58,.5)'; uctx.beginPath(); uctx.arc(0,1,10,0,7); uctx.fill();
    uctx.lineWidth=2.2; uctx.strokeStyle=on?(danger?'#ffd0d8':'#7edcff'):'rgba(96,108,130,.6)'; uctx.beginPath(); uctx.arc(0,1,10,0,7); uctx.stroke();
    if(on){ uctx.strokeStyle='#b9a98f'; uctx.lineWidth=2; uctx.beginPath(); uctx.moveTo(3,-8); uctx.lineTo(7,-14); uctx.stroke();
      uctx.fillStyle='#ffd76a'; uctx.beginPath(); uctx.arc(7,-14,2.6,0,7); uctx.fill();
      uctx.fillStyle='#fff'; uctx.beginPath(); uctx.arc(-3.4,0,2,0,7); uctx.arc(3.4,0,2,0,7); uctx.fill();
      uctx.fillStyle='#16324a'; uctx.beginPath(); uctx.arc(-3.4,0,0.9,0,7); uctx.arc(3.4,0,0.9,0,7); uctx.fill();
    } else { uctx.strokeStyle='rgba(255,120,140,.85)'; uctx.lineWidth=2.4; uctx.beginPath(); uctx.moveTo(-5,-4); uctx.lineTo(5,6); uctx.moveTo(5,-4); uctx.lineTo(-5,6); uctx.stroke(); }
    uctx.restore(); }
  uctx.restore(); }
function drawPad(){ const R=PADR(); if(pad.a){ const x=pad.bx,y=pad.by; uctx.fillStyle='rgba(255,255,255,.06)'; uctx.beginPath(); uctx.arc(x,y,R,0,7); uctx.fill();
    uctx.strokeStyle='rgba(255,255,255,.24)'; uctx.lineWidth=2.5; uctx.beginPath(); uctx.arc(x,y,R,0,7); uctx.stroke();
    let dx=pad.tx-pad.bx,dy=pad.ty-pad.by,len=Math.hypot(dx,dy); if(len>R){dx*=R/len;dy*=R/len;} uctx.fillStyle='#eaf6ff'; uctx.beginPath(); uctx.arc(x+dx,y+dy,R*0.3,0,7); uctx.fill();
    uctx.fillStyle='#06101f'; uctx.beginPath(); uctx.arc(x+dx,y+dy,5,0,7); uctx.fill();
  } else { const x=PADR()+24,y=H-PADR()-22; uctx.fillStyle='rgba(255,255,255,.05)'; uctx.beginPath(); uctx.arc(x,y,R,0,7); uctx.fill();
    uctx.strokeStyle='rgba(255,255,255,.2)'; uctx.lineWidth=2; uctx.beginPath(); uctx.arc(x,y,R,0,7); uctx.stroke();
    uctx.globalAlpha=.5; uctx.fillStyle='#cfe2f7'; uctx.font='10px "Press Start 2P",monospace'; uctx.textAlign='center'; uctx.textBaseline='middle'; uctx.fillText('MOVE',x,y); uctx.textBaseline='alphabetic'; uctx.globalAlpha=1; } }
function drawBanner(){ uctx.save(); uctx.globalAlpha=Math.min(1,bannerT/14); uctx.textAlign='center'; uctx.textBaseline='middle';
  const fs=Math.round(Math.min(W,H)*0.045); uctx.font=fs+'px "DotGothic16",sans-serif';
  const tw=uctx.measureText(banner).width,bw=tw+50,bh=fs+22,cx=W/2,cy=H*0.2,bx=cx-bw/2,by=cy-bh/2;
  uctx.fillStyle='rgba(7,16,31,.86)'; uctx.shadowColor='#ffd76a'; uctx.shadowBlur=12; rr(uctx,bx,by,bw,bh,14); uctx.fill(); uctx.shadowBlur=0;
  uctx.lineWidth=2.5; uctx.strokeStyle='#ffd76a'; rr(uctx,bx,by,bw,bh,14); uctx.stroke(); uctx.fillStyle='#ffd76a'; uctx.fillText(banner,cx,cy+1); uctx.textBaseline='alphabetic'; uctx.restore(); }

/* ---------- loop / flow ---------- */
function loop(){ tick++; if(bannerT>0)bannerT--; if(playing) step(); else stepPuffs(); draw(); requestAnimationFrame(loop); }
const ovEl=document.getElementById('overlay'),taglineEl=document.getElementById('tagline'),logoEl=document.getElementById('logo'),
  howlistEl=document.getElementById('howlist'),optsEl=document.getElementById('opts'),resTitleEl=document.getElementById('resTitle'),resSubEl=document.getElementById('resSub'),
  startBtn=document.getElementById('startBtn'),homeBtn=document.getElementById('homeBtn'),diffSegEl=document.getElementById('diffSeg'),bestLine=document.getElementById('bestLine');
function renderOpts(){ bestLine.textContent='ベスト記録 '+save.best[save.diff].toFixed(1)+' 秒';
  diffSegEl.innerHTML=''; DIFF.forEach((d,i)=>{ const b=document.createElement('button'); b.textContent=d.n; if(i===save.diff)b.className='on'; b.onclick=()=>{save.diff=i;diff=i;persist();renderOpts();}; diffSegEl.appendChild(b); }); }
function showHome(){ playing=false; dead=false; stopBGM(); ovEl.classList.remove('hide'); taglineEl.style.display=''; logoEl.style.display=''; optsEl.style.display='flex'; howlistEl.style.display='flex';
  resTitleEl.style.display='none'; resSubEl.style.display='none'; homeBtn.style.display='none'; startBtn.textContent='はじめる'; renderOpts(); }
function startGame(){ actx(); fitCanvas(); layoutUI(); diff=save.diff; resetWorld(); pad.a=false; pad.id=-1; playing=true;
  banner='START!'; bannerT=56; ovEl.classList.add('hide'); optsEl.style.display='none'; startBGM(); }
function endGame(sec,best){ stopBGM(); ovEl.classList.remove('hide'); taglineEl.style.display=''; logoEl.style.display='none'; howlistEl.style.display='none'; optsEl.style.display='none';
  resTitleEl.style.display='block'; resSubEl.style.display='block'; resTitleEl.textContent=sec.toFixed(1)+' 秒'; resTitleEl.style.color='#ff7f93';
  resSubEl.innerHTML=best?'<b style="color:#ffd76a">★ ベスト更新！</b>':('ベスト '+save.best[diff].toFixed(1)+' 秒'); if(best)sfxBest(); startBtn.textContent='もう一度'; homeBtn.style.display=''; }
startBtn.onclick=startGame; homeBtn.onclick=showHome;
document.getElementById('icBomb').innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="#7edcff" stroke-width="1.7" stroke-linecap="round"><circle cx="11" cy="15" r="6" fill="#46546f"/><path d="M15 9l2-3"/><circle cx="17.6" cy="5.4" r="1.4" fill="#ffd76a" stroke="none"/></svg>';
document.getElementById('icMove').innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="#7edcff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v16M4 12h16M12 4l-3 3M12 4l3 3M12 20l-3-3M12 20l3-3M4 12l3-3M4 12l3 3M20 12l-3-3M20 12l-3 3"/></svg>';
document.getElementById('icHeart').innerHTML='<svg viewBox="0 0 24 24" fill="#ff7f93" stroke="none"><path d="M12 20s-7-4.4-7-9.3A3.7 3.7 0 0 1 12 8a3.7 3.7 0 0 1 7 2.7C19 15.6 12 20 12 20z"/></svg>';
const muteBtn=document.getElementById('muteBtn');
const ICON_ON='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"><path d="M4 9v6h4l5 4V5L8 9z" fill="currentColor" stroke="none"/><path d="M16.5 8.5a5 5 0 0 1 0 7"/><path d="M19 6a8 8 0 0 1 0 12"/></svg>';
const ICON_OFF='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"><path d="M4 9v6h4l5 4V5L8 9z" fill="currentColor" stroke="none"/><path d="M16 9l5 6M21 9l-5 6"/></svg>';
function refreshMute(){ muteBtn.innerHTML=muted?ICON_OFF:ICON_ON; muteBtn.style.color=muted?'#7f93b0':'#cfe2f7'; }
muteBtn.onclick=()=>{ actx(); setMuted(!muted); refreshMute(); }; refreshMute();
function checkRotate(){ document.getElementById('rotate').classList.toggle('show', window.innerWidth>window.innerHeight && 'ontouchstart' in window); }
window.addEventListener('orientationchange',()=>setTimeout(()=>{fitCanvas();layoutUI();checkRotate();},200));
if(document.fonts&&document.fonts.load){ document.fonts.load('30px "Press Start 2P"'); document.fonts.load('20px "DotGothic16"'); }
fitCanvas(); layoutUI(); renderOpts(); checkRotate(); loop();
