<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>スノーフレンズ — チーム雪合戦（旗取り）</title>
<meta name="theme-color" content="#0a1426">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Exo+2:wght@400;600;700&family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#0a1426; --tx:#f2f8ff; --tx2:#a9bdd8; --c1:#7edcff; --c2:#ff7f93; --gold:#ffd76a;
    --glass:linear-gradient(180deg,rgba(13,27,48,.84),rgba(7,16,31,.9)); --line:rgba(126,220,255,.18); --rad:22px; }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
  html,body{ height:100%; background:var(--bg); overflow:hidden; font-family:"Exo 2",sans-serif; color:var(--tx2); }
  .orb{ font-family:"Orbitron",sans-serif; }
  #stage{ position:fixed; inset:0; }
  #stage canvas{ position:absolute; inset:0; width:100%; height:100%; }
  canvas#cv{ z-index:1; touch-action:none; background:#0c1830; }
  canvas#ui{ z-index:3; pointer-events:none; }
  #stage::after{ content:""; position:absolute; inset:0; pointer-events:none; z-index:2;
    background:radial-gradient(135% 135% at 50% 45%, #0000 60%, #00000050 100%); }
  #rotate{ position:fixed; inset:0; z-index:60; display:none; flex-direction:column; align-items:center; justify-content:center; gap:14px; background:#070d18; text-align:center; }
  #rotate.show{ display:flex; }
  #rotate .phone{ width:46px; height:74px; border:3px solid var(--tx2); border-radius:9px; animation:rot 1.8s ease-in-out infinite; }
  @keyframes rot{ 0%,40%{transform:rotate(-90deg)} 60%,100%{transform:rotate(0)} }
  #rotate h2{ font-family:"Orbitron"; color:var(--tx); letter-spacing:3px; }
  #overlay{ position:fixed; inset:0; z-index:40; display:flex; align-items:center; justify-content:center; text-align:center; overflow:auto; padding:16px;
    background:radial-gradient(130% 130% at 50% 30%, rgba(8,16,30,.26), rgba(5,9,18,.5)); }
  #overlay::after{ content:""; position:absolute; inset:0; pointer-events:none; opacity:.35; background:repeating-linear-gradient(0deg,#0000 0 2px,#0000000d 2px 3px); }
  #overlay.hide{ display:none; }
  .inner{ position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:16px; padding:32px 36px; margin:auto; width:min(540px,94vw);
    background:var(--glass); border:1px solid var(--line); border-radius:var(--rad);
    box-shadow:0 34px 90px -24px #000d, inset 0 1px 0 #ffffff14; -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px); }
  .tagline{ font-family:"Orbitron"; font-weight:500; font-size:11px; letter-spacing:5px; color:#8fb6dd; }
  #logo{ font-family:"Noto Sans JP",sans-serif; font-weight:900; font-size:clamp(36px,9vw,68px); letter-spacing:2px; color:var(--tx); line-height:1.05; text-shadow:0 0 30px rgba(126,220,255,.3), 0 3px 0 #081223; }
  #logo .b{ color:var(--c1); }
  #logo .on{ display:block; font-family:"Orbitron"; font-weight:700; font-size:clamp(12px,3vw,17px); letter-spacing:8px; color:var(--c1); margin-top:9px; }
  #resTitle{ font-family:"Orbitron"; font-weight:900; font-size:clamp(30px,7vw,54px); letter-spacing:3px; display:none; text-shadow:0 0 26px currentColor,0 3px 0 #06101f; }
  #resSub{ font-size:14px; color:var(--tx2); display:none; }
  .howto{ font-size:13px; line-height:1.8; color:var(--tx2); max-width:440px; }
  .howto b{ color:var(--tx); }
  .btnrow{ display:flex; gap:11px; flex-wrap:wrap; justify-content:center; margin-top:2px; }
  .start{ font-family:"Orbitron"; font-weight:700; letter-spacing:2px; font-size:18px; color:#04121f; cursor:pointer; padding:15px 44px; border:none; border-radius:14px;
    background:linear-gradient(180deg,#a7ecff,#3aa9e6); box-shadow:0 14px 30px -10px rgba(58,169,230,.7), inset 0 1px 0 #ffffffb0; transition:transform .06s,filter .12s; }
  .start:hover{ filter:brightness(1.06); } .start:active{ transform:translateY(2px); }
  .ghost{ font-family:"Orbitron"; font-weight:700; letter-spacing:2px; font-size:14px; cursor:pointer; color:#cfe2f7; padding:14px 24px; border-radius:14px;
    background:rgba(126,220,255,.07); border:1px solid rgba(126,220,255,.22); transition:transform .06s,background .12s; }
  .ghost:hover{ background:rgba(126,220,255,.13); } .ghost:active{ transform:translateY(2px); }
  .credit{ font-size:10.5px; color:#6f86a8; letter-spacing:.5px; }
  @media (max-height:480px){ .inner{ gap:10px; padding:18px 22px; } #logo{ font-size:clamp(28px,8vh,46px);} .howto{ font-size:11px; line-height:1.5;} .credit{display:none;} }
</style>
</head>
<body>
<div id="stage"><canvas id="cv"></canvas><canvas id="ui"></canvas></div>
<div id="rotate"><div class="phone"></div><h2>PLEASE ROTATE</h2><p>縦画面（タテ向き）でプレイしてください</p></div>
<div id="overlay"><div class="inner">
  <div class="tagline" id="tagline">TOP-DOWN TEAM SNOWBALL FIGHT</div>
  <div id="logo">ゆき<span class="b">がっせん</span><span class="on">SNOW FRIENDS</span></div>
  <div id="resTitle" class="orb"></div>
  <div id="resSub"></div>
  <div class="howto" id="howto">
    <b>左パッド</b>＝移動 ／ <b>右パッド</b>＝ねらって投げる（パッ放しで最寄りの敵へ自動）<br>
    中央の<b>川は渡れない</b>。川ごしに雪玉を当て合おう（雪玉は <b>3発</b>→少し待つと補充）。<br>
    相手を<b>全員ダウン</b>させたらラウンド勝ち。先に <b>3ラウンド</b> 先取で勝利！
  </div>
  <div class="btnrow"><button class="start orb" id="startBtn">はじめる</button><button class="ghost orb" id="homeBtn" style="display:none">ホーム</button></div>
  <div class="credit">プロトタイプ ／ 横画面・スマホ対応 ／ オリジナル作品</div>
</div></div>

<script>
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const uic=document.getElementById('ui'), uctx=uic.getContext('2d');
let W=720,H=1280,VW=720,VH=1280,DPR=1,scl=1,uscl=1,FH=1280;
function fitCanvas(){ VW=Math.max(300,Math.floor(window.innerWidth)); VH=Math.max(360,Math.floor(window.innerHeight));
  DPR=Math.min(window.devicePixelRatio||1,2); W=VW; H=VH;
  cv.width=Math.round(VW*DPR); cv.height=Math.round(VH*DPR); scl=cv.width/W;
  uic.width=Math.round(VW*DPR); uic.height=Math.round(VH*DPR); uscl=uic.width/W;
  const pr=Math.max(58,Math.min(W,H)*0.16); FH=H-Math.round(pr*2+40); }   // reserve bottom band for the pads (+gutter)
window.addEventListener('resize',()=>{ fitCanvas(); if(!playing)buildArena(); layoutUI(); checkRotate(); });

/* ---------- constants ---------- */
const TEAM=2, ROUND_WIN=3, HP=2, AMMO_MAX=3, RELOAD=80, THROW_CD=16;
const BALL_SPD=8, BALL_R=6, HIT_R=16, PR=14, MOVE=1.9;
function riverBand(){ const w=Math.max(52,FH*0.095); return {t:FH/2-w/2, b:FH/2+w/2, w}; }   // no-cross river down the middle
const COL=[{body:'#7edcff',dark:'#2c93cf',belly:'#dff5ff',name:'あなた'},{body:'#ff8aa0',dark:'#d9536e',belly:'#ffe0e7',name:'てき'}];
const PADR=()=>Math.max(58,Math.min(W,H)*0.16);

/* ---------- audio ---------- */
let AC=null; const actx=()=>{ if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}return AC; };
function beep(f,d,t='sine',v=.16,s=0){ const a=actx(); if(!a)return; const o=a.createOscillator(),g=a.createGain(); o.type=t; o.frequency.value=f;
  if(s)o.frequency.exponentialRampToValueAtTime(Math.max(40,f+s),a.currentTime+d); g.gain.value=v; g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+d);
  o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime+d); }
function sfxThrow(){ beep(560,0.1,'triangle',0.1,-260); }
function sfxHit(){ const a=actx(); if(!a)return; const b=a.createBuffer(1,2400,a.sampleRate),d=b.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2.4); const s=a.createBufferSource(); s.buffer=b;
  const g=a.createGain(); g.gain.value=0.32; g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+0.15); s.connect(g); g.connect(a.destination); s.start(); }
function sfxCap(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.16,'triangle',0.13),i*90)); }
function sfxWin(){ [523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>beep(f,0.2,'triangle',0.14),i*110)); }
function sfxLose(){ [392,330,262].forEach((f,i)=>setTimeout(()=>beep(f,0.24,'sine',0.14),i*150)); }

/* ---------- world ---------- */
let forts=[], snowflakes=[], bumps=[];
let bases=[{x:0,y:0},{x:0,y:0}];          // team home (spawn) points
function inFort(x,y,pad){ for(const f of forts){ if(x>f.x-pad&&x<f.x+f.w+pad&&y>f.y-pad&&y<f.y+f.h+pad)return f; } return null; }
function buildArena(){
  const mB=Math.max(40,FH*0.05), mT=Math.max(104,FH*0.12);   // top margin so the enemy spawn clears the score bar
  bases=[{x:W/2,y:FH-mB-14},{x:W/2,y:mT+14}];   // team0 (you) = bottom, team1 (enemy) = top
  // a few cover walls per half (kept low — river is the divider)
  forts=[]; const t=Math.max(18,Math.min(W,H)*0.02);
  const add=(x,y,w,h)=>forts.push({x:x-w/2,y:y-h/2,w,h});
  [-1,1].forEach(s=>{ const yy=FH/2 + s*FH*0.26;
    add(W*0.32, yy, W*0.30, t); add(W*0.74, yy, W*0.22, t); });
  // decorations (within the field, away from the river)
  snowflakes=[]; for(let i=0;i<60;i++) snowflakes.push({x:Math.random()*W,y:Math.random()*FH,r:0.6+Math.random()*1.6,a:Math.random()*7});
  bumps=[]; for(let i=0;i<30;i++) bumps.push({x:Math.random()*W,y:Math.random()*FH,r:6+Math.random()*16});
}

/* ---------- entities ---------- */
let units=[], balls=[], puffs=[], me=null;
function makeUnit(team,idx,human){ const b=bases[team], dir=team===0?-1:1;   // team0 bottom faces up
  return {team,idx,human,x:b.x+(idx-1)*62,y:b.y+dir*26,vx:0,vy:0,hp:HP,dead:false,deadT:0,
          ammo:AMMO_MAX,regen:0,cd:0,face:team===0?-Math.PI/2:Math.PI/2,flash:0,role:idx===0?'attack':(idx===1?'mid':'defend'),
          aiT:0,aiAim:0,aiThrow:0,moveX:0,moveY:0}; }
function resetUnits(){ units=[]; for(let t=0;t<2;t++)for(let i=0;i<TEAM;i++) units.push(makeUnit(t,i, t===0&&i===0)); me=units[0]; }

/* ---------- input ---------- */
const pad={move:{a:false,id:-1,bx:0,by:0,tx:0,ty:0}, aim:{a:false,id:-1,bx:0,by:0,tx:0,ty:0}};
function toW(e){ const r=cv.getBoundingClientRect(); return {x:(e.clientX-r.left)*(W/r.width),y:(e.clientY-r.top)*(H/r.height)}; }
function layoutUI(){}
function onDown(e){ if(!playing||intro>0)return; const p=toW(e); const which=p.x<W/2?'move':'aim'; const pd=pad[which]; if(pd.a)return;
  pd.a=true; pd.id=e.pointerId; pd.bx=pd.tx=p.x; pd.by=pd.ty=p.y; e.preventDefault(); }
function onMove(e){ const p=toW(e); for(const k of ['move','aim']){ const pd=pad[k]; if(pd.a&&pd.id===e.pointerId){ pd.tx=p.x; pd.ty=p.y; e.preventDefault(); } } }
function onUp(e){ for(const k of ['move','aim']){ const pd=pad[k]; if(pd.a&&pd.id===e.pointerId){ if(k==='aim')releaseThrow(); pd.a=false; pd.id=-1; } } }
cv.addEventListener('pointerdown',onDown); window.addEventListener('pointermove',onMove,{passive:false});
window.addEventListener('pointerup',onUp); window.addEventListener('pointercancel',onUp);
const keys={}; window.addEventListener('keydown',e=>{keys[e.key]=true; if(e.key===' ')e.preventDefault();}); window.addEventListener('keyup',e=>{keys[e.key]=false;});
function padVec(pd){ const dx=pd.tx-pd.bx,dy=pd.ty-pd.by,len=Math.hypot(dx,dy),R=PADR(); const f=Math.min(1,len/R); return {x:dx,y:dy,len,f,ang:Math.atan2(dy,dx)}; }
function releaseThrow(){ if(!me||me.dead)return; const v=padVec(pad.aim); let ang;
  if(v.f>=0.12) ang=v.ang; else { const t=nearestEnemy(me); if(!t)return; ang=Math.atan2(t.y-me.y,t.x-me.x); }
  throwBall(me,ang); }

/* ---------- combat ---------- */
function throwBall(u,ang){ if(u.dead||u.cd>0||u.ammo<=0)return; u.cd=THROW_CD; u.ammo--; u.regen=0; u.face=ang;
  balls.push({x:u.x+Math.cos(ang)*PR,y:u.y+Math.sin(ang)*PR,vx:Math.cos(ang)*BALL_SPD,vy:Math.sin(ang)*BALL_SPD,team:u.team,life:90});
  sfxThrow(); }
function nearestEnemy(u){ let best=null,bd=1e9; for(const o of units){ if(o.team===u.team||o.dead)continue; const d=Math.hypot(o.x-u.x,o.y-u.y); if(d<bd){bd=d;best=o;} } return best; }
function losClear(x0,y0,x1,y1){ const n=Math.ceil(Math.hypot(x1-x0,y1-y0)/10); for(let i=1;i<n;i++){ const t=i/n; if(inFort(x0+(x1-x0)*t,y0+(y1-y0)*t,2))return false; } return true; }
function stepBalls(){ for(let i=balls.length-1;i>=0;i--){ const b=balls[i];
  const steps=Math.max(1,Math.ceil(Math.hypot(b.vx,b.vy)/(HIT_R*0.6))); let gone=false;   // substep so fast balls never tunnel through a hit
  for(let s=0;s<steps&&!gone;s++){ b.x+=b.vx/steps; b.y+=b.vy/steps;
    if(b.x<0||b.x>W||b.y<0||b.y>FH){ gone=true; break; }
    if(inFort(b.x,b.y,0)){ puff(b.x,b.y,'#dbe8ff',5); gone=true; break; }
    for(const o of units){ if(o.team===b.team||o.dead)continue; if(Math.hypot(o.x-b.x,o.y-b.y)<HIT_R+BALL_R){ hitUnit(o,b); gone=true; break; } } }
  if(--b.life<=0)gone=true; if(gone)balls.splice(i,1); } }
function hitUnit(o,b){ o.hp--; o.flash=1; const a=Math.atan2(o.y-b.y,o.x-b.x); o.vx+=Math.cos(a)*3.4; o.vy+=Math.sin(a)*3.4;
  shake=Math.max(shake,6); puff(o.x,o.y,'#ffffff',7); sfxHit();
  if(o.hp<=0){ o.dead=true; puff(o.x,o.y,o.team===0?'#bfe8ff':'#ffd2db',13); shake=Math.max(shake,9);
    banner=(o.human?'やられた…':(o.team===1?'たおした！':'味方ダウン')); bannerT=50; checkRound(); } }

/* ---------- round / scoring (eliminate the enemy team) ---------- */
let wins=[0,0], round=1, roundOver=false;
function checkRound(){ if(roundOver)return; const aB=units.some(u=>u.team===0&&!u.dead), aR=units.some(u=>u.team===1&&!u.dead);
  if(aB&&aR)return; roundOver=true; const w=aB?0:1; wins[w]++; sfxCap();
  banner=(w===0?'ラウンド WON!':'ラウンド LOST'); bannerT=90;
  if(wins[w]>=ROUND_WIN){ setTimeout(()=>endGame(w),1100); } else { setTimeout(nextRound,1600); } }

/* ---------- movement / AI ---------- */
function moveUnit(u,mx,my){ if(u.dead)return;
  u.vx+=(mx*MOVE-u.vx)*0.2; u.vy+=(my*MOVE-u.vy)*0.2;
  // collide with forts (axis separated)
  let nx=u.x+u.vx; if(!inFort(nx,u.y,PR*0.7))u.x=nx; else u.vx*=-0.2;
  let ny=u.y+u.vy; if(!inFort(u.x,ny,PR*0.7))u.y=ny; else u.vy*=-0.2;
  u.x=Math.max(PR,Math.min(W-PR,u.x));
  const rb=riverBand();                                  // confine each team to its own half (can't cross the river)
  if(u.team===0) u.y=Math.max(rb.b+PR*0.5, Math.min(FH-PR, u.y));
  else           u.y=Math.min(rb.t-PR*0.5, Math.max(PR, u.y));
  if(Math.abs(mx)+Math.abs(my)>0.1)u.face=Math.atan2(my,mx);
  if(u.cd>0)u.cd--; if(u.flash>0)u.flash=Math.max(0,u.flash-0.08);
  if(u.ammo<AMMO_MAX){ u.regen++; if(u.regen>=RELOAD){ u.ammo=AMMO_MAX; u.regen=0; } }   // reload to full after a pause
}
function controlHuman(){ if(!me||me.dead)return;
  let mx=0,my=0; const m=pad.move; if(m.a){ const v=padVec(m),R=PADR(); if(v.len>R*0.16){ mx=Math.max(-1,Math.min(1,v.x/R)); my=Math.max(-1,Math.min(1,v.y/R)); } }
  if(keys['ArrowLeft']||keys['a'])mx=-1; if(keys['ArrowRight']||keys['d'])mx=1; if(keys['ArrowUp']||keys['w'])my=-1; if(keys['ArrowDown']||keys['s'])my=1;
  const l=Math.hypot(mx,my); if(l>1){mx/=l;my/=l;} moveUnit(me,mx,my);
}
function controlAI(u){ if(u.dead)return; const rb=riverBand(), e=nearestEnemy(u);
  // hold a line near the river bank on own side; spread out; defenders sit back a touch
  const bank = u.team===0 ? rb.b+PR+FH*0.06 : rb.t-PR-FH*0.06;
  let ty=bank + (u.role==='defend'?(u.team===0?FH*0.14:-FH*0.14):0);
  let tx=(e?e.x:W/2) + Math.sin(tick*0.025+u.idx*2)*W*0.13;
  for(const b of balls){ if(b.team===u.team)continue; const dx=u.x-b.x,dy=u.y-b.y; if(Math.hypot(dx,dy)<95 && (dx*b.vx+dy*b.vy)>0){ tx=u.x+(b.vx>=0?-1:1)*70; } } // dodge
  let ax=tx-u.x, ay=ty-u.y; const d=Math.hypot(ax,ay)||1; ax/=d; ay/=d; if(d<10){ax=0;ay=0;}
  if(inFort(u.x+ax*PR*2,u.y+ay*PR*2,PR*0.6)){ const t=ax; ax=-ay; ay=t; }
  moveUnit(u,ax,ay);
  if(e && u.cd<=0 && u.ammo>0 && losClear(u.x,u.y,e.x,e.y)){ if(--u.aiThrow<=0){ throwBall(u,Math.atan2(e.y-u.y,e.x-u.x)+(Math.random()*2-1)*0.1); u.aiThrow=20+(Math.random()*34|0); } }
}

/* ---------- particles ---------- */
function puff(x,y,c,r){ for(let i=0;i<5+r*0.5|0;i++){ const a=Math.random()*7,s=0.5+Math.random()*2.4; puffs.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,c,r:1+Math.random()*r*0.35}); } }
function stepPuffs(){ for(let i=puffs.length-1;i>=0;i--){ const p=puffs[i]; p.x+=p.vx; p.y+=p.vy; p.vx*=0.92; p.vy*=0.92; p.life-=0.05; if(p.life<=0)puffs.splice(i,1); } }
let shake=0;

/* ---------- render ---------- */
function draw(){ ctx.setTransform(scl,0,0,scl,0,0); ctx.imageSmoothingEnabled=true;
  ctx.save(); if(shake>0.4){ ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake); shake*=0.85; } else shake=0;
  // snow field (top area)
  const g=ctx.createLinearGradient(0,0,0,FH); g.addColorStop(0,'#e6eff9'); g.addColorStop(1,'#c6d6ec'); ctx.fillStyle=g; ctx.fillRect(0,0,W,FH);
  // soft bumps
  for(const b of bumps){ ctx.globalAlpha=.5; ctx.fillStyle='#ffffff'; ctx.beginPath(); ctx.ellipse(b.x,b.y,b.r,b.r*0.6,0,0,7); ctx.fill(); } ctx.globalAlpha=1;
  // half tints (your side blue / enemy side pink) + the dividing river
  ctx.fillStyle='rgba(126,220,255,.05)'; ctx.fillRect(0,FH/2,W,FH/2);
  ctx.fillStyle='rgba(255,127,147,.05)'; ctx.fillRect(0,0,W,FH/2);
  drawRiver();
  // control band (bottom) — distinct dark strip under the field
  const cb=ctx.createLinearGradient(0,FH,0,H); cb.addColorStop(0,'#0e1c33'); cb.addColorStop(1,'#0a1426'); ctx.fillStyle=cb; ctx.fillRect(0,FH,W,H-FH);
  ctx.strokeStyle='rgba(126,220,255,.18)'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(0,FH+1); ctx.lineTo(W,FH+1); ctx.stroke();
  // bases
  for(let t=0;t<2;t++){ const b=bases[t],c=COL[t]; ctx.globalAlpha=.5; ctx.fillStyle=c.body; ctx.beginPath(); ctx.arc(b.x,b.y,30,0,7); ctx.fill();
    ctx.globalAlpha=1; ctx.strokeStyle=c.dark; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(b.x,b.y,30,0,7); ctx.stroke(); }
  // forts
  for(const f of forts){ ctx.fillStyle='#eef5ff'; rr(ctx,f.x,f.y,f.w,f.h,6); ctx.fill();
    ctx.fillStyle='#cfe0f5'; rr(ctx,f.x,f.y+f.h-5,f.w,5,3); ctx.fill();
    ctx.strokeStyle='#b6c8e2'; ctx.lineWidth=1.5; rr(ctx,f.x,f.y,f.w,f.h,6); ctx.stroke(); }
  // units (sorted by y)
  const order=units.slice().sort((a,b)=>a.y-b.y); for(const u of order) drawDino(u);
  // balls
  for(const b of balls){ ctx.fillStyle='#0b162a22'; ctx.beginPath(); ctx.ellipse(b.x,b.y+4,BALL_R,BALL_R*0.5,0,0,7); ctx.fill();
    ctx.fillStyle='#ffffff'; ctx.beginPath(); ctx.arc(b.x,b.y,BALL_R,0,7); ctx.fill();
    ctx.fillStyle='#cfe2f7'; ctx.beginPath(); ctx.arc(b.x+2,b.y+2,BALL_R*0.5,0,7); ctx.fill(); }
  for(const p of puffs){ ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.c; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fill(); } ctx.globalAlpha=1;
  // snowfall
  ctx.fillStyle='#ffffff'; for(const f of snowflakes){ f.y+=0.5+f.r*0.2; f.x+=Math.sin(tick*0.02+f.a)*0.2; if(f.y>FH){f.y=-3;f.x=Math.random()*W;}
    ctx.globalAlpha=0.5+0.4*Math.sin(tick*0.05+f.a); ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,7); ctx.fill(); } ctx.globalAlpha=1;
  ctx.restore();
  drawUI();
}
function rr(c,x,y,w,h,r){ r=Math.min(r,w/2,h/2); c.beginPath(); c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r); c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath(); }
function drawRiver(){ const rb=riverBand(), t=rb.t, b=rb.b;
  // soft bank shadows on the snow
  let sh=ctx.createLinearGradient(0,t-12,0,t); sh.addColorStop(0,'rgba(10,24,43,0)'); sh.addColorStop(1,'rgba(10,24,43,.12)'); ctx.fillStyle=sh; ctx.fillRect(0,t-12,W,12);
  sh=ctx.createLinearGradient(0,b,0,b+12); sh.addColorStop(0,'rgba(10,24,43,.12)'); sh.addColorStop(1,'rgba(10,24,43,0)'); ctx.fillStyle=sh; ctx.fillRect(0,b,W,12);
  ctx.fillStyle='#d7e5f5'; ctx.fillRect(0,t-5,W,5); ctx.fillRect(0,b,W,5);          // snow banks
  const g=ctx.createLinearGradient(0,t,0,b); g.addColorStop(0,'#48a6da'); g.addColorStop(.5,'#2f86c4'); g.addColorStop(1,'#3f9bd0');
  ctx.fillStyle=g; ctx.fillRect(0,t,W,b-t);
  ctx.fillStyle='rgba(35,91,130,.45)'; ctx.fillRect(0,t,W,1.5); ctx.fillRect(0,b-1.5,W,1.5);   // inner edges
  ctx.strokeStyle='rgba(255,255,255,.35)'; ctx.lineWidth=2;
  for(let k=0;k<3;k++){ const yy=t+rb.w*(0.28+k*0.24); ctx.beginPath();
    for(let x=0;x<=W;x+=12){ const oy=Math.sin(x*0.05+tick*0.06+k*1.6)*2.2; x===0?ctx.moveTo(x,yy+oy):ctx.lineTo(x,yy+oy); } ctx.stroke(); }
  ctx.fillStyle='rgba(255,255,255,.5)'; for(let i=0;i<7;i++){ const x=((i*149+tick*1.3)%W), yy=t+((i*47)%Math.max(1,(rb.w-3))); ctx.fillRect(x,yy,2,1.5); } }
function drawDino(u){ const c=COL[u.team]; ctx.save(); ctx.translate(u.x,u.y);
  ctx.fillStyle='#0b162a33'; ctx.beginPath(); ctx.ellipse(0,PR*0.7,PR*0.9,PR*0.4,0,0,7); ctx.fill();
  if(u.dead){ ctx.globalAlpha=.55; ctx.fillStyle=c.body; ctx.beginPath(); ctx.arc(0,0,PR*0.7,0,7); ctx.fill();
    ctx.globalAlpha=1; ctx.strokeStyle='#0b1f33'; ctx.lineWidth=2.4; ctx.lineCap='round';   // clean X eyes
    ctx.beginPath(); ctx.moveTo(-6,-3); ctx.lineTo(-2,1); ctx.moveTo(-2,-3); ctx.lineTo(-6,1);
    ctx.moveTo(2,-3); ctx.lineTo(6,1); ctx.moveTo(6,-3); ctx.lineTo(2,1); ctx.stroke(); ctx.restore(); return; }
  ctx.rotate(u.face+Math.PI/2);  // face points up at angle 0
  ctx.lineJoin='round';
  // tail
  ctx.fillStyle=c.dark; ctx.beginPath(); ctx.ellipse(0,PR*0.8,PR*0.32,PR*0.5,0,0,7); ctx.fill();
  // body (with outline for contrast)
  ctx.fillStyle=c.body; ctx.strokeStyle='rgba(8,18,35,.3)'; ctx.lineWidth=1.6;
  ctx.beginPath(); ctx.ellipse(0,0,PR*0.82,PR*0.95,0,0,7); ctx.fill(); ctx.stroke();
  ctx.fillStyle=c.belly; ctx.beginPath(); ctx.ellipse(0,PR*0.18,PR*0.5,PR*0.6,0,0,7); ctx.fill();
  // little spikes
  ctx.fillStyle=c.dark; for(let s=-1;s<=1;s++){ ctx.beginPath(); ctx.arc(s*5,-PR*0.5,2.2,0,7); ctx.fill(); }
  // forward snout marker (shows facing clearly)
  ctx.fillStyle=c.dark; ctx.beginPath(); ctx.moveTo(-4,-PR*1.02); ctx.lineTo(4,-PR*1.02); ctx.lineTo(0,-PR*1.24); ctx.closePath(); ctx.fill();
  // head
  ctx.fillStyle=c.body; ctx.beginPath(); ctx.arc(0,-PR*0.62,PR*0.55,0,7); ctx.fill(); ctx.stroke();
  // eyes
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-5,-PR*0.78,3.4,0,7); ctx.arc(5,-PR*0.78,3.4,0,7); ctx.fill();
  ctx.fillStyle='#16324a'; ctx.beginPath(); ctx.arc(-5,-PR*0.82,1.6,0,7); ctx.arc(5,-PR*0.82,1.6,0,7); ctx.fill();
  if(u.flash>0){ ctx.globalAlpha=u.flash*0.8; ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(0,0,PR*1.05,0,7); ctx.fill(); ctx.globalAlpha=1; }
  ctx.restore();
  // hp pips + you marker (screen-up, not rotated)
  if(u.human){ ctx.fillStyle='#ffd76a'; ctx.beginPath(); ctx.moveTo(u.x,u.y-PR-12); ctx.lineTo(u.x+5,u.y-PR-4); ctx.lineTo(u.x-5,u.y-PR-4); ctx.closePath(); ctx.fill(); }
}

/* ---------- UI layer ---------- */
let intro=0, banner='', bannerT=0, tick=0;
function drawUI(){ uctx.setTransform(uscl,0,0,uscl,0,0); uctx.clearRect(0,0,W,H); uctx.lineCap='round'; uctx.lineJoin='round';
  if(playing){ scoreHUD(); if(me){ ammoHUD(); if(me.dead) deadHUD(); } drawPads(); if(bannerT>0)drawBanner(); }
}
function scoreHUD(){ const aB=units.filter(u=>u.team===0&&!u.dead).length, aR=units.filter(u=>u.team===1&&!u.dead).length;
  const w=Math.min(W-20,330), h=60, x=(W-w)/2, y=10;
  uctx.fillStyle='rgba(7,16,31,.66)'; rr(uctx,x,y,w,h,16); uctx.fill();
  uctx.lineWidth=1.4; uctx.strokeStyle='rgba(126,220,255,.26)'; rr(uctx,x,y,w,h,16); uctx.stroke();
  uctx.strokeStyle='rgba(255,255,255,.10)'; uctx.lineWidth=1; rr(uctx,x+1,y+1,w-2,h-2,15); uctx.stroke();
  teamChip(x+16,y+h/2,COL[0],'YOU',wins[0],aB,false);
  teamChip(x+w-16,y+h/2,COL[1],'COM',wins[1],aR,true);
  uctx.textAlign='center'; uctx.textBaseline='middle';
  uctx.fillStyle='#7e92b0'; uctx.font='800 11px Orbitron,sans-serif'; uctx.fillText('VS', W/2, y+19);
  uctx.fillStyle='#a9bdd8'; uctx.font='700 9px "Exo 2",sans-serif'; uctx.fillText('R'+round+' / '+ROUND_WIN+'先取', W/2, y+37);
  uctx.textBaseline='alphabetic';
}
function teamChip(ex,cy,col,name,score,alive,right){ const dir=right?-1:1; uctx.textBaseline='middle';
  uctx.textAlign=right?'right':'left'; uctx.fillStyle=col.body; uctx.font='900 30px Orbitron,sans-serif';
  uctx.shadowColor=col.body; uctx.shadowBlur=6; uctx.fillText(score, ex, cy+1); uctx.shadowBlur=0;
  const sw=uctx.measureText(score).width;
  uctx.font='800 12px Orbitron,sans-serif'; uctx.fillStyle='#cfe2f7'; uctx.fillText(name, ex+dir*(sw+9), cy-9);
  for(let i=0;i<TEAM;i++){ const px=ex+dir*(sw+13+i*11); uctx.beginPath(); uctx.arc(px,cy+9,3.6,0,7);
    uctx.fillStyle=i<alive?col.body:'rgba(255,255,255,.15)'; uctx.fill(); }
  uctx.textBaseline='alphabetic';
}
function ammoHUD(){ const n=AMMO_MAX, pw=n*16+24, bx=(W-pw)/2, y=H-26; uctx.textBaseline='middle';
  uctx.fillStyle='rgba(7,16,31,.62)'; rr(uctx,bx,y-22,pw,42,14); uctx.fill();
  uctx.lineWidth=1.2; uctx.strokeStyle='rgba(126,220,255,.24)'; rr(uctx,bx,y-22,pw,42,14); uctx.stroke();
  const reloading=me.ammo<AMMO_MAX;
  uctx.textAlign='center'; uctx.fillStyle=reloading?'#ffd76a':'#a9bdd8'; uctx.font='700 9px "Exo 2",sans-serif';
  uctx.fillText(reloading?'ほきゅう中…':'ゆきだま', W/2, y-13);
  for(let i=0;i<n;i++){ const cx=bx+16+i*16; uctx.beginPath(); uctx.arc(cx,y+1,6,0,7);
    uctx.fillStyle=i<me.ammo?'#eef8ff':'rgba(210,232,255,.12)'; uctx.fill(); uctx.lineWidth=1.4; uctx.strokeStyle='rgba(126,220,255,.5)'; uctx.stroke(); }
  if(reloading){ const p=Math.min(1,me.regen/RELOAD), bw2=pw-20, bxx=bx+10, byy=y+13;
    uctx.fillStyle='rgba(255,255,255,.12)'; rr(uctx,bxx,byy,bw2,3,2); uctx.fill();
    uctx.fillStyle='#ffd76a'; rr(uctx,bxx,byy,bw2*p,3,2); uctx.fill(); }
  uctx.textBaseline='alphabetic';
}
function deadHUD(){ uctx.textAlign='center';
  uctx.fillStyle='rgba(127,18,30,.12)'; uctx.fillRect(0,0,W,FH);
  const bw=Math.min(W-48,260), bh=80, bx=(W-bw)/2, by=FH*0.33;
  uctx.fillStyle='rgba(7,16,31,.78)'; rr(uctx,bx,by,bw,bh,18); uctx.fill();
  uctx.lineWidth=1.4; uctx.strokeStyle='rgba(255,127,147,.3)'; rr(uctx,bx,by,bw,bh,18); uctx.stroke();
  uctx.fillStyle='#ff7f93'; uctx.font='900 '+Math.round(Math.min(W,H)*0.052)+'px "Exo 2",sans-serif'; uctx.fillText('ダウン！', W/2, by+36);
  uctx.fillStyle='#cfe2f7'; uctx.font='700 12px Orbitron,sans-serif'; uctx.fillText('ラウンド終了まで観戦', W/2, by+62);
}
function drawPads(){ pad.move.a?padDraw(pad.move,'#7fe6ff'):padHint(PADR()+24,H-PADR()-20,'#7fe6ff','MOVE');
  if(pad.aim.a){ padDraw(pad.aim,'#ffd98a'); aimGuide(); } else padHint(W-PADR()-24,H-PADR()-20,'#ffd98a','THROW'); }
function padHint(x,y,col,t){ uctx.globalAlpha=.085; uctx.fillStyle=col; uctx.beginPath(); uctx.arc(x,y,PADR(),0,7); uctx.fill();
  uctx.globalAlpha=.34; uctx.strokeStyle=col; uctx.lineWidth=2; uctx.setLineDash([5,7]); uctx.beginPath(); uctx.arc(x,y,PADR(),0,7); uctx.stroke(); uctx.setLineDash([]);
  uctx.globalAlpha=.65; uctx.fillStyle=col; uctx.font='700 12px Orbitron,sans-serif'; uctx.textAlign='center'; uctx.textBaseline='middle'; uctx.fillText(t,x,y); uctx.textBaseline='alphabetic'; uctx.globalAlpha=1; }
function padDraw(pd,col){ const R=PADR(); uctx.globalAlpha=.1; uctx.fillStyle=col; uctx.beginPath(); uctx.arc(pd.bx,pd.by,R,0,7); uctx.fill();
  uctx.globalAlpha=.45; uctx.strokeStyle=col; uctx.lineWidth=2.5; uctx.beginPath(); uctx.arc(pd.bx,pd.by,R,0,7); uctx.stroke(); uctx.globalAlpha=1;
  let dx=pd.tx-pd.bx,dy=pd.ty-pd.by,len=Math.hypot(dx,dy); if(len>R){dx*=R/len;dy*=R/len;}
  uctx.fillStyle=col; uctx.shadowColor=col; uctx.shadowBlur=14; uctx.beginPath(); uctx.arc(pd.bx+dx,pd.by+dy,18,0,7); uctx.fill(); uctx.shadowBlur=0;
  uctx.fillStyle='#06101f'; uctx.beginPath(); uctx.arc(pd.bx+dx,pd.by+dy,5,0,7); uctx.fill(); }
function aimGuide(){ if(!me||me.dead)return; const v=padVec(pad.aim); if(v.f<0.12)return; uctx.strokeStyle='rgba(255,230,150,.7)'; uctx.lineWidth=3; uctx.setLineDash([3,9]);
  uctx.beginPath(); uctx.moveTo(me.x,me.y); uctx.lineTo(me.x+Math.cos(v.ang)*120,me.y+Math.sin(v.ang)*120); uctx.stroke(); uctx.setLineDash([]); }
function drawBanner(){ uctx.save(); uctx.globalAlpha=Math.min(1,bannerT/16); uctx.textAlign='center'; uctx.textBaseline='middle';
  const fs=Math.round(Math.min(W,H)*0.06); uctx.font='900 '+fs+'px "Exo 2",sans-serif';
  const tw=uctx.measureText(banner).width, bw=tw+56, bh=fs+34, bx=(W-bw)/2, by=FH*0.30;
  uctx.fillStyle='rgba(7,16,31,.8)'; rr(uctx,bx,by,bw,bh,bh/2); uctx.fill();
  uctx.lineWidth=1.5; uctx.strokeStyle='rgba(126,220,255,.32)'; rr(uctx,bx,by,bw,bh,bh/2); uctx.stroke();
  uctx.fillStyle='#f2f8ff'; uctx.shadowColor='rgba(126,220,255,.4)'; uctx.shadowBlur=12; uctx.fillText(banner,W/2,by+bh/2+1); uctx.shadowBlur=0;
  uctx.textBaseline='alphabetic'; uctx.restore(); }

/* ---------- loop / flow ---------- */
let playing=false;
function loop(){ tick++; if(bannerT>0)bannerT--;
  if(intro>0){ intro--; stepPuffs(); draw(); requestAnimationFrame(loop); return; }
  if(playing){ controlHuman(); for(const u of units)if(!u.human)controlAI(u); stepBalls(); stepPuffs(); }
  else stepPuffs();
  draw(); requestAnimationFrame(loop);
}
const ovEl=document.getElementById('overlay'),taglineEl=document.getElementById('tagline'),logoEl=document.getElementById('logo'),
  howtoEl=document.getElementById('howto'),resTitleEl=document.getElementById('resTitle'),resSubEl=document.getElementById('resSub'),
  startBtn=document.getElementById('startBtn'),homeBtn=document.getElementById('homeBtn');
function showHome(){ playing=false; ovEl.classList.remove('hide'); taglineEl.style.display=''; logoEl.style.display=''; howtoEl.style.display='';
  resTitleEl.style.display='none'; resSubEl.style.display='none'; homeBtn.style.display='none'; startBtn.textContent='はじめる'; }
function startGame(){ actx(); fitCanvas(); buildArena(); layoutUI(); wins=[0,0]; round=1; playing=true; ovEl.classList.add('hide'); startRound(); }
function startRound(){ resetUnits(); balls=[]; puffs=[]; roundOver=false; pad.move.a=pad.aim.a=false; pad.move.id=pad.aim.id=-1;
  banner='ROUND '+round; bannerT=70; intro=55; }
function nextRound(){ round++; startRound(); }
function endGame(team){ playing=false; ovEl.classList.remove('hide'); taglineEl.style.display=''; logoEl.style.display='none'; howtoEl.style.display='none';
  resTitleEl.style.display='block'; resSubEl.style.display='block';
  if(team===0){ resTitleEl.textContent='YOU WIN'; resTitleEl.style.color='#7edcff'; resSubEl.textContent='ラウンド '+wins[0]+' - '+wins[1]+' で勝利！'; sfxWin(); }
  else { resTitleEl.textContent='YOU LOSE'; resTitleEl.style.color='#ff7f93'; resSubEl.textContent='ラウンド '+wins[0]+' - '+wins[1]+' …リベンジ？'; sfxLose(); }
  startBtn.textContent='もう一度'; homeBtn.style.display=''; }
startBtn.onclick=startGame; homeBtn.onclick=showHome;
function checkRotate(){ document.getElementById('rotate').classList.toggle('show', window.innerWidth>window.innerHeight && 'ontouchstart' in window); }
window.addEventListener('orientationchange',()=>setTimeout(()=>{fitCanvas();buildArena();layoutUI();checkRotate();},200));
fitCanvas(); buildArena(); layoutUI(); checkRotate(); loop();
</script>
</body>
