<style>
  :root{ --bg:#0a1426; --tx:#f2f8ff; --tx2:#a9bdd8; --c1:#7edcff; --c2:#ff7f93; --gold:#ffd76a;

  #overlay{ position:fixed; inset:0; z-index:40; display:flex; align-items:center; justify-content:center; text-align:center; overflow:auto; padding:16px;

  #overlay::after{ content:""; position:absolute; inset:0; pointer-events:none; opacity:.35; background:repeating-linear-gradient(0deg,#0000 0 2px,#0000000d 2px 3px); }

  #logo .b{ color:var(--c1); }
  #logo .on{ display:block; font-family:"Orbitron"; font-weight:700; font-size:clamp(12px,3vw,17px); letter-spacing:8px; color:var(--c1); margin-top:9px; }
  #resTitle{ font-family:"Orbitron"; font-weight:900; font-size:clamp(30px,7vw,54px); letter-spacing:3px; display:none; text-shadow:0 0 26px currentColor,0 3px 0 #06101f; }
  #resSub{ font-size:14px; color:var(--tx2); display:none; }
  .howto{ font-size:13px; line-height:1.8; color:var(--tx2); max-width:440px; }

    background:linear-gradient(180deg,#a7ecff,#3aa9e6); box-shadow:0 14px 30px -10px rgba(58,169,230,.7), inset 0 1px 0 #ffffffb0; transition:transform .06s,filter .12s; }
  .start:hover{ filter:brightness(1.06); } .start:active{ transform:translateY(2px); }

  @media (max-height:480px){ .inner{ gap:10px; padding:18px 22px; } #logo{ font-size:clamp(28px,8vh,46px);} }

    border-radius:12px; cursor:pointer; color:#cfe2f7; background:rgba(9,17,32,.66); border:1px solid rgba(126,220,255,.24); -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px); }

  .seg button.on{ background:linear-gradient(180deg,#7edcff,#3aa9e6); color:#04121f; }
  .skins{ display:flex; gap:8px; flex-wrap:wrap; justify-content:center; max-width:310px; }
  .skinchip{ width:56px; display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; padding:6px 4px; border-radius:12px; border:1px solid transparent; }

<body>
<div id="stage"><canvas id="cv"></canvas><canvas id="ui"></canvas></div>
<div id="rotate"><div class="phone"></div><h2>PLEASE ROTATE</h2><p>縦画面（タテ向き）でプレイしてください</p></div>
<button id="muteBtn" aria-label="sound"></button>
<div id="overlay"><div class="inner">
  <div id="logo">ゆき<span class="b">がっせん</span><span class="on">SNOW FRIENDS</span></div>
  <div id="resTitle" class="orb"></div>
  <div id="resSub"></div>
  <div id="opts">
    <div class="coinbar" id="coinbar"></div>
    <div class="orow"><span class="olab">つよさ</span><div class="seg" id="diffSeg"></div></div>
    <div class="orow"><span class="olab">にんずう</span><div class="seg" id="teamSeg"></div></div>
    <div class="skins" id="skins"></div>
  </div>
  <div class="btnrow"><button class="start orb" id="startBtn">はじめる</button><button class="ghost orb" id="homeBtn" style="display:none">ホーム</button></div>
</div></div>

<script>
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const uic=document.getElementById('ui'), uctx=uic.getContext('2d');
let W=720,H=1280,VW=720,VH=1280,DPR=1,scl=1,uscl=1,FH=1280; const PXART=2;   // scene art-pixel size (CSS px) — light, fine pixelation
function fitCanvas(){ VW=Math.max(300,Math.floor(window.innerWidth)); VH=Math.max(360,Math.floor(window.innerHeight));
  DPR=Math.min(window.devicePixelRatio||1,2); W=VW; H=VH;
  cv.width=Math.round(VW/PXART); cv.height=Math.round(VH/PXART); scl=cv.width/W;   // low-res scene buffer -> upscaled crisp (dot-art)
  uic.width=Math.round(VW*DPR); uic.height=Math.round(VH*DPR); uscl=uic.width/W;
  const pr=Math.max(58,Math.min(W,H)*0.16); FH=H-Math.round(pr*2+40); }   // reserve bottom band for the pads (+gutter)
window.addEventListener('resize',()=>{ fitCanvas(); if(!playing)buildArena(); layoutUI(); checkRotate(); });

/* ---------- constants ---------- */
let TEAM=2; const ROUND_WIN=3, HP=2, AMMO_MAX=3, RELOAD=80, THROW_CD=16, REVIVE=240;
const BALL_SPD=7.2, BALL_R=6, HIT_R=16, PR=14, MOVE=1.9;
function riverBand(){ const w=Math.max(46,FH*(curMap?curMap.riv:0.095)); return {t:FH/2-w/2, b:FH/2+w/2, w}; }
let COL=[{body:'#7edcff',dark:'#2c93cf',belly:'#dff5ff'},{body:'#ff8aa0',dark:'#d9536e',belly:'#ffe0e7'}];
const PADR=()=>Math.max(52,Math.min(W,H)*0.142);

/* ---------- save / options / content ---------- */
const SAVE_KEY='yk_save_v1';
const SKINS=[
  {id:'aqua', name:'アクア',   body:'#7edcff',dark:'#2c93cf',belly:'#dff5ff', cost:0},
  {id:'leaf', name:'リーフ',   body:'#8ee6a8',dark:'#2f9c5e',belly:'#e1fce9', cost:120},
  {id:'sun',  name:'サン',     body:'#ffd76a',dark:'#cf9a2a',belly:'#fff3cf', cost:160},
  {id:'grape',name:'グレープ', body:'#c79cff',dark:'#7d4fd0',belly:'#efe4ff', cost:220},
  {id:'coral',name:'コーラル', body:'#ff9f7a',dark:'#d96a44',belly:'#ffe6d8', cost:200},
];
const DIFF=[ {name:'やさしい',err:0.22,rmin:32,rvar:46,dodge:0.25,skip:0.4},
             {name:'ふつう',  err:0.12,rmin:18,rvar:38,dodge:0.5, skip:0.18},
             {name:'つよい',  err:0.05,rmin:10,rvar:24,dodge:0.78,skip:0.05} ];
const MAPS=[
  {name:'ひろば',  riv:0.09,  f:[[0.32,0.26,0.30],[0.74,0.26,0.22]]},
  {name:'なかじま',riv:0.085, f:[[0.5,0.30,0.34],[0.22,0.14,0.18],[0.78,0.14,0.18]]},
  {name:'ふたまた',riv:0.10,  f:[[0.30,0.30,0.22],[0.70,0.30,0.22],[0.5,0.12,0.26]]},
  {name:'ひろい',  riv:0.125, f:[[0.5,0.24,0.40]]},
];
let curMap=MAPS[0];
const DEF_SAVE={coins:0, skin:'aqua', owned:['aqua'], diff:1, team:2};
function loadSave(){ try{ const s=JSON.parse(localStorage.getItem(SAVE_KEY)); if(s&&s.owned) return Object.assign({},DEF_SAVE,s); }catch(e){} return JSON.parse(JSON.stringify(DEF_SAVE)); }
let save=loadSave();
function persist(){ try{ localStorage.setItem(SAVE_KEY,JSON.stringify(save)); }catch(e){} }
function skinById(id){ return SKINS.find(s=>s.id===id)||SKINS[0]; }

/* ---------- audio (SFX + light BGM, routed through a mutable master) ---------- */
let AC=null; const actx=()=>{ if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}return AC; };
let muted=(()=>{ try{ return localStorage.getItem('yk_mute')==='1'; }catch(e){ return false; } })();
let master=null;
function bus(){ const a=actx(); if(!a)return null; if(!master){ master=a.createGain(); master.gain.value=muted?0:1; master.connect(a.destination); } return master; }
function note(f,d,t='sine',v=.16,s=0){ const a=actx(),m=bus(); if(!a||!m)return; const o=a.createOscillator(),g=a.createGain(); o.type=t; o.frequency.value=f;
  if(s)o.frequency.exponentialRampToValueAtTime(Math.max(40,f+s),a.currentTime+d); g.gain.value=0; const tt=a.currentTime;
  g.gain.linearRampToValueAtTime(v,tt+0.012); g.gain.exponentialRampToValueAtTime(0.0001,tt+d);
  o.connect(g); g.connect(m); o.start(); o.stop(tt+d+0.02); }
const beep=note;
function sfxThrow(){ note(540,0.12,'triangle',0.09,-300); note(220,0.06,'sine',0.05,-80); }     // soft whoosh
function sfxHit(){ const a=actx(),m=bus(); if(!a||!m)return; const b=a.createBuffer(1,2600,a.sampleRate),d=b.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2.6); const s=a.createBufferSource(); s.buffer=b;
  const g=a.createGain(); g.gain.value=0.3; g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+0.16); s.connect(g); g.connect(m); s.start();
  note(150,0.12,'sine',0.12,-50); }                                                              // snow pof + thump
function sfxPack(){ note(300,0.07,'square',0.05,80); note(170,0.05,'sine',0.05); }               // scoop
function sfxDown(){ note(200,0.22,'sine',0.16,-120); note(90,0.3,'sine',0.12,-30); }             // thud
function sfxRevive(){ [523,659,880].forEach((f,i)=>setTimeout(()=>note(f,0.18,'triangle',0.1),i*70)); }
function sfxRound(){ note(880,0.1,'square',0.08); setTimeout(()=>note(1175,0.14,'square',0.08),110); }   // whistle
function sfxWin(){ [523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>note(f,0.2,'triangle',0.13),i*110)); }
function sfxLose(){ [392,330,262].forEach((f,i)=>setTimeout(()=>note(f,0.24,'sine',0.12),i*150)); }
/* light looping BGM */
let bgmTimer=null, bgmStep=0;
const BGM_MEL=[659,784,880,784, 659,587,523,587, 659,784,880,1047, 880,784,659,0];
const BGM_BASS=[131,196,165,98];
function bgmTick(){ const i=bgmStep%BGM_MEL.length; if(BGM_MEL[i]) note(BGM_MEL[i],0.34,'triangle',0.035);
  if(i%4===0){ note(BGM_BASS[(bgmStep/4|0)%BGM_BASS.length],0.7,'sine',0.05); } bgmStep++; }
function startBGM(){ bus(); if(bgmTimer)return; bgmStep=0; bgmTimer=setInterval(bgmTick,300); }
function stopBGM(){ if(bgmTimer){ clearInterval(bgmTimer); bgmTimer=null; } }
function setMuted(m){ muted=m; try{ localStorage.setItem('yk_mute',m?'1':'0'); }catch(e){} const b=bus(); if(b&&AC)b.gain.setTargetAtTime(m?0:1,AC.currentTime,0.02); }

/* ---------- world ---------- */
let forts=[], snowflakes=[], bumps=[];
let bases=[{x:0,y:0},{x:0,y:0}];          // team home (spawn) points
function inFort(x,y,pad){ for(const f of forts){ if(x>f.x-pad&&x<f.x+f.w+pad&&y>f.y-pad&&y<f.y+f.h+pad)return f; } return null; }
function buildArena(){
  curMap=MAPS[(round-1)%MAPS.length];                          // map varies per round
  const mB=Math.max(40,FH*0.05), mT=Math.max(104,FH*0.12);
  bases=[{x:W/2,y:FH-mB-14},{x:W/2,y:mT+14}];   // team0 (you) = bottom, team1 (enemy) = top
  // cover walls mirrored top/bottom per the current map
  forts=[]; const t=Math.max(18,Math.min(W,H)*0.02);
  const add=(x,y,w,h)=>forts.push({x:x-w/2,y:y-h/2,w,h});
  [-1,1].forEach(s=>{ for(const [fx,fy,fw] of curMap.f){ add(W*fx, FH/2+s*FH*Math.min(fy,0.22), W*fw, t); } });   // keep walls central, clear of spawn rows
  // decorations (within the field, away from the river)
  snowflakes=[]; for(let i=0;i<60;i++) snowflakes.push({x:Math.random()*W,y:Math.random()*FH,r:0.6+Math.random()*1.6,a:Math.random()*7});
  bumps=[]; for(let i=0;i<30;i++) bumps.push({x:Math.random()*W,y:Math.random()*FH,r:6+Math.random()*16});
}

/* ---------- entities ---------- */
let units=[], balls=[], puffs=[], me=null;
function makeUnit(team,idx,human){ const b=bases[team], dir=team===0?-1:1;   // team0 bottom faces up
  let x=Math.max(PR+4,Math.min(W-PR-4,b.x+(idx-1)*62)), y=b.y+dir*26, g=0;
  while(inFort(x,y,PR*0.7) && g++<40){ y-=dir*6; }   // never spawn inside a wall (nudge toward own edge)
  y=Math.max(PR, Math.min(FH-PR, y));
  return {team,idx,human,x,y,vx:0,vy:0,hp:HP,dead:false,reviveT:0,
          ammo:AMMO_MAX,regen:0,cd:0,face:team===0?-Math.PI/2:Math.PI/2,flash:0,role:idx===0?'attack':(idx===1?'mid':'defend'),
          aiThrow:0}; }
function resetUnits(){ units=[]; for(let t=0;t<2;t++)for(let i=0;i<TEAM;i++) units.push(makeUnit(t,i, t===0&&i===0)); me=units[0]; }

/* ---------- input ---------- */
const pad={move:{a:false,id:-1,bx:0,by:0,tx:0,ty:0}, aim:{a:false,id:-1,bx:0,by:0,tx:0,ty:0}};
let packBtn={x:0,y:0,r:0,held:false,id:-1};
function toW(e){ const r=cv.getBoundingClientRect(); return {x:(e.clientX-r.left)*(W/r.width),y:(e.clientY-r.top)*(H/r.height)}; }
function layoutUI(){ packBtn.r=Math.max(30,Math.min(W,H)*0.075); packBtn.x=W/2; packBtn.y=H-packBtn.r-14; }
function onDown(e){ if(!playing||intro>0)return; const p=toW(e);
  if(packBtn.r>0 && Math.hypot(p.x-packBtn.x,p.y-packBtn.y)<=packBtn.r && !packBtn.held){ packBtn.held=true; packBtn.id=e.pointerId; e.preventDefault(); return; }
  const which=p.x<W/2?'move':'aim'; const pd=pad[which]; if(pd.a)return;
  pd.a=true; pd.id=e.pointerId; pd.bx=pd.tx=p.x; pd.by=pd.ty=p.y; e.preventDefault(); }
function onMove(e){ const p=toW(e); for(const k of ['move','aim']){ const pd=pad[k]; if(pd.a&&pd.id===e.pointerId){ pd.tx=p.x; pd.ty=p.y; e.preventDefault(); } } }
function onUp(e){ if(packBtn.held&&packBtn.id===e.pointerId){ packBtn.held=false; packBtn.id=-1; }
  for(const k of ['move','aim']){ const pd=pad[k]; if(pd.a&&pd.id===e.pointerId){ if(k==='aim')releaseThrow(); pd.a=false; pd.id=-1; } } }
cv.addEventListener('pointerdown',onDown); window.addEventListener('pointermove',onMove,{passive:false});
window.addEventListener('pointerup',onUp); window.addEventListener('pointercancel',onUp);
const keys={}; window.addEventListener('keydown',e=>{keys[e.key]=true; if(e.key===' ')e.preventDefault();}); window.addEventListener('keyup',e=>{keys[e.key]=false;});
function padVec(pd){ const dx=pd.tx-pd.bx,dy=pd.ty-pd.by,len=Math.hypot(dx,dy),R=PADR(); const f=Math.min(1,len/R); return {x:dx,y:dy,len,f,ang:Math.atan2(dy,dx)}; }
function releaseThrow(){ if(!me||me.dead)return; const v=padVec(pad.aim); let ang;
  if(v.f>=0.12) ang=v.ang; else { const t=nearestEnemy(me); if(!t)return; ang=Math.atan2(t.y-me.y,t.x-me.x); }
  throwBall(me,ang); }

/* ---------- combat ---------- */
function throwBall(u,ang){ if(u.dead||u.cd>0||u.ammo<=0)return; u.cd=THROW_CD; u.ammo--; u.regen=0; u.face=ang;
  balls.push({x:u.x+Math.cos(ang)*PR,y:u.y+Math.sin(ang)*PR,vx:Math.cos(ang)*BALL_SPD,vy:Math.sin(ang)*BALL_SPD,team:u.team,life:90});
  sfxThrow(); }
function nearestEnemy(u){ let best=null,bd=1e9; for(const o of units){ if(o.team===u.team||o.dead)continue; const d=Math.hypot(o.x-u.x,o.y-u.y); if(d<bd){bd=d;best=o;} } return best; }
function losClear(x0,y0,x1,y1){ const n=Math.ceil(Math.hypot(x1-x0,y1-y0)/10); for(let i=1;i<n;i++){ const t=i/n; if(inFort(x0+(x1-x0)*t,y0+(y1-y0)*t,2))return false; } return true; }
function stepBalls(){ for(let i=balls.length-1;i>=0;i--){ const b=balls[i];
  const steps=Math.max(1,Math.ceil(Math.hypot(b.vx,b.vy)/(HIT_R*0.6))); let gone=false;   // substep so fast balls never tunnel through a hit
  for(let s=0;s<steps&&!gone;s++){ b.x+=b.vx/steps; b.y+=b.vy/steps;
    if(b.x<0||b.x>W||b.y<0||b.y>FH){ gone=true; break; }
    if(inFort(b.x,b.y,0)){ puff(b.x,b.y,'#dbe8ff',5); gone=true; break; }
    for(const o of units){ if(o.team===b.team||o.dead)continue; if(Math.hypot(o.x-b.x,o.y-b.y)<HIT_R+BALL_R){ hitUnit(o,b); gone=true; break; } } }
  if(--b.life<=0)gone=true; if(gone)balls.splice(i,1); } }
function hitUnit(o,b){ o.hp--; o.flash=1; const a=Math.atan2(o.y-b.y,o.x-b.x); o.vx+=Math.cos(a)*3.4; o.vy+=Math.sin(a)*3.4;
  shake=Math.max(shake,6); puff(o.x,o.y,'#ffffff',7); sfxHit();
  if(o.hp<=0){ o.dead=true; puff(o.x,o.y,o.team===0?'#bfe8ff':'#ffd2db',13); shake=Math.max(shake,9); sfxDown();
    checkRound(); } }

/* ---------- round / scoring (eliminate the enemy team) ---------- */
let wins=[0,0], round=1, roundOver=false, runCoins=0;
function checkRound(){ if(roundOver)return; const aB=units.some(u=>u.team===0&&!u.dead), aR=units.some(u=>u.team===1&&!u.dead);
  if(aB&&aR)return; roundOver=true; const w=aB?0:1; wins[w]++;
  if(w===0) runCoins+=10; note(w===0?784:294,0.2,'triangle',0.12);
  banner=(w===0?'ラウンド WON!':'ラウンド LOST'); bannerT=90;
  if(wins[w]>=ROUND_WIN){ setTimeout(()=>endGame(w),1100); } else { setTimeout(nextRound,1600); } }
function stepRevive(){ for(const d of units){ if(!d.dead)continue;
  let helper=false; for(const u of units){ if(u===d||u.dead||u.team!==d.team)continue; if(Math.hypot(u.x-d.x,u.y-d.y)<PR*1.7){ helper=true; break; } }
  if(helper){ d.reviveT++; if(d.reviveT>=REVIVE){ d.dead=false; d.hp=1; d.ammo=AMMO_MAX; d.reviveT=0; d.flash=1; puff(d.x,d.y,'#7dff9e',13); sfxRevive(); } }
  else d.reviveT=Math.max(0,d.reviveT-2); } }

/* ---------- movement / AI ---------- */
function moveUnit(u,mx,my){ if(u.dead)return;
  u.vx+=(mx*MOVE-u.vx)*0.2; u.vy+=(my*MOVE-u.vy)*0.2;
  // collide with forts (axis separated)
  const stuck=inFort(u.x,u.y,PR*0.7);   // if already inside a wall, allow escape
  let nx=u.x+u.vx; if(stuck||!inFort(nx,u.y,PR*0.7))u.x=nx; else u.vx*=-0.2;
  let ny=u.y+u.vy; if(stuck||!inFort(u.x,ny,PR*0.7))u.y=ny; else u.vy*=-0.2;
  u.x=Math.max(PR,Math.min(W-PR,u.x));
  const rb=riverBand();                                  // confine each team to its own half (can't cross the river)
  if(u.team===0) u.y=Math.max(rb.b+PR*0.5, Math.min(FH-PR, u.y));
  else           u.y=Math.min(rb.t-PR*0.5, Math.max(PR, u.y));
  if(Math.abs(mx)+Math.abs(my)>0.1)u.face=Math.atan2(my,mx);
  if(u.cd>0)u.cd--; if(u.flash>0)u.flash=Math.max(0,u.flash-0.08);
}
function controlHuman(){ if(!me||me.dead)return;
  if(packBtn.held){ if(me.ammo<AMMO_MAX){ me.regen++; if(me.regen>=RELOAD){ me.ammo=AMMO_MAX; me.regen=0; sfxPack(); } } moveUnit(me,0,0); return; }   // stand & pack snow
  let mx=0,my=0; const m=pad.move; if(m.a){ const v=padVec(m),R=PADR(); if(v.len>R*0.16){ mx=Math.max(-1,Math.min(1,v.x/R)); my=Math.max(-1,Math.min(1,v.y/R)); } }
  if(keys['ArrowLeft']||keys['a'])mx=-1; if(keys['ArrowRight']||keys['d'])mx=1; if(keys['ArrowUp']||keys['w'])my=-1; if(keys['ArrowDown']||keys['s'])my=1;
  const l=Math.hypot(mx,my); if(l>1){mx/=l;my/=l;} moveUnit(me,mx,my);
}
function controlAI(u){ if(u.dead)return; const D=DIFF[save.diff]||DIFF[1];
  if(u.ammo<AMMO_MAX){ u.regen++; if(u.regen>=RELOAD){ u.ammo=AMMO_MAX; u.regen=0; } }   // COM repacks after a pause
  const rb=riverBand(), e=nearestEnemy(u);
  // rescue: go revive the nearest downed teammate if I'm the closest living ally (ふつう+)
  let goRev=null;
  if(save.diff>=1){ let dm=null,dd=1e9; for(const o of units){ if(o.dead&&o.team===u.team){ const d=Math.hypot(o.x-u.x,o.y-u.y); if(d<dd){dd=d;dm=o;} } }
    if(dm){ let closest=true; for(const a of units){ if(a===u||a.dead||a.team!==u.team)continue; if(Math.hypot(a.x-dm.x,a.y-dm.y)<dd){closest=false;break;} } if(closest)goRev=dm; } }
  let tx,ty;
  if(goRev){ tx=goRev.x; ty=goRev.y; }
  else { const bank=u.team===0?rb.b+PR+FH*0.06:rb.t-PR-FH*0.06;
    ty=bank+(u.role==='defend'?(u.team===0?FH*0.14:-FH*0.14):0);
    tx=(e?e.x:W/2)+Math.sin(tick*0.025+u.idx*2)*W*0.13; }
  for(const b of balls){ if(b.team===u.team)continue; const dx=u.x-b.x,dy=u.y-b.y; if(Math.hypot(dx,dy)<95 && (dx*b.vx+dy*b.vy)>0 && Math.random()<D.dodge){ tx=u.x+(b.vx>=0?-1:1)*70; } } // dodge (scaled)
  let ax=tx-u.x, ay=ty-u.y; const d=Math.hypot(ax,ay)||1; ax/=d; ay/=d; if(d<10){ax=0;ay=0;}
  if(inFort(u.x+ax*PR*2,u.y+ay*PR*2,PR*0.6)){ const t=ax; ax=-ay; ay=t; }
  moveUnit(u,ax,ay);
  if(e && u.cd<=0 && u.ammo>0 && !goRev && losClear(u.x,u.y,e.x,e.y)){ if(--u.aiThrow<=0){
    if(Math.random()>=D.skip) throwBall(u,Math.atan2(e.y-u.y,e.x-u.x)+(Math.random()*2-1)*D.err);
    u.aiThrow=D.rmin+(Math.random()*D.rvar|0); } }
}

/* ---------- particles ---------- */
function puff(x,y,c,r){ for(let i=0;i<5+r*0.5|0;i++){ const a=Math.random()*7,s=0.5+Math.random()*2.4; puffs.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,c,r:1+Math.random()*r*0.35}); } }
function stepPuffs(){ for(let i=puffs.length-1;i>=0;i--){ const p=puffs[i]; p.x+=p.vx; p.y+=p.vy; p.vx*=0.92; p.vy*=0.92; p.life-=0.05; if(p.life<=0)puffs.splice(i,1); } }
let shake=0;

/* ---------- render ---------- */
function draw(){ ctx.setTransform(scl,0,0,scl,0,0); ctx.imageSmoothingEnabled=false;   // crisp pixels for the dot-art scene
  ctx.save(); if(shake>0.4){ ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake); shake*=0.85; } else shake=0;
  // snow field (top area)
  const g=ctx.createLinearGradient(0,0,0,FH); g.addColorStop(0,'#e6eff9'); g.addColorStop(1,'#c6d6ec'); ctx.fillStyle=g; ctx.fillRect(0,0,W,FH);
  // soft bumps
  for(const b of bumps){ ctx.globalAlpha=.5; ctx.fillStyle='#ffffff'; ctx.beginPath(); ctx.ellipse(b.x,b.y,b.r,b.r*0.6,0,0,7); ctx.fill(); } ctx.globalAlpha=1;
  // half tints (your side blue / enemy side pink) + the dividing river
  ctx.fillStyle='rgba(126,220,255,.05)'; ctx.fillRect(0,FH/2,W,FH/2);
  ctx.fillStyle='rgba(255,127,147,.05)'; ctx.fillRect(0,0,W,FH/2);
  drawRiver();
  // control band (bottom) — distinct dark strip under the field
  const cb=ctx.createLinearGradient(0,FH,0,H); cb.addColorStop(0,'#0e1c33'); cb.addColorStop(1,'#0a1426'); ctx.fillStyle=cb; ctx.fillRect(0,FH,W,H-FH);
  ctx.strokeStyle='rgba(126,220,255,.18)'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(0,FH+1); ctx.lineTo(W,FH+1); ctx.stroke();
  // snow walls (cover) with depth + snow cap
  for(const f of forts){ ctx.fillStyle='rgba(11,22,42,.18)'; rr(ctx,f.x+2,f.y+4,f.w,f.h,7); ctx.fill();   // ground shadow
    ctx.fillStyle='#c4d6ee'; rr(ctx,f.x,f.y,f.w,f.h,7); ctx.fill();                                       // body
    ctx.fillStyle='#f4faff'; rr(ctx,f.x,f.y,f.w,Math.min(f.h,8),6); ctx.fill();                            // snow cap
    ctx.strokeStyle='rgba(140,165,200,.7)'; ctx.lineWidth=1.2; rr(ctx,f.x,f.y,f.w,f.h,7); ctx.stroke(); }
  // units (sorted by y)
  const order=units.slice().sort((a,b)=>a.y-b.y); for(const u of order) drawDino(u);
  // balls
  for(const b of balls){ ctx.fillStyle='#0b162a22'; ctx.beginPath(); ctx.ellipse(b.x,b.y+4,BALL_R,BALL_R*0.5,0,0,7); ctx.fill();
    ctx.fillStyle='#ffffff'; ctx.beginPath(); ctx.arc(b.x,b.y,BALL_R,0,7); ctx.fill();
    ctx.fillStyle='#cfe2f7'; ctx.beginPath(); ctx.arc(b.x+2,b.y+2,BALL_R*0.5,0,7); ctx.fill(); }
  for(const p of puffs){ ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.c; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fill(); } ctx.globalAlpha=1;
  // snowfall
  ctx.fillStyle='#ffffff'; for(const f of snowflakes){ f.y+=0.5+f.r*0.2; f.x+=Math.sin(tick*0.02+f.a)*0.2; if(f.y>FH){f.y=-3;f.x=Math.random()*W;}
    ctx.globalAlpha=0.5+0.4*Math.sin(tick*0.05+f.a); ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,7); ctx.fill(); } ctx.globalAlpha=1;
  ctx.restore();
  drawUI();
}
function rr(c,x,y,w,h,r){ r=Math.min(r,w/2,h/2); c.beginPath(); c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r); c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath(); }
function drawRiver(){ const rb=riverBand(), t=rb.t, b=rb.b, w=rb.w;
  const topY=x=> t+Math.sin(x*0.02+tick*0.03)*3, botY=x=> b+Math.sin(x*0.02+tick*0.03+2)*3;
  // soft shadow on snow next to the water
  let sh=ctx.createLinearGradient(0,t-14,0,t); sh.addColorStop(0,'rgba(10,24,43,0)'); sh.addColorStop(1,'rgba(10,24,43,.14)'); ctx.fillStyle=sh; ctx.fillRect(0,t-14,W,14);
  sh=ctx.createLinearGradient(0,b,0,b+14); sh.addColorStop(0,'rgba(10,24,43,.14)'); sh.addColorStop(1,'rgba(10,24,43,0)'); ctx.fillStyle=sh; ctx.fillRect(0,b,W,14);
  // water body between wavy banks
  const g=ctx.createLinearGradient(0,t-4,0,b+4); g.addColorStop(0,'#7cc6ee'); g.addColorStop(.5,'#2b79b8'); g.addColorStop(1,'#6bbce9');
  ctx.beginPath(); ctx.moveTo(0,topY(0)); for(let x=0;x<=W;x+=14)ctx.lineTo(x,topY(x)); for(let x=W;x>=0;x-=14)ctx.lineTo(x,botY(x)); ctx.closePath();
  ctx.fillStyle=g; ctx.fill();
  ctx.save(); ctx.clip();
  // deeper center shade for volume
  const cg=ctx.createLinearGradient(0,t,0,b); cg.addColorStop(0,'rgba(7,38,66,0)'); cg.addColorStop(.5,'rgba(7,38,66,.3)'); cg.addColorStop(1,'rgba(7,38,66,0)');
  ctx.fillStyle=cg; ctx.fillRect(0,t-8,W,w+16);
  // flowing ripple lines
  for(let k=0;k<4;k++){ const yy=t+w*(0.2+k*0.2); ctx.strokeStyle='rgba(236,250,255,'+(0.18-k*0.03)+')'; ctx.lineWidth=2;
    ctx.beginPath(); for(let x=0;x<=W;x+=10){ const oy=Math.sin(x*0.045+tick*(0.05+k*0.012)+k*1.3)*2.6; x===0?ctx.moveTo(x,yy+oy):ctx.lineTo(x,yy+oy); } ctx.stroke(); }
  // drifting foam flecks
  ctx.fillStyle='rgba(255,255,255,.6)'; for(let i=0;i<12;i++){ const x=((i*127+tick*1.5)%(W+40))-20, yy=t+((i*61)%Math.max(1,w-2)); ctx.fillRect(x,yy,3,1.5); }
  ctx.restore();
  // snowy bank lips following the wave
  ctx.fillStyle='#eaf3fc';
  ctx.beginPath(); ctx.moveTo(0,t-6); for(let x=0;x<=W;x+=14)ctx.lineTo(x,topY(x)); for(let x=W;x>=0;x-=14)ctx.lineTo(x,t-6); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(0,b+6); for(let x=0;x<=W;x+=14)ctx.lineTo(x,botY(x)); for(let x=W;x>=0;x-=14)ctx.lineTo(x,b+6); ctx.closePath(); ctx.fill(); }
function drawDino(u){ const c=COL[u.team]; ctx.save(); ctx.translate(u.x,u.y);
  ctx.fillStyle='#0b162a33'; ctx.beginPath(); ctx.ellipse(0,PR*0.7,PR*0.9,PR*0.4,0,0,7); ctx.fill();
  if(u.dead){ ctx.globalAlpha=.55; ctx.fillStyle=c.body; ctx.beginPath(); ctx.arc(0,0,PR*0.7,0,7); ctx.fill();
    ctx.globalAlpha=1; ctx.strokeStyle='#0b1f33'; ctx.lineWidth=2.4; ctx.lineCap='round';   // clean X eyes
    ctx.beginPath(); ctx.moveTo(-6,-3); ctx.lineTo(-2,1); ctx.moveTo(-2,-3); ctx.lineTo(-6,1);
    ctx.moveTo(2,-3); ctx.lineTo(6,1); ctx.moveTo(6,-3); ctx.lineTo(2,1); ctx.stroke();
    if(u.reviveT>0){ ctx.strokeStyle='#7dff9e'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(0,0,PR*0.95,-Math.PI/2,-Math.PI/2+7*(u.reviveT/REVIVE)); ctx.stroke(); }
    ctx.restore(); return; }
  ctx.rotate(u.face+Math.PI/2);  // face points up at angle 0
  ctx.lineJoin='round';
  // tail
  ctx.fillStyle=c.dark; ctx.beginPath(); ctx.ellipse(0,PR*0.8,PR*0.32,PR*0.5,0,0,7); ctx.fill();
  // body (with outline for contrast)
  ctx.fillStyle=c.body; ctx.strokeStyle='rgba(8,18,35,.3)'; ctx.lineWidth=1.6;
  ctx.beginPath(); ctx.ellipse(0,0,PR*0.82,PR*0.95,0,0,7); ctx.fill(); ctx.stroke();
  ctx.fillStyle=c.belly; ctx.beginPath(); ctx.ellipse(0,PR*0.18,PR*0.5,PR*0.6,0,0,7); ctx.fill();
  // little spikes
  ctx.fillStyle=c.dark; for(let s=-1;s<=1;s++){ ctx.beginPath(); ctx.arc(s*5,-PR*0.5,2.2,0,7); ctx.fill(); }
  // forward snout marker (shows facing clearly)
  ctx.fillStyle=c.dark; ctx.beginPath(); ctx.moveTo(-4,-PR*1.02); ctx.lineTo(4,-PR*1.02); ctx.lineTo(0,-PR*1.24); ctx.closePath(); ctx.fill();
  // head
  ctx.fillStyle=c.body; ctx.beginPath(); ctx.arc(0,-PR*0.62,PR*0.55,0,7); ctx.fill(); ctx.stroke();
  // eyes
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-5,-PR*0.78,3.4,0,7); ctx.arc(5,-PR*0.78,3.4,0,7); ctx.fill();
  ctx.fillStyle='#16324a'; ctx.beginPath(); ctx.arc(-5,-PR*0.82,1.6,0,7); ctx.arc(5,-PR*0.82,1.6,0,7); ctx.fill();
  if(u.flash>0){ ctx.globalAlpha=u.flash*0.8; ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(0,0,PR*1.05,0,7); ctx.fill(); ctx.globalAlpha=1; }
  ctx.restore();
  // HP pips above the head (shows it takes 2 hits)
  for(let i=0;i<HP;i++){ ctx.beginPath(); ctx.arc(u.x-(HP-1)*4+i*8, u.y-PR-7, 2.6,0,7);
    ctx.fillStyle=i<u.hp?c.body:'rgba(11,31,51,.4)'; ctx.fill(); }
  // "you" marker
  if(u.human){ ctx.fillStyle='#ffd76a'; ctx.beginPath(); ctx.moveTo(u.x,u.y-PR-18); ctx.lineTo(u.x+5,u.y-PR-11); ctx.lineTo(u.x-5,u.y-PR-11); ctx.closePath(); ctx.fill(); }
}

/* ---------- UI layer ---------- */
let intro=0, banner='', bannerT=0, tick=0;
function drawUI(){ uctx.setTransform(uscl,0,0,uscl,0,0); uctx.clearRect(0,0,W,H); uctx.lineCap='round'; uctx.lineJoin='round';
  if(playing){ scoreHUD(); if(me){ packHUD(); if(me.dead) deadHUD(); } drawPads(); if(bannerT>0)drawBanner(); }
}
function scoreHUD(){ const aB=units.filter(u=>u.team===0&&!u.dead).length, aR=units.filter(u=>u.team===1&&!u.dead).length;
  const w=Math.min(W-20,330), h=60, x=(W-w)/2, y=10;
  uctx.fillStyle='rgba(7,16,31,.66)'; rr(uctx,x,y,w,h,16); uctx.fill();
  uctx.lineWidth=1.4; uctx.strokeStyle='rgba(126,220,255,.26)'; rr(uctx,x,y,w,h,16); uctx.stroke();
  uctx.strokeStyle='rgba(255,255,255,.10)'; uctx.lineWidth=1; rr(uctx,x+1,y+1,w-2,h-2,15); uctx.stroke();
  teamChip(x+16,y+h/2,COL[0],'YOU',wins[0],aB,false);
  teamChip(x+w-16,y+h/2,COL[1],'COM',wins[1],aR,true);
  uctx.textAlign='center'; uctx.textBaseline='middle';
  uctx.fillStyle='#7e92b0'; uctx.font='800 11px Orbitron,sans-serif'; uctx.fillText('VS', W/2, y+19);
  uctx.fillStyle='#a9bdd8'; uctx.font='700 9px "Exo 2",sans-serif'; uctx.fillText('R'+round+' / '+ROUND_WIN+'先取', W/2, y+37);
  uctx.textBaseline='alphabetic';
}
function teamChip(ex,cy,col,name,score,alive,right){ const dir=right?-1:1; uctx.textBaseline='middle';
  uctx.textAlign=right?'right':'left'; uctx.fillStyle=col.body; uctx.font='900 30px Orbitron,sans-serif';
  uctx.shadowColor=col.body; uctx.shadowBlur=6; uctx.fillText(score, ex, cy+1); uctx.shadowBlur=0;
  const sw=uctx.measureText(score).width;
  uctx.font='800 12px Orbitron,sans-serif'; uctx.fillStyle='#cfe2f7'; uctx.fillText(name, ex+dir*(sw+9), cy-9);
  for(let i=0;i<TEAM;i++){ const px=ex+dir*(sw+13+i*11); uctx.beginPath(); uctx.arc(px,cy+9,3.6,0,7);
    uctx.fillStyle=i<alive?col.body:'rgba(255,255,255,.15)'; uctx.fill(); }
  uctx.textBaseline='alphabetic';
}
function packHUD(){ const R=packBtn.r, x=packBtn.x, y=packBtn.y, need=me.ammo<AMMO_MAX;
  uctx.globalAlpha=packBtn.held?0.34:(need?0.22:0.13); uctx.fillStyle='#7edcff'; uctx.beginPath(); uctx.arc(x,y,R,0,7); uctx.fill();
  uctx.globalAlpha=need?0.72:0.42; uctx.lineWidth=2.5; uctx.strokeStyle='#7edcff'; uctx.beginPath(); uctx.arc(x,y,R,0,7); uctx.stroke(); uctx.globalAlpha=1;
  for(let i=0;i<AMMO_MAX;i++){ const cx=x-(AMMO_MAX-1)*7+i*14; uctx.beginPath(); uctx.arc(cx,y-3,5,0,7);
    uctx.fillStyle=i<me.ammo?'#eef8ff':'rgba(210,232,255,.14)'; uctx.fill(); uctx.lineWidth=1.3; uctx.strokeStyle='rgba(126,220,255,.55)'; uctx.stroke(); }
  uctx.fillStyle=need?'#ffd76a':'#cfe2f7'; uctx.font='700 10px Orbitron,sans-serif'; uctx.textAlign='center'; uctx.textBaseline='middle';
  uctx.fillText(need?'ためる':'ゆきだま', x, y+R*0.5); uctx.textBaseline='alphabetic';
  if(packBtn.held&&need){ uctx.strokeStyle='#ffd76a'; uctx.lineWidth=3.5; uctx.beginPath(); uctx.arc(x,y,R-5,-Math.PI/2,-Math.PI/2+7*(me.regen/RELOAD)); uctx.stroke(); }
}
function deadHUD(){ uctx.textAlign='center'; uctx.textBaseline='middle';
  uctx.fillStyle='rgba(120,16,28,.16)'; uctx.fillRect(0,0,W,FH);
  const reviving=me.reviveT>0, bw=Math.min(W-56,280), bh=110, bx=(W-bw)/2, by=FH*0.46, cx=W/2, cyT=by+38;
  uctx.fillStyle='rgba(9,17,32,.82)'; rr(uctx,bx,by,bw,bh,20); uctx.fill();
  uctx.lineWidth=1.4; uctx.strokeStyle=reviving?'rgba(125,255,158,.4)':'rgba(255,127,147,.4)'; rr(uctx,bx,by,bw,bh,20); uctx.stroke();
  // snowed-icon (white puff with X)
  const ic=reviving?'#7dff9e':'#ff7f93';
  uctx.fillStyle='rgba(255,255,255,.9)'; uctx.beginPath(); uctx.arc(cx,cyT,16,0,7); uctx.fill();
  uctx.strokeStyle=ic; uctx.lineWidth=3; uctx.lineCap='round';
  uctx.beginPath(); uctx.moveTo(cx-5,cyT-5); uctx.lineTo(cx+5,cyT+5); uctx.moveTo(cx+5,cyT-5); uctx.lineTo(cx-5,cyT+5); uctx.stroke();
  uctx.fillStyle=ic; uctx.font='900 22px "Exo 2",sans-serif'; uctx.fillText(reviving?'きゅうしゅつ中':'ダウン', cx, by+74);
  if(reviving){ const p=me.reviveT/REVIVE, pw=bw-56, px=bx+28, py=by+94;
    uctx.fillStyle='rgba(255,255,255,.14)'; rr(uctx,px,py,pw,5,3); uctx.fill();
    uctx.fillStyle='#7dff9e'; rr(uctx,px,py,pw*p,5,3); uctx.fill(); }
  else { uctx.fillStyle='#9fb4d0'; uctx.font='700 11px "Exo 2",sans-serif'; uctx.fillText('なかまがそばに来ると復活', cx, by+94); }
  uctx.textBaseline='alphabetic';
}
function drawPads(){
  pad.move.a?padDraw(pad.move,'#7fe6ff','move'):padHint(PADR()+22,H-PADR()-18,'#7fe6ff','move');
  if(pad.aim.a){ padDraw(pad.aim,'#ffd98a','throw'); aimGuide(); } else padHint(W-PADR()-22,H-PADR()-18,'#ffd98a','throw');
  if(me && !me.dead && me.ammo<=0){ const ax=pad.aim.a?pad.aim.bx:W-PADR()-22, ay=pad.aim.a?pad.aim.by:H-PADR()-18, R=PADR(); // out of snowballs: X over the throw stick
    uctx.fillStyle='rgba(20,6,10,.45)'; uctx.beginPath(); uctx.arc(ax,ay,R,0,7); uctx.fill();
    uctx.strokeStyle='#ff6f82'; uctx.lineWidth=Math.max(4,R*0.1); uctx.lineCap='round'; const s=R*0.42;
    uctx.beginPath(); uctx.moveTo(ax-s,ay-s); uctx.lineTo(ax+s,ay+s); uctx.moveTo(ax+s,ay-s); uctx.lineTo(ax-s,ay+s); uctx.stroke(); } }
function padBase(x,y,col){ const R=PADR();
  const g=uctx.createRadialGradient(x,y-R*0.35,R*0.1,x,y,R); g.addColorStop(0,'rgba(255,255,255,.06)'); g.addColorStop(1,'rgba(255,255,255,0)');
  uctx.fillStyle=g; uctx.beginPath(); uctx.arc(x,y,R,0,7); uctx.fill();
  uctx.strokeStyle='rgba(126,220,255,.16)'; uctx.lineWidth=2; uctx.beginPath(); uctx.arc(x,y,R,0,7); uctx.stroke();
  uctx.globalAlpha=.4; uctx.strokeStyle=col; uctx.lineWidth=2; uctx.beginPath(); uctx.arc(x,y,R*0.52,0,7); uctx.stroke(); uctx.globalAlpha=1; }
function padHint(x,y,col,kind){ padBase(x,y,col); uctx.globalAlpha=.55; padIcon(x,y,col,kind,PADR()*0.26); uctx.globalAlpha=1; }
function padDraw(pd,col,kind){ const R=PADR(); padBase(pd.bx,pd.by,col);
  let dx=pd.tx-pd.bx,dy=pd.ty-pd.by,len=Math.hypot(dx,dy); if(len>R*0.66){dx*=R*0.66/len;dy*=R*0.66/len;}
  const kx=pd.bx+dx,ky=pd.by+dy, kr=R*0.34;
  const g=uctx.createRadialGradient(kx,ky-kr*0.5,kr*0.2,kx,ky,kr); g.addColorStop(0,col); g.addColorStop(1,col+'bb');
  uctx.shadowColor='rgba(0,0,0,.45)'; uctx.shadowBlur=10; uctx.shadowOffsetY=3;
  uctx.fillStyle=g; uctx.beginPath(); uctx.arc(kx,ky,kr,0,7); uctx.fill(); uctx.shadowBlur=0; uctx.shadowOffsetY=0;
  uctx.globalAlpha=.45; padIcon(kx,ky,'#06121f',kind,kr*0.5); uctx.globalAlpha=1; }
function padIcon(x,y,col,kind,s){ uctx.strokeStyle=col; uctx.fillStyle=col; uctx.lineWidth=Math.max(2,s*0.2); uctx.lineCap='round'; uctx.lineJoin='round';
  if(kind==='move'){ for(let a=0;a<4;a++){ const ang=a*Math.PI/2, cx=x+Math.cos(ang)*s, cy=y+Math.sin(ang)*s;
      uctx.save(); uctx.translate(cx,cy); uctx.rotate(ang); uctx.beginPath(); uctx.moveTo(-s*0.26,-s*0.32); uctx.lineTo(s*0.32,0); uctx.lineTo(-s*0.26,s*0.32); uctx.stroke(); uctx.restore(); } }
  else { uctx.beginPath(); uctx.arc(x,y,s*0.62,0,7); uctx.stroke();
    for(let a=0;a<4;a++){ const ang=a*Math.PI/2; uctx.beginPath(); uctx.moveTo(x+Math.cos(ang)*s*0.62,y+Math.sin(ang)*s*0.62); uctx.lineTo(x+Math.cos(ang)*s,y+Math.sin(ang)*s); uctx.stroke(); }
    uctx.beginPath(); uctx.arc(x,y,1.6,0,7); uctx.fill(); } }
function aimGuide(){ if(!me||me.dead)return; const v=padVec(pad.aim); if(v.f<0.12)return; uctx.strokeStyle='rgba(255,230,150,.7)'; uctx.lineWidth=3; uctx.setLineDash([3,9]);
  uctx.beginPath(); uctx.moveTo(me.x,me.y); uctx.lineTo(me.x+Math.cos(v.ang)*120,me.y+Math.sin(v.ang)*120); uctx.stroke(); uctx.setLineDash([]); }
function drawBanner(){ uctx.save(); uctx.globalAlpha=Math.min(1,bannerT/16); uctx.textAlign='center'; uctx.textBaseline='middle';
  const fs=Math.round(Math.min(W,H)*0.06); uctx.font='900 '+fs+'px "Exo 2",sans-serif';
  const tw=uctx.measureText(banner).width, bw=tw+56, bh=fs+34, bx=(W-bw)/2, by=FH*0.30;
  uctx.fillStyle='rgba(7,16,31,.8)'; rr(uctx,bx,by,bw,bh,bh/2); uctx.fill();
  uctx.lineWidth=1.5; uctx.strokeStyle='rgba(126,220,255,.32)'; rr(uctx,bx,by,bw,bh,bh/2); uctx.stroke();
  uctx.fillStyle='#f2f8ff'; uctx.shadowColor='rgba(126,220,255,.4)'; uctx.shadowBlur=12; uctx.fillText(banner,W/2,by+bh/2+1); uctx.shadowBlur=0;
  uctx.textBaseline='alphabetic'; uctx.restore(); }

/* ---------- loop / flow ---------- */
let playing=false;
function loop(){ tick++; if(bannerT>0)bannerT--;
  if(intro>0){ intro--; stepPuffs(); draw(); requestAnimationFrame(loop); return; }
  if(playing && !roundOver){ controlHuman(); for(const u of units)if(!u.human)controlAI(u); stepBalls(); stepRevive(); }
  stepPuffs();
  draw(); requestAnimationFrame(loop);
}
const ovEl=document.getElementById('overlay'),logoEl=document.getElementById('logo'),
  resTitleEl=document.getElementById('resTitle'),resSubEl=document.getElementById('resSub'),
  startBtn=document.getElementById('startBtn'),homeBtn=document.getElementById('homeBtn'),
  optsEl=document.getElementById('opts'),coinbarEl=document.getElementById('coinbar'),
  diffSegEl=document.getElementById('diffSeg'),teamSegEl=document.getElementById('teamSeg'),skinsEl=document.getElementById('skins');
const COIN_SVG='<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="#ffd45e" stroke="#b8801e" stroke-width="1.6"/><path d="M12 7.5v9M9.8 9.6h3a1.6 1.6 0 0 1 0 3.2h-2.2a1.6 1.6 0 0 0 0 3.2h3" stroke="#8a5e14" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>';
function renderOpts(){ coinbarEl.innerHTML=COIN_SVG+'<span>'+save.coins+'</span>';
  diffSegEl.innerHTML=''; DIFF.forEach((d,i)=>{ const b=document.createElement('button'); b.textContent=d.name; if(i===save.diff)b.className='on'; b.onclick=()=>{save.diff=i;persist();renderOpts();}; diffSegEl.appendChild(b); });
  teamSegEl.innerHTML=''; [1,2,3].forEach(n=>{ const b=document.createElement('button'); b.textContent=n+'v'+n; if(n===save.team)b.className='on'; b.onclick=()=>{save.team=n;persist();renderOpts();}; teamSegEl.appendChild(b); });
  skinsEl.innerHTML=''; SKINS.forEach(s=>{ const owned=save.owned.includes(s.id), sel=save.skin===s.id; const c=document.createElement('div'); c.className='skinchip'+(sel?' on':'')+(owned?'':' locked');
    c.innerHTML='<div class="dot" style="background:'+s.body+';border:2px solid '+s.dark+'"></div><div class="nm">'+s.name+'</div>'+(owned?'':'<div class="pr">'+s.cost+'</div>');
    c.onclick=()=>{ if(owned){ save.skin=s.id; } else if(save.coins>=s.cost){ save.coins-=s.cost; save.owned.push(s.id); save.skin=s.id; } persist(); renderOpts(); };
    skinsEl.appendChild(c); }); }
function showHome(){ playing=false; stopBGM(); ovEl.classList.remove('hide'); logoEl.style.display=''; optsEl.style.display='flex';
  resTitleEl.style.display='none'; resSubEl.style.display='none'; homeBtn.style.display='none'; startBtn.textContent='はじめる'; renderOpts(); }
function applySettings(){ TEAM=save.team; const sk=skinById(save.skin); COL[0]={body:sk.body,dark:sk.dark,belly:sk.belly}; }
function startGame(){ actx(); fitCanvas(); applySettings(); layoutUI(); wins=[0,0]; round=1; runCoins=0; playing=true; ovEl.classList.add('hide'); optsEl.style.display='none'; startBGM(); startRound(); }
function startRound(){ buildArena(); resetUnits(); balls=[]; puffs=[]; roundOver=false; pad.move.a=pad.aim.a=false; pad.move.id=pad.aim.id=-1; packBtn.held=false; packBtn.id=-1;
  banner='ROUND '+round; bannerT=70; intro=55; sfxRound(); }
function nextRound(){ round++; startRound(); }
function endGame(team){ playing=false; stopBGM(); if(team===0)runCoins+=50; save.coins+=runCoins; persist();
  ovEl.classList.remove('hide'); logoEl.style.display='none'; optsEl.style.display='none';
  resTitleEl.style.display='block'; resSubEl.style.display='block';
  const tail='　+'+runCoins+' コイン';
  if(team===0){ resTitleEl.textContent='YOU WIN'; resTitleEl.style.color='#7edcff'; resSubEl.textContent='ラウンド '+wins[0]+' - '+wins[1]+tail; sfxWin(); }
  else { resTitleEl.textContent='YOU LOSE'; resTitleEl.style.color='#ff7f93'; resSubEl.textContent='ラウンド '+wins[0]+' - '+wins[1]+tail; sfxLose(); }
  startBtn.textContent='もう一度'; homeBtn.style.display=''; }
startBtn.onclick=startGame; homeBtn.onclick=showHome; renderOpts();
const muteBtn=document.getElementById('muteBtn');
const ICON_ON='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"><path d="M4 9v6h4l5 4V5L8 9z" fill="currentColor" stroke="none"/><path d="M16.5 8.5a5 5 0 0 1 0 7"/><path d="M19 6a8 8 0 0 1 0 12"/></svg>';
const ICON_OFF='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"><path d="M4 9v6h4l5 4V5L8 9z" fill="currentColor" stroke="none"/><path d="M16 9l5 6M21 9l-5 6"/></svg>';
function refreshMute(){ muteBtn.innerHTML=muted?ICON_OFF:ICON_ON; muteBtn.style.color=muted?'#7f93b0':'#cfe2f7'; }
muteBtn.onclick=()=>{ actx(); setMuted(!muted); refreshMute(); }; refreshMute();
function checkRotate(){ document.getElementById('rotate').classList.toggle('show', window.innerWidth>window.innerHeight && 'ontouchstart' in window); }
window.addEventListener('orientationchange',()=>setTimeout(()=>{fitCanvas();buildArena();layoutUI();checkRotate();},200));
fitCanvas(); buildArena(); layoutUI(); checkRotate(); loop();
</script>
