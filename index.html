<style>

  }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }

  #hud{ position:fixed; inset:0; pointer-events:none; padding-top:env(safe-area-inset-top); }

  .player.hurt{ animation:hurt .4s; }

  .hpwrap{ display:flex; align-items:center; gap:8px; margin-top:6px; } #p2 .hpwrap{ flex-direction:row-reverse; }
  .hpbar{ position:relative; width:142px; height:12px; border-radius:var(--r-xs); overflow:hidden; border:1px solid var(--track-line);
    background:repeating-linear-gradient(90deg,var(--track) 0 13px,#0e1626 13px 14px); }
  .hpbar i{ position:absolute; inset:0; transform-origin:left; transition:width .35s cubic-bezier(.2,.8,.2,1); }

  #p2 .hpbar i{ background:linear-gradient(180deg,#ff8ca2,var(--c2d)); box-shadow:inset 0 0 8px #ffffff33, inset 0 1px 0 #ffffff55; }
  .hpnum{ font-family:"Orbitron"; font-size:14px; font-weight:700; width:30px; color:var(--tx); }

  #center{ position:fixed; top:calc(10px + env(safe-area-inset-top)); left:50%; transform:translateX(-50%); text-align:center; width:230px; }
  #turn{ font-family:"Orbitron"; font-weight:700; font-size:13px; letter-spacing:3px; padding:8px 0; color:var(--tx3);
    border-radius:var(--r-md); background:var(--glass); border:1px solid var(--line); box-shadow:var(--sh-card); }
  #turn b{ color:var(--tx); }
  #windbox,#fuelbox{ margin-top:8px; display:flex; align-items:center; justify-content:center; gap:8px; font-size:10px; letter-spacing:2px; color:var(--tx3); }
  #fuelbox{ display:none; } #fuelbox.show{ display:flex; }
  #windgauge,#fuelgauge{ position:relative; height:8px; border-radius:var(--r-xs); background:var(--track); border:1px solid var(--track-line); overflow:hidden; }
  #windgauge{ width:118px; } #fuelgauge{ width:118px; height:7px; }
  #windgauge .mid{ position:absolute; left:50%; top:0; bottom:0; width:1px; background:var(--line2); }

  #weapons{ position:fixed; bottom:calc(12px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%); display:flex; gap:10px; pointer-events:auto; }
  .wcard{ position:relative; width:82px; min-height:76px; padding:9px 5px 8px; border-radius:var(--r-md); cursor:pointer; overflow:hidden;
    background:var(--glass); border:1px solid var(--line); text-align:center; box-shadow:var(--sh-card); transition:transform .14s,border-color .2s,box-shadow .2s; }
  .wcard .wi{ width:28px; height:28px; margin:2px auto 4px; filter:drop-shadow(0 1px 2px #0007); }

  .wcard.sel{ border-color:var(--c1); transform:translateY(-3px);

  #overlay{ position:fixed; inset:0; z-index:30; display:flex; flex-direction:column; align-items:center; justify-content:center;

  #overlay.hidden{ display:none; }
  #overlay .glowbg{ position:absolute; width:min(90vw,720px); height:min(90vw,720px); border-radius:50%; filter:blur(90px); opacity:.16;

  @keyframes spin{ to{ transform:rotate(360deg) } }
  #overlay .inner{ position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:18px; padding:24px; }
  .tagline{ font-family:"Orbitron"; font-size:11px; letter-spacing:5px; color:var(--c2); opacity:.85; }
  #logo{ font-family:"Orbitron"; font-weight:900; font-size:clamp(38px,11vw,82px); letter-spacing:6px; line-height:1;

    filter:drop-shadow(0 2px 1px #0008) drop-shadow(0 8px 30px #1f8bff44); }
  #logo .b{ color:transparent; background:linear-gradient(180deg,#ffe3ea,#ff4d6e); -webkit-background-clip:text; background-clip:text; }
  .desc{ max-width:520px; font-size:13.5px; line-height:1.85; color:var(--tx2); }
  .desc b{ color:var(--tx); }
  .seg{ display:flex; background:linear-gradient(180deg,#0e1626,#0a111e); border:1px solid var(--line); border-radius:var(--r-md); padding:4px; gap:4px; }
  .seg button{ font-family:"Orbitron"; font-size:13px; letter-spacing:1px; padding:11px 24px; border:0; border-radius:var(--r-sm);
    background:transparent; color:var(--tx3); cursor:pointer; font-weight:700; transition:.15s; }
  .seg button.on{ background:linear-gradient(180deg,#1f3a60,#142848); color:var(--tx); box-shadow:inset 0 0 0 1px var(--c1), inset 0 1px 0 #ffffff20; }
  .start{ position:relative; overflow:hidden; font-family:"Orbitron"; font-weight:700; font-size:19px; letter-spacing:3px; color:#04121f;
    padding:16px 50px; border:0; border-radius:var(--r-md); cursor:pointer; background:linear-gradient(180deg,#9af0ff,#4fd4f0 45%,#1c9be0);
    box-shadow:0 12px 32px -10px var(--c1), inset 0 2px 0 #ffffff55, inset 0 -2px 8px #0a4a6a55; }
  .start:active{ transform:scale(.97); }
  .start::after{ content:""; position:absolute; top:0; left:-60%; width:40%; height:100%; transform:skewX(-20deg);
    background:linear-gradient(90deg,#fff0,#ffffff88,#fff0); animation:shine 3.2s ease-in-out infinite; }
  @keyframes shine{ 0%{left:-60%} 55%,100%{left:140%} }
  .res-stat{ font-family:"Orbitron"; font-size:14px; letter-spacing:2px; color:var(--tx3); }
  #overlay .inner{ max-height:100vh; overflow-y:auto; }
  .howto{ display:grid; grid-template-columns:1fr 1fr; gap:9px 16px; max-width:560px; margin:2px auto; }

  .htk{ flex:none; min-width:92px; text-align:center; font-family:"Orbitron"; font-size:10px; letter-spacing:.5px; color:var(--c1);
    background:linear-gradient(180deg,#0f1d36,#0b1424); border:1px solid var(--line); border-radius:999px; padding:5px 8px; }
  .btnrow{ display:flex; gap:12px; align-items:center; justify-content:center; flex-wrap:wrap; }
  .ghost{ background:linear-gradient(180deg,#141e34,#0d1320); border:1px solid var(--line); color:var(--tx2); font-size:15px;
    letter-spacing:2px; padding:15px 30px; border-radius:var(--r-md); cursor:pointer; box-shadow:var(--sh-card); }
  .ghost:active{ transform:scale(.97); }
  .tip{ font-size:11px; letter-spacing:1px; color:var(--tx-dim); }
  @media (max-width:620px){ .howto{ grid-template-columns:1fr; gap:7px; } }
  @media (max-height:480px){ #logo{ font-size:clamp(28px,8vw,52px); letter-spacing:4px; } #overlay .inner{ gap:11px; padding:14px; }
    .howto{ font-size:11px; } .tip{ display:none; } .tagline{ font-size:10px; } }

  /* force landscape gate */
  #rotate{ position:fixed; inset:0; z-index:60; display:none; flex-direction:column; align-items:center; justify-content:center;
    gap:22px; text-align:center; padding:30px; background:radial-gradient(circle at 50% 40%, #0e1730 0%, #080c18 60%, var(--bg) 100%); }
  #rotate .phone{ width:74px; height:120px; border:4px solid #4fd4f0; border-radius:14px; position:relative;
    box-shadow:0 0 26px -6px #4fd4f0; animation:tilt 2.4s ease-in-out infinite; }
  #rotate .phone::before{ content:""; position:absolute; left:50%; bottom:6px; width:14px; height:3px; border-radius:2px; background:#4fd4f0; transform:translateX(-50%); }
  #rotate .phone::after{ content:""; position:absolute; inset:8px 8px 16px; border-radius:5px; background:linear-gradient(180deg,#16223a,#0a1322); }
  @keyframes tilt{ 0%,35%{transform:rotate(0)} 60%,100%{transform:rotate(90deg)} }
  #rotate h2{ font-family:"Orbitron"; font-size:20px; letter-spacing:3px; color:var(--tx); }
  #rotate p{ font-size:13px; letter-spacing:1px; color:var(--tx3); }
  @media (orientation:portrait) and (max-width:1024px){ #rotate{ display:flex; } }

  @media (max-width:600px){
    .pinfo{ min-width:84px; } .hpbar{ width:80px; } .ava{ width:36px; height:36px; } .ava svg{width:21px;height:21px;}
    .player{ padding:7px 9px; gap:8px; } .hpnum{ width:24px; font-size:12px; }
    #center{ width:162px; } #windgauge,#fuelgauge{ width:80px; } #windval{ min-width:30px; }
    .wcard{ width:70px; min-height:70px; } #weapons{ gap:6px; }
  }
  @media (max-height:430px){ .wcard{ min-height:60px; padding:5px 4px; } .wcard .wi{ width:22px; height:22px; } }
</style>

<body>
<div id="stage">
  <canvas id="cv"></canvas>
  <div id="hud">
    <div class="player active" id="p1"><div class="ava" id="av1"></div>
      <div class="pinfo"><div class="pname">PLAYER 1</div>
        <div class="hpwrap"><div class="hpbar"><i id="hp1"></i></div><div class="hpnum" id="hn1">100</div></div></div></div>
    <div class="player" id="p2"><div class="ava" id="av2"></div>
      <div class="pinfo"><div class="pname" id="p2name">COM</div>
        <div class="hpwrap"><div class="hpbar"><i id="hp2"></i></div><div class="hpnum" id="hn2">100</div></div></div></div>
    <div id="center"><div id="turn" class="orb">READY</div>
      <div id="windbox"><span>WIND</span><div id="windgauge"><div class="mid"></div><div class="fill" id="windfill"></div></div><span id="windval">--</span></div>
      <div id="fuelbox"><span>MOVE</span><div id="fuelgauge"><i id="fuelfill"></i></div></div></div>

  <div class="glowbg"></div>

<script>
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=1280,H=720,VW=1280,VH=720,DPR=1,drawScale=1; const ZOOM=1.2, PX=3; let cam={scale:1};
const tcan=document.createElement('canvas'); const tctx=tcan.getContext('2d');
let solid=new Uint8Array(1);

function fitCanvas(){
  VW=Math.max(320,Math.floor(window.innerWidth));
  VH=Math.max(320,Math.floor(window.innerHeight));
  W=Math.round(VW*ZOOM); H=Math.round(VH*ZOOM); cam.scale=VW/W;
  const pw=Math.max(180,Math.round(VW/PX)), ph=Math.max(140,Math.round(VH/PX));
  cv.width=pw; cv.height=ph; drawScale=pw/W;       // low-res backing -> upscaled crisp by CSS
  tcan.width=W; tcan.height=H;
}

/* ---------- audio ---------- */
let AC=null; const actx=()=>{ if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } return AC; };
function beep(f,d,t='sine',v=.2,s){ const a=actx(); if(!a)return; const o=a.createOscillator(),g=a.createGain();
  o.type=t; o.frequency.value=f; if(s)o.frequency.exponentialRampToValueAtTime(s,a.currentTime+d);
  g.gain.value=v; g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+d); o.connect(g).connect(a.destination); o.start(); o.stop(a.currentTime+d); }
const sfxFire=()=>beep(220,.18,'square',.18,90);
function sfxBoom(){ const a=actx(); if(!a)return; const b=a.createBuffer(1,4400,a.sampleRate), d=b.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2); const s=a.createBufferSource(); s.buffer=b;
  const g=a.createGain(); g.gain.value=.35; g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.35); s.connect(g).connect(a.destination); s.start(); beep(70,.3,'sine',.25,30); }
const sfxHit=()=>beep(520,.12,'triangle',.22,180);

/* ---------- terrain ---------- */
const isSolid=(x,y)=>{ x|=0;y|=0; return x>=0&&x<W&&y>=0&&y<H&&solid[y*W+x]===1; };
const surfaceY=x=>{ x|=0; if(x<0||x>=W)return H; for(let y=0;y<H;y++) if(solid[y*W+x]===1) return y; return H; };
let bgHills=[], moon={x:0,y:0}, nebula=[], stars=[], towers=[], curStyle='';
const STAGE_NAMES={hills:'ROLLING HILLS',peak:'CENTRAL PEAK',chasm:'THE CHASM',plateaus:'STEP PLATEAU',islands:'FLOATING ISLES'};

function plat(x0,x1,y0,y1){ x0|=0;x1|=0;y0|=0;y1|=0; const r=12;
  for(let y=y0;y<y1;y++)for(let x=x0;x<x1;x++){ let ok=true;
    if(y<y0+r){ if(x<x0+r){ const dx=x-(x0+r),dy=y-(y0+r); if(dx*dx+dy*dy>r*r)ok=false; }
                else if(x>x1-r){ const dx=x-(x1-r),dy=y-(y0+r); if(dx*dx+dy*dy>r*r)ok=false; } }
    if(ok&&x>=0&&x<W&&y>=0&&y<H) solid[y*W+x]=1; } }

function genTerrain(){
  solid=new Uint8Array(W*H);
  const styles=['hills','peak','chasm','plateaus','islands'];
  curStyle=styles[(Math.random()*styles.length)|0];
  const o1=Math.random()*6.28,o2=Math.random()*6.28,o3=Math.random()*6.28;

  if(curStyle==='islands'){
    const floorY=H-16; for(let x=0;x<W;x++)for(let y=floorY;y<H;y++) solid[y*W+x]=1;
    plat(W*0.03,W*0.34, H*0.50, H*0.66);
    plat(W*0.66,W*0.97, H*0.50, H*0.66);
    plat(W*0.40,W*0.60, H*0.36, H*0.50);
    if(Math.random()<0.6){ plat(W*0.20,W*0.30,H*0.74,H*0.80); plat(W*0.70,W*0.80,H*0.74,H*0.80); }
  } else {
    const top=new Float32Array(W);
    for(let x=0;x<W;x++){ let h;
      if(curStyle==='hills') h=H*0.60+Math.sin(x*0.006+o1)*H*0.16+Math.sin(x*0.013+o2)*H*0.08+Math.sin(x*0.03+o3)*H*0.025;
      else if(curStyle==='peak'){ const dx=(x-W/2)/(W*0.15); h=H*0.84-Math.exp(-dx*dx)*H*0.52+Math.sin(x*0.02+o1)*8; }
      else if(curStyle==='chasm') h=H*0.50+Math.sin(x*0.008+o1)*H*0.05+Math.sin(x*0.02+o2)*H*0.02;
      else { const t=x/W; const step=t<0.34?H*0.50:(t<0.66?H*0.68:H*0.44); h=step; }
      top[x]=Math.max(H*0.24,Math.min(H-22,h));
    }
    if(curStyle==='plateaus') for(let k=0;k<10;k++){ const c=top.slice(); for(let x=1;x<W-1;x++) top[x]=(c[x-1]+2*c[x]+c[x+1])/4; }
    for(let x=0;x<W;x++){ if(curStyle==='chasm'){ const t=x/W; if(t>0.41&&t<0.59) continue; }
      for(let y=Math.floor(top[x]);y<H;y++) solid[y*W+x]=1; }
  }

  bgHills=[];

    for(let x=0;x<=W;x+=36) pts.push(yb+Math.sin(x*0.004+l*2+o1)*amp+Math.sin(x*0.011+l*1.7)*H*0.022);
    bgHills.push({pts,step:36,top:L.top,bot:L.bot}); }
  // distant neon city on the far layer

  // stars

  // nebula (soft additive glow)
  nebula=[]; const ncol=['#13344d','#241a46','#0e3a3f','#1a2c5a'];
  for(let i=0;i<3;i++) nebula.push({x:W*(0.12+Math.random()*0.76), y:H*(0.06+Math.random()*0.34), r:Math.min(W,H)*(0.32+Math.random()*0.26), c:ncol[(Math.random()*ncol.length)|0]});
  // moon
  moon={x:W*(0.16+Math.random()*0.66), y:H*(0.09+Math.random()*0.12), r:Math.min(W,H)*0.058, cr:[]};
  for(let i=0;i<5;i++) moon.cr.push({x:Math.random()*1.3-0.65, y:Math.random()*1.3-0.65, s:0.06+Math.random()*0.12});
}
function colorAndDecorate(){
  const img=tctx.createImageData(W,H), d=img.data;
  for(let x=0;x<W;x++){ let runTop=-1;
    for(let y=0;y<H;y++){ if(solid[y*W+x]===1){ if(runTop<0)runTop=y; const depth=y-runTop, i=(y*W+x)*4;
        if(depth<2){ d[i]=150;d[i+1]=246;d[i+2]=186; }                 // lit grass rim
        else if(depth<5){ d[i]=88;d[i+1]=216;d[i+2]=144; }             // grass
        else if(depth<8){ d[i]=44;d[i+1]=132;d[i+2]=92; }              // grass shade
        else if(depth<13){ d[i]=24;d[i+1]=40;d[i+2]=40; }             // AO band under turf
        else { const t=Math.min(1,depth/360), n=(Math.random()*14)|0, band=Math.sin(y*0.06)*8;
          d[i]=60+t*34+n+band; d[i+1]=44+t*24+n+band*0.7; d[i+2]=34+t*16+n; }   // rock strata
        d[i+3]=255;
      } else runTop=-1; } }
  tctx.putImageData(img,0,0);
  // surface decorations: layered grass, rocks, sci-fi crystals
  for(let x=6;x<W-2;x+=6+(Math.random()*14|0)){ const ty=surfaceY(x); if(ty>=H-3) continue;
    const rnd=Math.random();
    if(rnd<0.14){ // rock
      tctx.fillStyle='#2c3744'; tctx.beginPath(); tctx.ellipse(x,ty+1,3+Math.random()*4,3+Math.random()*2,0,0,7); tctx.fill();
      tctx.fillStyle='#3d4a58'; tctx.beginPath(); tctx.ellipse(x-1,ty-1,2,1.4,0,0,7); tctx.fill();
    } else if(rnd<0.18){ // glowing crystal
      const cc=Math.random()<0.5?'#5fe0ff':'#b98cff'; tctx.fillStyle=cc; tctx.shadowColor=cc; tctx.shadowBlur=8;
      tctx.beginPath(); tctx.moveTo(x,ty-9); tctx.lineTo(x+3,ty-1); tctx.lineTo(x,ty+1); tctx.lineTo(x-3,ty-1); tctx.closePath(); tctx.fill(); tctx.shadowBlur=0;
    } else { // grass tuft (two-tone)
      tctx.lineWidth=1.4;
      for(let b=-1;b<=1;b++){ const bx=x+b*2.2; tctx.strokeStyle=b===0?'#9bf7b8':'#5fcf86';
        tctx.beginPath(); tctx.moveTo(bx,ty+1); tctx.quadraticCurveTo(bx+b*2,ty-6,bx+b*4,ty-10); tctx.stroke(); }
    }
  }
}
function carve(cx,cy,r){
  const r2=r*r, x0=Math.max(0,cx-r|0),x1=Math.min(W-1,cx+r|0),y0=Math.max(0,cy-r|0),y1=Math.min(H-1,cy+r|0);
  for(let y=y0;y<=y1;y++)for(let x=x0;x<=x1;x++){ const dx=x-cx,dy=y-cy; if(dx*dx+dy*dy<=r2) solid[y*W+x]=0; }
  tctx.save(); tctx.globalCompositeOperation='destination-out'; tctx.beginPath(); tctx.arc(cx,cy,r,0,7); tctx.fill(); tctx.restore();
  tctx.save(); tctx.globalCompositeOperation='source-atop'; tctx.beginPath(); tctx.arc(cx,cy,r+4,0,7);
  tctx.lineWidth=7; tctx.strokeStyle='#150f0a'; tctx.stroke(); tctx.restore();
}

const GRAV=0.32, MOVE_TIME=240, WALK=2.9, JUMP=7.6, HEAL=28;
function aimVel(){ const a=pad.aim; if(!a.active) return {vx:0,vy:0,frac:0};
  const dx=a.tx-a.bx, dy=a.ty-a.by, len=Math.hypot(dx,dy), R=PADR(), frac=Math.min(1,len/R), mv=23;
  const dir= len<0.001?{x:0,y:0}:{x:dx/len,y:dy/len}; return {vx:dir.x*mv*frac, vy:dir.y*mv*frac, frac}; }

function makeRobot(x,side){ return {x,y:surfaceY(x)-16,vx:0,vy:0,hp:100,side,grounded:true,recoil:0}; }

  const y=(keyState['ArrowDown']||keyState['s']?1:0)-(keyState['ArrowUp']||keyState['w']?1:0); return {x,y}; }
function moveActive(){ const m=pad.move; if(m.active){ const dx=m.tx-m.bx,dy=m.ty-m.by,len=Math.hypot(dx,dy); if(len>PADR()*0.12) return {x:dx,y:dy,len}; }
  const k=keyVec(); if(k.x||k.y){ const R=PADR(),len=Math.hypot(k.x,k.y)*R; return {x:k.x*R,y:k.y*R,len}; } return null; }
function control(r,mv){ const R=PADR();
  r.vx=Math.max(-1,Math.min(1, mv.x/R))*WALK;                 // analog walk (left/right)
  if(mv.y < -R*0.45 && r.grounded){ r.vy=-JUMP; r.grounded=false; }  // push up = single jump
}

const setWind=()=> wind=(Math.random()*2-1)*0.11;

/* ---------- fire ---------- */
function fire(robot,vx,vy,wIdx){
  const w=WEAPONS[wIdx], a=Math.atan2(vy,vx);
  const mx=robot.x+Math.cos(a)*24, my=robot.y-4+Math.sin(a)*24;
  projectiles.push({x:mx,y:my,vx,vy,w,owner:robot,bounces:w.bounce,armed:false,trail:[]});
  for(let i=0;i<10;i++){ const sp=Math.random()*3+1; particles.push({x:mx,y:my,vx:Math.cos(a)*sp+(Math.random()-.5),vy:Math.sin(a)*sp+(Math.random()-.5),life:.6,color:'#ffd27a',sz:2+Math.random()*2}); }
  shake=Math.max(shake,5); sfxFire(); robot.recoil=1; phase='firing'; pad.move.active=false; pad.aim.active=false; hideHint();
}
function stepProjectiles(){
  for(let pi=projectiles.length-1;pi>=0;pi--){ const p=projectiles[pi]; p.vy+=GRAV*p.w.grav; p.vx+=wind*p.w.grav;
    const steps=Math.max(1,Math.ceil(Math.hypot(p.vx,p.vy)/3)); let done=false;
    for(let s=0;s<steps;s++){ const nx=p.x+p.vx/steps, ny=p.y+p.vy/steps;
      if(!p.armed && Math.hypot(nx-p.owner.x,ny-p.owner.y)>30) p.armed=true;
      if(nx<-60||nx>W+60||ny>H+80){ projectiles.splice(pi,1); done=true; break; }
      let hit=null; for(const r of robots){ if(r.hp<=0)continue; if(r===p.owner&&!p.armed)continue;
        if(Math.abs(nx-r.x)<16&&Math.abs(ny-r.y)<18){hit=r;break;} }
      if(hit){ explode(nx,ny,p); projectiles.splice(pi,1); done=true; break; }
      if(isSolid(nx,ny)){ if(p.bounces>0){ const n=surfaceNormal(nx,ny), dot=p.vx*n.x+p.vy*n.y;
          p.vx=(p.vx-2*dot*n.x)*0.55; p.vy=(p.vy-2*dot*n.y)*0.55; p.bounces--; p.x=nx-n.x*2; p.y=ny-n.y*2; beep(160,.05,'square',.1);
          if(Math.hypot(p.vx,p.vy)<1.5){ explode(p.x,p.y,p); projectiles.splice(pi,1); done=true; } break;
        } else { explode(nx,ny,p); projectiles.splice(pi,1); done=true; break; } }
      p.x=nx; p.y=ny; }
    if(!done){ p.trail.push({x:p.x,y:p.y}); if(p.trail.length>16)p.trail.shift(); } }
}
function surfaceNormal(x,y){ let nx=0,ny=0; for(let dx=-3;dx<=3;dx++)for(let dy=-3;dy<=3;dy++) if(isSolid(x+dx,y+dy)){nx-=dx;ny-=dy;} const m=Math.hypot(nx,ny)||1; return{x:nx/m,y:ny/m}; }
function explode(x,y,p){ const w=p.w; carve(x,y,w.radius); spawnExplosion(x,y,w.color,w.radius); shake=Math.max(shake,8+w.radius*0.22); sfxBoom();
  for(const r of robots){ if(r.hp<=0)continue; const d=Math.hypot(r.x-x,r.y-y);
    if(d<w.radius+22){ const f=1-d/(w.radius+22), dmg=Math.round(w.dmg*f);
      if(dmg>0){ r.hp=Math.max(0,r.hp-dmg); dmgNums.push({x:r.x,y:r.y-24,val:dmg,life:1,vy:-0.7,color:r.side===0?'#9fe8ff':'#ffb0c0'});
        if(r.side===0){ flash=Math.min(1,flash+f*.7); } sfxHit(); }
      const a=Math.atan2(r.y-y,r.x-x), k=f*9; r.vx+=Math.cos(a)*k; r.vy+=Math.sin(a)*k-2; r.grounded=false; } }
  if(w.type==='cluster') for(let i=0;i<5;i++){ const a=-Math.PI/2+(i-2)*0.34, sp=4+Math.random()*2;
    projectiles.push({x,y:y-6,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,w:{...w,type:'normal',radius:22,dmg:8},owner:p.owner,bounces:0,armed:true,trail:[]}); }
}

/* ---------- particles ---------- */
function spawnExplosion(x,y,color,r){
  for(let i=0;i<Math.min(70,r*1.4);i++){ const a=Math.random()*6.28, sp=Math.random()*7+1;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,life:1,color:Math.random()<.5?color:'#fff',sz:2+Math.random()*4}); }
  for(let i=0;i<16;i++) particles.push({x,y,vx:(Math.random()*2-1)*2,vy:-Math.random()*3-1,life:1,color:'#3a3a3a',sz:7+Math.random()*9,smoke:true});
  particles.push({x,y,life:.5,sz:r*0.9,flashRing:true});
}
function stepParticles(){
  for(let i=particles.length-1;i>=0;i--){ const p=particles[i];
    if(p.flashRing){ p.life-=0.08; if(p.life<=0)particles.splice(i,1); continue; }
    p.vy+=p.smoke?-0.02:0.18; p.x+=p.vx; p.y+=p.vy; p.vx*=0.98; p.life-=p.smoke?0.012:0.03; if(p.life<=0)particles.splice(i,1); }
  for(let i=dmgNums.length-1;i>=0;i--){ const n=dmgNums[i]; n.y+=n.vy; n.vy*=0.96; n.life-=0.018; if(n.life<=0)dmgNums.splice(i,1); }
}

/* ---------- robots ---------- */
function spawnItem(){ items.push({x:W*(0.18+Math.random()*0.64), y:-20, vy:0, rest:false}); }
function stepItems(){
  for(let i=items.length-1;i>=0;i--){ const it=items[i];
    if(!it.rest){ it.vy+=GRAV; it.y+=it.vy; if(it.x<10)it.x=10; if(it.x>W-10)it.x=W-10;
      if(isSolid(it.x,it.y+9)){ let up=0; while(isSolid(it.x,it.y+9)&&up<40){it.y--;up++;} it.vy=0; it.rest=true; }
      else if(it.y>H+30){ items.splice(i,1); continue; } }
    for(const r of robots){ if(r.hp<=0)continue; if(Math.abs(r.x-it.x)<18 && Math.abs(r.y-it.y)<22){
      const heal=Math.min(HEAL,100-r.hp); if(heal>0){ r.hp+=heal; dmgNums.push({x:r.x,y:r.y-26,val:heal,life:1.2,vy:-0.7,color:'#7dffb0',heal:true}); updateHUD(); }
      beep(620,.12,'sine',.18,940); beep(940,.12,'sine',.16); items.splice(i,1); break; } }
  }
}
function drawItems(){

    ctx.globalAlpha=0.18+0.22*pulse; ctx.fillStyle='#3dffa0'; ctx.beginPath(); ctx.arc(0,0,12,0,7); ctx.fill(); ctx.globalAlpha=1;

    ctx.fillStyle='#8effbe'; ctx.fillRect(-1.7,-5,3.4,10); ctx.fillRect(-5,-1.7,10,3.4);
    ctx.restore();

}
function stepRobots(){
  for(const r of robots){ if(r.recoil>0)r.recoil*=0.86; if(r.hp<=0)continue;
    r.vy+=GRAV; r.vx*=0.8;
    // horizontal: move, climb gentle slopes, block on steep walls
    const ox=r.x; r.x+=r.vx; if(r.x<14)r.x=14; if(r.x>W-14)r.x=W-14;
    if(isSolid(r.x,r.y+15)){ let up=0; while(isSolid(r.x,r.y+15)&&up<13){r.y--;up++;}
      if(isSolid(r.x,r.y+15)){ r.y+=up; r.x=ox; r.vx=0; } }
    // vertical: gravity / land / ceiling
    r.y+=r.vy;
    if(r.vy>=0 && isSolid(r.x,r.y+16)){ let up=0; while(isSolid(r.x,r.y+16)&&up<70){r.y--;up++;}
      if(r.vy>9){ const fd=Math.round((r.vy-9)*3); r.hp=Math.max(0,r.hp-fd); dmgNums.push({x:r.x,y:r.y-24,val:fd,life:1,vy:-0.7,color:'#ffd27a'}); }
      r.vy=0; r.grounded=true; }
    else if(r.vy<0 && isSolid(r.x,r.y-16)){ r.vy=0; }
    else r.grounded=false;
    if(r.y>H+40)r.hp=0; }
}
const robotsResting=()=> robots.every(r=> r.hp<=0 || (r.grounded&&Math.abs(r.vy)<0.6&&Math.abs(r.vx)<0.4));

/* ---------- turns ---------- */
function endTurnCheck(){ if(projectiles.length===0 && robotsResting()){ updateHUD();
    if(robots.some(r=>r.hp<=0)){ gameOver(); return; }
    cur=1-cur; phase='aim'; pad.move.active=false; pad.aim.active=false; moveTimer=MOVE_TIME; moveStarted=false; setWind(); refreshActive(); banner(cur===0?'PLAYER 1':(vsCOM?'COM':'PLAYER 2'));
    if(items.length<2 && Math.random()<0.45) spawnItem();
    if(!(vsCOM&&cur===1)) showHint(); if(vsCOM&&cur===1){ aiTimer=45; aiPlan=null; } } }
function gameOver(){ phase='over'; const alive=robots.findIndex(r=>r.hp>0); let title,sub;
  if(alive===-1){ title='DRAW'; sub='相打ち'; } else if(alive===0){ title='PLAYER 1 WIN'; sub='勝利'; }
  else { title=vsCOM?'COM WIN':'PLAYER 2 WIN'; sub=vsCOM?'敗北…':'勝利'; }
  const stat='残りHP '+Math.max(0,Math.round((robots[Math.max(0,alive)]||{}).hp||0))+' %';
  setTimeout(()=>showResult(title,sub,stat),700); }

/* ---------- AI ---------- */
function aiThink(){ const me=robots[1],foe=robots[0]; weaponSel[1]=Math.floor(Math.random()*WEAPONS.length); buildWeaponUI();
  const dir=foe.x<me.x?-1:1; let best=null;
  for(let ang=18*Math.PI/180;ang<78*Math.PI/180;ang+=4*Math.PI/180)
    for(let pw=8;pw<=23;pw+=1.5){ const vx=dir*Math.cos(ang)*pw, vy=-Math.sin(ang)*pw;
      const d=simShot(me.x,me.y,vx,vy,WEAPONS[weaponSel[1]]); if(best===null||d<best.d)best={vx,vy,d}; }
  const err=1+(Math.random()*2-1)*0.06; aiPlan={vx:best.vx*err,vy:best.vy*err}; }
function simShot(sx,sy,vx,vy,w){ const a=Math.atan2(vy,vx); let x=sx+Math.cos(a)*24,y=sy+Math.sin(a)*24; const foe=robots[0]; let md=1e9;
  for(let t=0;t<500;t++){ vy+=GRAV*w.grav; vx+=wind*w.grav; x+=vx; y+=vy; const d=Math.hypot(x-foe.x,y-foe.y); if(d<md)md=d; if(x<0||x>W||y>H||isSolid(x,y))break; } return md; }

function drawMountain(h){ if(!h)return; let minY=H; for(const p of h.pts) if(p<minY)minY=p;
  const grd=ctx.createLinearGradient(0,minY,0,H); grd.addColorStop(0,h.top); grd.addColorStop(1,h.bot);
  ctx.fillStyle=grd; ctx.beginPath(); ctx.moveTo(0,H); let x=0; for(const py of h.pts){ ctx.lineTo(x,py); x+=h.step; } ctx.lineTo(W,H); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#ffffff0e'; ctx.lineWidth=1; ctx.beginPath(); x=0; for(const py of h.pts){ x===0?ctx.moveTo(0,py):ctx.lineTo(x,py); x+=h.step; } ctx.stroke(); }
function drawTowers(){ for(const t of towers){

  if(t.lit){ const a=0.35+0.6*(0.5+0.5*Math.sin(tick*0.06+t.ph)); ctx.globalAlpha=a; ctx.fillStyle='#ff5a6e'; ctx.shadowColor='#ff3050'; ctx.shadowBlur=6;
    ctx.fillRect(t.x-1.4, t.y-t.h-9, 2.8,2.8); ctx.shadowBlur=0; ctx.globalAlpha=1; } } }
function draw(){

    ctx.beginPath(); ctx.moveTo(s.x-L,s.y); ctx.lineTo(s.x+L,s.y); ctx.moveTo(s.x,s.y-L); ctx.lineTo(s.x,s.y+L); ctx.stroke(); } ctx.globalAlpha=1;

      ctx.beginPath(); ctx.arc(p.x,p.y,(1-p.life)*p.sz*2,0,7); ctx.stroke(); continue; }
    ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.sz*(p.smoke?p.life+0.5:1),0,7); ctx.fill(); }

    ctx.lineWidth=4; ctx.strokeStyle='#0009'; ctx.strokeText(t,n.x,n.y); ctx.fillStyle=n.color; ctx.fillText(t,n.x,n.y); }

    ctx.font='900 40px Orbitron,sans-serif'; ctx.fillStyle=cur===0?'#4fd4f0':'#ff5a7a'; ctx.shadowColor='#000'; ctx.shadowBlur=14;
    ctx.fillText(msg,W/2,H*0.18); ctx.font='600 14px Exo 2,sans-serif'; ctx.fillStyle='#cfe8ff'; ctx.fillText('TURN',W/2,H*0.18+24);
    ctx.shadowBlur=0; ctx.globalAlpha=1; }
}
function aimToFoe(r){ const foe=robots[1-r.side]; const tx=foe?foe.x:r.x+(r.side?-30:30), ty=(foe&&foe.hp>0)?foe.y:r.y-30; return Math.atan2(ty-r.y,tx-r.x); }
function drawWreck(){
  ctx.fillStyle='#10151f'; ctx.beginPath(); ctx.roundRect(-22,6,44,11,5); ctx.fill();
  ctx.fillStyle='#161b26'; ctx.beginPath(); ctx.moveTo(-20,6); ctx.lineTo(-13,-3); ctx.lineTo(13,-1); ctx.lineTo(20,6); ctx.closePath(); ctx.fill();
  ctx.save(); ctx.translate(2,-4); ctx.rotate(-0.55); ctx.fillStyle='#1a2230'; ctx.strokeStyle='#0c1526'; ctx.lineWidth=1; ctx.beginPath(); ctx.roundRect(0,-3,22,6,2); ctx.fill(); ctx.stroke(); ctx.restore();
  ctx.strokeStyle='#3a4150'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(-6,-1); ctx.lineTo(-10,-9); ctx.moveTo(4,-2); ctx.lineTo(9,-9); ctx.stroke();
  if(Math.floor(tick/8)%2===0){ ctx.globalAlpha=.85; ctx.fillStyle='#ffb347'; ctx.shadowColor='#ff7a1a'; ctx.shadowBlur=8; ctx.beginPath(); ctx.arc((tick*5%14)-7,-7,1.6,0,7); ctx.fill(); ctx.shadowBlur=0; ctx.globalAlpha=1; } }
function drawRobot(r){
  const top=r.side===0, c=top?'#4fd4f0':'#ff6f8b', cd=top?'#1c9be0':'#ff3057', cl=top?'#cdf3ff':'#ffd6df';
  let ang; if(r.side===cur && phase==='aim' && pad.aim.active){ const v=aimVel(); ang=v.frac>0.02?Math.atan2(v.vy,v.vx):aimToFoe(r); } else ang=aimToFoe(r);
  const rec=r.recoil||0, moving=(r.side===cur && moveStarted && moveTimer>0 && !!moveActive());
  ctx.save(); ctx.translate(r.x, r.y);
  // ground shadow
  ctx.fillStyle='#00000055'; ctx.beginPath(); ctx.ellipse(0,17,23,4.5,0,0,7); ctx.fill();
  if(r.hp<=0){ drawWreck(); ctx.restore(); return; }
  // ---- tracks ----
  ctx.fillStyle='#0e1626'; ctx.strokeStyle='#0a1322'; ctx.lineWidth=1; ctx.beginPath(); ctx.roundRect(-22,6,44,12,5); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#1b2740'; for(let wx=-16; wx<=16; wx+=8){ ctx.beginPath(); ctx.arc(wx,15,3.4,0,7); ctx.fill(); }
  ctx.fillStyle='#243049'; ctx.beginPath(); ctx.arc(-20,15,2,0,7); ctx.arc(20,15,2,0,7); ctx.fill();
  const toff=Math.floor((moving?tick*0.9:tick*0.25))%5; ctx.strokeStyle='#33405e'; ctx.lineWidth=1.4;

  ctx.fillStyle=hg; ctx.strokeStyle='#0c1526'; ctx.lineWidth=1.5;

  ctx.strokeStyle='#ffffff22'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(-16,-3.2); ctx.lineTo(14,-3.2); ctx.stroke();
  ctx.fillStyle=c; ctx.globalAlpha=.85; ctx.fillRect(-20,3,40,2); ctx.globalAlpha=1;
  ctx.fillStyle=cd; ctx.fillRect(17,-2,5,5);
  ctx.fillStyle='#0c1526'; for(const rx of [-13,13]){ ctx.beginPath(); ctx.arc(rx,0,1,0,7); ctx.fill(); }
  // ---- turret ----
  ctx.fillStyle='#27314c'; ctx.strokeStyle='#0c1526'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.roundRect(-10,-15,20,12,5); ctx.fill(); ctx.stroke();
  ctx.strokeStyle='#ffffff1c'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(-8,-14); ctx.lineTo(8,-14); ctx.stroke();
  ctx.fillStyle='#19223a'; ctx.beginPath(); ctx.arc(-3,-9,3,0,7); ctx.fill();          // hatch
  ctx.fillStyle=cl; ctx.shadowColor=c; ctx.shadowBlur=8; ctx.beginPath(); ctx.arc(5,-9,1.9,0,7); ctx.fill(); ctx.shadowBlur=0;  // optic
  ctx.strokeStyle='#3b486a'; ctx.lineWidth=1.2; ctx.beginPath(); ctx.moveTo(-8,-14); ctx.lineTo(-12,-23); ctx.stroke();         // antenna
  const blink=(Math.floor(tick/28)%2)===0; if(blink){ctx.shadowColor=c;ctx.shadowBlur=8;} ctx.fillStyle=blink?c:'#33405e';
  ctx.beginPath(); ctx.arc(-12,-23,1.5,0,7); ctx.fill(); ctx.shadowBlur=0;
  // ---- barrel (rotates) ----
  ctx.save(); ctx.translate(0,-9); ctx.rotate(ang); ctx.translate(-rec*5,0);
  const ag=ctx.createLinearGradient(0,-4,0,4); ag.addColorStop(0,'#4a597d'); ag.addColorStop(.5,'#2a3450'); ag.addColorStop(1,'#161f33');
  ctx.fillStyle=ag; ctx.strokeStyle='#0c1526'; ctx.lineWidth=1; ctx.beginPath(); ctx.roundRect(0,-4,30,8,2); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#1a2336'; ctx.fillRect(23,-5,3,10); ctx.fillRect(27,-5,2,10);                 // muzzle brake
  ctx.fillStyle=cd; ctx.fillRect(30,-5,2,10); ctx.fillStyle='#06101f'; ctx.beginPath(); ctx.arc(31,0,1.8,0,7); ctx.fill();
  ctx.fillStyle=c; ctx.globalAlpha=.45+0.45*Math.sin(tick*0.2); ctx.fillRect(2,-2.5,3,5); ctx.globalAlpha=1;   // energy
  if(rec>0.3){ ctx.globalAlpha=rec; ctx.fillStyle=cl; ctx.shadowColor=c; ctx.shadowBlur=18; ctx.beginPath(); ctx.arc(33,0,6*rec,0,7); ctx.fill(); ctx.shadowBlur=0; ctx.globalAlpha=1; }
  ctx.restore();

}
function drawAim(){
  const r=robots[cur], v=aimVel(), w=WEAPONS[weaponSel[cur]]; if(v.frac<0.02) return;
  let x=r.x,y=r.y-6,dvx=v.vx,dvy=v.vy; const TN=20;
  for(let t=0;t<TN;t++){ dvy+=GRAV*w.grav; dvx+=wind*w.grav; x+=dvx; y+=dvy;
    if(t%2===0){ ctx.globalAlpha=(1-t/TN)*.9; ctx.fillStyle=w.color; ctx.beginPath(); ctx.arc(x,y,2.6,0,7); ctx.fill(); }
    if(isSolid(x,y)||y>H||x<0||x>W) break; }
  ctx.globalAlpha=1;
  const a=Math.atan2(v.vy,v.vx); ctx.globalAlpha=.9; ctx.strokeStyle=v.frac>0.92?'#ff5a7a':w.color; ctx.lineWidth=3; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(r.x,r.y-6); ctx.lineTo(r.x+Math.cos(a)*26,r.y-6+Math.sin(a)*26); ctx.stroke(); ctx.lineCap='butt'; ctx.globalAlpha=1;
}
function padBase(k){ const R=PADR(); return k==='move'?{x:R+22,y:H-R-14}:{x:W-R-22,y:H-R-14}; }

  drawThumb(pad.move,'#7fe6ff'); drawThumb(pad.aim,'#ffd98a'); }
function drawBase(b,col,label){ const R=PADR();
  ctx.globalAlpha=.09; ctx.fillStyle=col; ctx.beginPath(); ctx.arc(b.x,b.y,R,0,7); ctx.fill(); ctx.globalAlpha=1;
  ctx.strokeStyle=col+'55'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(b.x,b.y,R,0,7); ctx.stroke();
  ctx.globalAlpha=.45; ctx.fillStyle=col; ctx.font='700 11px Orbitron,sans-serif'; ctx.textAlign='center'; ctx.fillText(label,b.x,b.y+4); ctx.globalAlpha=1; }
function drawThumb(pd,col){ if(!pd.active)return; const R=PADR(); let dx=pd.tx-pd.bx,dy=pd.ty-pd.by,len=Math.hypot(dx,dy); if(len>R){dx*=R/len;dy*=R/len;}
  ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=14; ctx.beginPath(); ctx.arc(pd.bx+dx,pd.by+dy,18,0,7); ctx.fill(); ctx.shadowBlur=0;
  ctx.fillStyle='#06101f'; ctx.beginPath(); ctx.arc(pd.bx+dx,pd.by+dy,5,0,7); ctx.fill(); }

/* ---------- loop ---------- */
function loop(){ tick++; stepItems();
  if(phase==='firing'){ stepProjectiles(); stepParticles(); stepRobots(); endTurnCheck(); }
  else{ stepParticles();
    const human=phase==='aim'&&!(vsCOM&&cur===1);
    if(human){ const mv=moveActive();
      if(mv&&!moveStarted)moveStarted=true;
      if(moveStarted&&moveTimer>0)moveTimer--;
      if(mv&&moveStarted&&moveTimer>0) control(robots[cur],mv);
      updateFuel(); }
    stepRobots();
    if(phase==='aim'&&vsCOM&&cur===1){ if(aiPlan===null){ if(--aiTimer<=0)aiThink(); } else { aiTimer--; if(aiTimer<-25){ fire(robots[1],aiPlan.vx,aiPlan.vy,weaponSel[1]); aiPlan=null; } } } }
  if(msgTimer>0)msgTimer--; draw(); requestAnimationFrame(loop);
}

function pos(e){ const r=cv.getBoundingClientRect(); return {x:((e.clientX-r.left)*(VW/r.width))/cam.scale, y:((e.clientY-r.top)*(VH/r.height))/cam.scale}; }
function onDown(e){ if(phase!=='aim'||(vsCOM&&cur===1))return; e.preventDefault(); actx();
  const p=pos(e); const which=(e.pointerType==='mouse')?'aim':(p.x<W*0.5?'move':'aim'); const pd=pad[which];
  if(pd.active)return; const b=padBase(which); pd.active=true; pd.id=e.pointerId; pd.bx=b.x; pd.by=b.y; pd.tx=p.x; pd.ty=p.y; hideHint(); }
function onMove(e){ for(const k of ['move','aim']){ const pd=pad[k]; if(pd.active&&pd.id===e.pointerId){ e.preventDefault(); const p=pos(e); pd.tx=p.x; pd.ty=p.y; } } }
function onUp(e){ for(const k of ['move','aim']){ const pd=pad[k]; if(pd.active&&pd.id===e.pointerId){
    if(k==='aim'){ const v=aimVel(); if(v.frac>=0.12) fire(robots[cur],v.vx,v.vy,weaponSel[cur]); else showHint(); }
    pd.active=false; pd.id=-1; } } }
cv.addEventListener('pointerdown',onDown); cv.addEventListener('pointermove',onMove);
window.addEventListener('pointerup',onUp); window.addEventListener('pointercancel',onUp);

const mPVE=document.getElementById('mPVE'),mPVP=document.getElementById('mPVP');
mPVE.onclick=()=>{ vsCOM=true; mPVE.classList.add('on'); mPVP.classList.remove('on'); };
mPVP.onclick=()=>{ vsCOM=false; mPVP.classList.add('on'); mPVE.classList.remove('on'); };
document.getElementById('startBtn').onclick=newGame;
document.getElementById('homeBtn').onclick=showHome;

/* ---------- resize ---------- */
let rT; window.addEventListener('resize',()=>{ clearTimeout(rT); rT=setTimeout(()=>{ fitCanvas(); genTerrain();
  if(robots.length){ for(const r of robots){ r.x=Math.max(20,Math.min(W-20,r.x)); r.y=surfaceY(r.x)-16; r.vx=r.vy=0; r.grounded=true; } updateHUD(); }
}, 220); });
window.addEventListener('orientationchange',()=>{ clearTimeout(rT); rT=setTimeout(()=>{ fitCanvas(); genTerrain();
  if(robots.length) for(const r of robots){ r.x=Math.max(20,Math.min(W-20,r.x)); r.y=surfaceY(r.x)-16; r.vx=r.vy=0; r.grounded=true; }
}, 300); });

/* ---------- boot ---------- */
fitCanvas(); genTerrain(); robots=[makeRobot(W*0.16,0),makeRobot(W*0.84,1)]; buildWeaponUI(); loop();
</script>
</body>
</html>
