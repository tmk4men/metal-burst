<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>METAL BURST — ターン制砲撃バトル</title>
<meta name="description" content="弾道・風・破壊できる地形を読んで相手を撃ち抜く、ブラウザで遊べるターン制砲撃バトル。スマホ対応・無料。">
<meta name="theme-color" content="#070a14">

<meta property="og:type" content="website">

<meta property="og:url" content="https://tmk4men.github.io/metal-burst/">

<meta name="twitter:description" content="弾道・風・破壊できる地形を読んで撃ち抜く、ブラウザで遊べる砲撃バトル。スマホ対応・無料。">
<meta name="twitter:image" content="https://tmk4men.github.io/metal-burst/og.png">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#060810; --bg2:#0a0f1c;
    --panel-hi:#141e34; --panel-lo:#0c1320;
    --line:#243049; --line2:#313f5c; --track:#0a1120; --track-line:#1c2740;
    --tx:#dfeaff; --tx2:#aebfdc; --tx3:#8298bb; --tx-dim:#607394;
    --c1:#4fd4f0; --c1d:#1c9be0; --c2:#ff5a7a; --c2d:#ff3057; --warn:#ffb347;
    --gold:#ffd45e; --gold2:#ffae3c;
    --rN:#8aa0c0; --rR:#56b8ff; --rSR:#c98cff; --rUR:#ffd45e;
    --r-lg:16px; --r-md:12px; --r-sm:8px; --r-xs:6px;
    --glass:linear-gradient(180deg,#141e34e6,#0c1320e6);
    --sh-panel:0 8px 28px -6px #000a, inset 0 1px 0 #ffffff12, inset 0 -1px 0 #00000040;
    --sh-card:0 6px 18px -6px #0009, inset 0 1px 0 #ffffff0e;
  }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
  html,body{ height:100%; background:var(--bg); overflow:hidden; font-family:"Exo 2",sans-serif; color:var(--tx2); }
  .orb{ font-family:"Orbitron",sans-serif; }
  #stage{ position:fixed; inset:0; }
  canvas#cv{ display:block; width:100%; height:100%; touch-action:none; background:#0a0e18;
    image-rendering:pixelated; image-rendering:crisp-edges; }
  #stage::after{ content:""; position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(130% 130% at 50% 42%, #0000 58%, #00000066 100%); }

  #hud{ position:fixed; inset:0; pointer-events:none; padding-top:env(safe-area-inset-top); }
  .player{ position:fixed; top:calc(12px + env(safe-area-inset-top)); display:flex; gap:11px; align-items:center; padding:9px 13px;
    background:var(--glass); border:1px solid var(--line); border-radius:var(--r-lg); backdrop-filter:blur(10px); box-shadow:var(--sh-panel); }
  #p1{ left:12px; } #p2{ right:12px; flex-direction:row-reverse; }
  .player.active{ box-shadow:0 0 0 1px color-mix(in srgb,currentColor 55%,transparent), 0 0 20px -8px currentColor, var(--sh-panel); }
  #p1.active{ color:var(--c1); } #p2.active{ color:var(--c2); }
  .player.hurt{ animation:hurt .4s; }
  @keyframes hurt{ 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(5px)} 60%{transform:translateX(-3px)} 80%{transform:translateX(2px)} }
  .ava{ width:42px; height:42px; border-radius:var(--r-md); flex:none; display:grid; place-items:center;
    background:radial-gradient(120% 120% at 30% 25%,#16223a,#0a1322); border:1px solid currentColor; box-shadow:inset 0 0 14px -5px currentColor, inset 0 1px 0 #ffffff10; }
  .ava svg{ width:25px; height:25px; }
  .pinfo{ min-width:142px; } #p2 .pinfo{ text-align:right; }
  .pname{ font-size:11px; letter-spacing:1.5px; font-weight:700; color:var(--tx3); }
  .hpwrap{ display:flex; align-items:center; gap:8px; margin-top:6px; } #p2 .hpwrap{ flex-direction:row-reverse; }
  .hpbar{ position:relative; width:142px; height:12px; border-radius:var(--r-xs); overflow:hidden; border:1px solid var(--track-line);
    background:repeating-linear-gradient(90deg,var(--track) 0 13px,#0e1626 13px 14px); }
  .hpbar i{ position:absolute; inset:0; transform-origin:left; transition:width .35s cubic-bezier(.2,.8,.2,1); }
  #p2 .hpbar i{ transform-origin:right; }
  #p1 .hpbar i{ background:linear-gradient(180deg,#7fe6ff,var(--c1d)); box-shadow:inset 0 0 8px #ffffff33, inset 0 1px 0 #ffffff55; }
  #p2 .hpbar i{ background:linear-gradient(180deg,#ff8ca2,var(--c2d)); box-shadow:inset 0 0 8px #ffffff33, inset 0 1px 0 #ffffff55; }
  .hpnum{ font-family:"Orbitron"; font-size:14px; font-weight:700; width:30px; color:var(--tx); }

  #center{ position:fixed; top:calc(10px + env(safe-area-inset-top)); left:50%; transform:translateX(-50%); text-align:center; width:230px; }
  #turn{ font-family:"Orbitron"; font-weight:700; font-size:13px; letter-spacing:2px; padding:8px 10px; color:var(--tx3);
    border-radius:var(--r-md); background:var(--glass); border:1px solid var(--line); box-shadow:var(--sh-card);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #turn b{ color:var(--tx); }
  #windbox,#fuelbox{ margin-top:8px; display:flex; align-items:center; justify-content:center; gap:8px; font-size:10px; letter-spacing:2px; color:var(--tx3); }
  #fuelbox{ display:none; } #fuelbox.show{ display:flex; }
  #windgauge,#fuelgauge{ position:relative; height:8px; border-radius:var(--r-xs); background:var(--track); border:1px solid var(--track-line); overflow:hidden; }
  #windgauge{ width:118px; } #fuelgauge{ width:118px; height:7px; }
  #windgauge .mid{ position:absolute; left:50%; top:0; bottom:0; width:1px; background:var(--line2); }
  #windgauge .fill{ position:absolute; top:0; bottom:0; left:50%; width:0; box-shadow:inset 0 0 6px #ffffff30; }
  #fuelgauge i{ position:absolute; inset:0; transform-origin:left; background:linear-gradient(180deg,#ffd98a,var(--warn)); box-shadow:inset 0 0 6px #ffffff33; }
  #windval{ font-family:"Orbitron"; min-width:38px; text-align:left; color:var(--tx2); }

  /* ---- pull-up weapon dock ---- */
  #wdock{ position:fixed; left:50%; bottom:calc(22px + env(safe-area-inset-bottom)); transform:translateX(-50%); pointer-events:auto;
    display:flex; flex-direction:column; align-items:center; gap:8px; z-index:8; max-width:96vw; }
  #wtray{ display:flex; gap:9px; padding:10px; border-radius:var(--r-lg); background:var(--glass); border:1px solid var(--line);
    box-shadow:var(--sh-panel); backdrop-filter:blur(10px); max-width:min(92vw,420px); overflow-x:auto; scrollbar-width:none;
    transform:translateY(18px) scale(.96); opacity:0; pointer-events:none; transition:transform .22s cubic-bezier(.2,.9,.25,1),opacity .18s; transform-origin:bottom center; }
  #wtray::-webkit-scrollbar{ display:none; }
  .wcard{ flex:none; }
  #wdock.open #wtray{ transform:translateY(0) scale(1); opacity:1; pointer-events:auto; }
  .wcard{ position:relative; width:74px; min-height:74px; padding:9px 5px 8px; border-radius:var(--r-md); cursor:pointer; overflow:hidden;
    background:linear-gradient(180deg,#101a2e,#0a1120); border:1px solid var(--line); text-align:center; box-shadow:var(--sh-card); transition:transform .14s,border-color .2s,box-shadow .2s; }
  .wcard .wi{ width:28px; height:28px; margin:1px auto 3px; filter:drop-shadow(0 1px 2px #0007); }
  .wcard .wn{ font-size:11px; font-weight:700; letter-spacing:.3px; color:var(--tx2); }
  .wcard .wammo{ font-family:"Orbitron"; font-size:10px; letter-spacing:.5px; color:var(--tx3); margin-top:2px; }
  .wcard .wammo b{ color:var(--c1); }
  .wcard.sel{ border-color:var(--c1); transform:translateY(-3px);
    box-shadow:0 0 0 1px var(--c1), inset 0 1px 0 #4fd4f055, inset 0 14px 26px -18px var(--c1), 0 10px 22px -10px var(--c1); }
  .wcard.sel .wn{ color:var(--tx); } .wcard.sel .wi{ filter:drop-shadow(0 0 6px currentColor); }
  .wcard.lock{ opacity:.36; pointer-events:none; }
  .wcard.lock .wammo b{ color:var(--c2); }
  #whandle{ display:flex; align-items:center; gap:10px; padding:8px 16px 8px 11px; border-radius:999px; cursor:pointer;
    background:var(--glass); border:1px solid var(--line); box-shadow:var(--sh-panel); backdrop-filter:blur(10px); transition:transform .14s,border-color .2s; }
  #whandle:active{ transform:scale(.97); }
  #wdock.open #whandle{ border-color:var(--c1); }
  #whandle .hgrip{ width:26px; height:4px; border-radius:3px; background:var(--line2); box-shadow:0 6px 0 -1px var(--line2); margin-right:2px; opacity:.8; }
  #whandle .hi{ width:26px; height:26px; flex:none; filter:drop-shadow(0 1px 2px #0008); }
  #whandle .hn{ font-family:"Orbitron"; font-size:12px; font-weight:700; letter-spacing:1px; color:var(--tx); }
  #whandle .ha{ font-family:"Orbitron"; font-size:11px; color:var(--tx3); }
  #whandle .ha b{ color:var(--c1); }
  #wdock.locked{ opacity:.5; pointer-events:none; filter:grayscale(.5); }

  #hint{ position:fixed; bottom:calc(120px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%); font-size:11px;
    letter-spacing:.5px; color:var(--tx2); background:var(--glass); padding:6px 14px; border-radius:14px; border:1px solid var(--line);
    box-shadow:var(--sh-card); opacity:0; transition:opacity .4s; white-space:normal; text-align:center; line-height:1.4;
    max-width:calc(100vw - 32px); pointer-events:none; }
  #hint.show{ opacity:.96; }
  #stagetag{ position:fixed; top:calc(84px + env(safe-area-inset-top)); left:14px; font-family:"Orbitron"; font-size:10px;
    letter-spacing:2px; color:var(--tx-dim); pointer-events:none; }
  #coinHud{ position:fixed; top:calc(82px + env(safe-area-inset-top)); right:14px; font-family:"Orbitron"; font-size:12px;
    letter-spacing:1px; color:var(--gold); pointer-events:none; display:flex; align-items:center; gap:6px;
    background:linear-gradient(180deg,#141e34c0,#0c1320c0); border:1px solid var(--line); border-radius:999px; padding:4px 10px; box-shadow:var(--sh-card); }
  #coinHud .ci{ width:14px; height:14px; }

  /* level-up / pickup toast */
  #toast{ position:fixed; top:calc(64px + env(safe-area-inset-top)); left:50%; transform:translate(-50%,-12px); z-index:20;
    font-family:"Orbitron"; font-size:13px; letter-spacing:2px; color:#06121f; padding:10px 22px; border-radius:999px; white-space:nowrap;
    background:linear-gradient(180deg,#ffe9a8,var(--gold) 55%,var(--gold2)); box-shadow:0 10px 26px -8px var(--gold2), inset 0 1px 0 #fff8;
    opacity:0; pointer-events:none; transition:opacity .3s,transform .3s; font-weight:700; }
  #toast.show{ opacity:1; transform:translate(-50%,0); }

  #overlay{ position:fixed; inset:0; z-index:30; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:18px; overflow:hidden;
    background:radial-gradient(circle at 50% 40%, rgba(11,20,42,.42) 0%, rgba(7,11,22,.8) 55%, rgba(5,6,13,.93) 100%); }
  #overlay.hidden{ display:none; }
  #overlay::after{ content:""; position:absolute; inset:0; pointer-events:none; z-index:2; opacity:.5;
    background:repeating-linear-gradient(0deg, #0000 0 2px, #00000026 2px 4px); }
  #overlay .glowbg{ position:absolute; width:min(90vw,720px); height:min(90vw,720px); border-radius:50%; filter:blur(90px); opacity:.16;
    background:conic-gradient(from 0deg,var(--c1),var(--c2),var(--c1)); animation:spin 16s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg) } }
  #overlay .inner{ position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:14px; padding:20px; max-height:100vh; overflow-y:auto; width:100%; }
  .tagline{ font-family:"Orbitron"; font-size:11px; letter-spacing:5px; color:var(--c2); opacity:.85; }
  #logo{ font-family:"Orbitron"; font-weight:900; font-size:clamp(34px,9vw,72px); letter-spacing:6px; line-height:1;
    background:linear-gradient(180deg,#f2faff,#7fd5ff 58%,#1878e0); -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 2px 1px #0008) drop-shadow(0 8px 30px #1f8bff44); }
  #logo .b{ color:transparent; background:linear-gradient(180deg,#ffe3ea,#ff4d6e); -webkit-background-clip:text; background-clip:text; }
  .res-stat{ font-family:"Orbitron"; font-size:14px; letter-spacing:2px; color:var(--tx3); }
  .start{ position:relative; overflow:hidden; font-family:"Orbitron"; font-weight:700; font-size:19px; letter-spacing:3px; color:#04121f;
    padding:15px 50px; border:0; border-radius:var(--r-md); cursor:pointer; background:linear-gradient(180deg,#9af0ff,#4fd4f0 45%,#1c9be0);
    box-shadow:0 12px 32px -10px var(--c1), inset 0 2px 0 #ffffff55, inset 0 -2px 8px #0a4a6a55; }
  .start:active{ transform:scale(.97); }
  .start::after{ content:""; position:absolute; top:0; left:-60%; width:40%; height:100%; transform:skewX(-20deg);
    background:linear-gradient(90deg,#fff0,#ffffff88,#fff0); animation:shine 3.2s ease-in-out infinite; }
  @keyframes shine{ 0%{left:-60%} 55%,100%{left:140%} }
  .btnrow{ display:flex; gap:12px; align-items:center; justify-content:center; flex-wrap:wrap;
    position:sticky; bottom:0; z-index:3; padding:10px 0 4px; width:100%;
    background:linear-gradient(180deg,#0a0f1c00,#0a0f1cd9 45%); }
  .ghost{ background:linear-gradient(180deg,#141e34,#0d1320); border:1px solid var(--line); color:var(--tx2); font-size:15px;
    letter-spacing:2px; padding:14px 28px; border-radius:var(--r-md); cursor:pointer; box-shadow:var(--sh-card); }
  .ghost:active{ transform:scale(.97); }

  /* ---- home meta panel ---- */
  #meta{ width:min(94vw,720px); }
  .toprow{ display:grid; grid-template-columns:1fr auto; align-items:center; gap:12px; margin-bottom:12px; }
  .namebox{ display:flex; align-items:center; gap:8px; background:linear-gradient(180deg,#0e1626,#0a111e); border:1px solid var(--line);
    border-radius:999px; padding:6px 8px 6px 14px; }
  .namebox label{ font-family:"Orbitron"; font-size:9px; letter-spacing:1.5px; color:var(--tx-dim); }
  #nameInput{ width:118px; background:transparent; border:0; color:var(--tx); font-family:"Orbitron"; font-size:13px; font-weight:700; letter-spacing:1px; outline:none; }
  .wallet{ display:flex; align-items:center; gap:14px; }
  .lvbox{ text-align:left; }
  .lvbox .lvl{ font-family:"Orbitron"; font-size:13px; font-weight:900; color:var(--tx); letter-spacing:1px; }
  .xpbar{ width:120px; height:6px; border-radius:4px; background:var(--track); border:1px solid var(--track-line); overflow:hidden; margin-top:3px; }
  .xpbar i{ display:block; height:100%; background:linear-gradient(90deg,#7fe6ff,var(--c1)); }
  .coinbox{ display:flex; align-items:center; gap:7px; font-family:"Orbitron"; font-size:16px; font-weight:900; color:var(--gold); }
  .coinbox .ci{ width:18px; height:18px; }

  .tabs{ display:flex; width:100%; background:linear-gradient(180deg,#0e1626,#0a111e); border:1px solid var(--line); border-radius:var(--r-md); padding:4px; gap:4px; margin:0 auto 14px; }
  .tabs button{ font-family:"Orbitron"; font-size:12px; letter-spacing:1.5px; min-height:44px; padding:10px 14px; border:0; border-radius:var(--r-sm);
    background:transparent; color:var(--tx3); cursor:pointer; font-weight:700; transition:.15s; flex:1; white-space:nowrap; }
  .tabs button.on{ background:linear-gradient(180deg,#1f3a60,#142848); color:var(--tx); box-shadow:inset 0 0 0 1px var(--c1), inset 0 1px 0 #ffffff20; }
  .panel{ display:none; } .panel.on{ display:block; }
  .panel-scroll{ max-height:46vh; overflow-y:auto; padding:2px; }

  .seg{ display:inline-flex; background:linear-gradient(180deg,#0e1626,#0a111e); border:1px solid var(--line); border-radius:var(--r-md); padding:4px; gap:4px; }
  .seg button{ font-family:"Orbitron"; font-size:13px; letter-spacing:1px; padding:10px 22px; border:0; border-radius:var(--r-sm);
    background:transparent; color:var(--tx3); cursor:pointer; font-weight:700; transition:.15s; }
  .seg button.on{ background:linear-gradient(180deg,#1f3a60,#142848); color:var(--tx); box-shadow:inset 0 0 0 1px var(--c1), inset 0 1px 0 #ffffff20; }

  .sect-h{ font-family:"Orbitron"; font-size:11px; letter-spacing:2px; color:var(--tx3); text-align:left; margin:6px 2px 8px; display:flex; align-items:center; gap:8px; }
  .sect-h::after{ content:""; flex:1; height:1px; background:linear-gradient(90deg,var(--line),transparent); }

  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(132px,1fr)); gap:9px; }
  .item{ position:relative; text-align:left; padding:11px 11px 10px; border-radius:var(--r-md); background:linear-gradient(180deg,#101a2e,#0a1120);
    border:1px solid var(--line); box-shadow:var(--sh-card); cursor:pointer; transition:transform .12s,border-color .2s,box-shadow .2s; overflow:hidden; }
  .item:active{ transform:scale(.98); }
  .item .ihead{ display:flex; align-items:center; gap:9px; }
  .item .iic{ width:30px; height:30px; flex:none; }
  .item .inm{ font-size:12.5px; font-weight:700; color:var(--tx); }
  .item .idesc{ font-size:10.5px; color:var(--tx3); margin-top:6px; line-height:1.5; }
  .item .ibtn{ margin-top:9px; width:100%; min-height:40px; font-family:"Orbitron"; font-size:11px; font-weight:700; letter-spacing:1px; padding:8px; border-radius:var(--r-sm);
    border:1px solid var(--c1d); background:linear-gradient(180deg,#16314f,#0e2138); color:var(--c1); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:5px; }
  .item .ibtn .ci{ width:13px; height:13px; }
  .item .ibtn:disabled{ opacity:.4; cursor:default; border-color:var(--line); color:var(--tx-dim); }
  .item.on{ border-color:var(--c1); box-shadow:0 0 0 1px var(--c1), 0 10px 22px -12px var(--c1); }
  .item.equip-on .inm::after{ content:"装備中"; font-family:"Orbitron"; font-size:8px; letter-spacing:1px; color:#06121f; background:var(--c1);
    border-radius:4px; padding:2px 5px; margin-left:7px; vertical-align:middle; }
  .item .rar{ position:absolute; top:0; right:0; font-family:"Orbitron"; font-size:8px; letter-spacing:1px; padding:3px 7px; border-bottom-left-radius:8px; color:#06121f; font-weight:900; }
  .rN .rar{ background:var(--rN);} .rR .rar{ background:var(--rR);} .rSR .rar{ background:var(--rSR);} .rUR .rar{ background:var(--rUR);}
  .rN{ box-shadow:var(--sh-card);}
  .rR{ box-shadow:0 0 0 1px #56b8ff55, var(--sh-card);}
  .rSR{ box-shadow:0 0 0 1px #c98cff66, var(--sh-card);}
  .rUR{ box-shadow:0 0 0 1px #ffd45e88, 0 6px 22px -8px #ffae3c66, var(--sh-card);}
  .stat-tags{ display:flex; flex-wrap:wrap; gap:4px; margin-top:7px; }
  .tag{ font-size:9px; letter-spacing:.5px; padding:3px 6px; border-radius:4px; background:#0c1830; border:1px solid var(--line); color:var(--tx2); }
  .tag.def{ color:#9fe8ff;} .tag.spd{ color:#9dff6b;} .tag.jet{ color:#ffb0c0;}
  .empty{ font-size:11px; color:var(--tx-dim); padding:16px; text-align:center; letter-spacing:1px; }

  /* equipment slots */
  .slots{ display:flex; gap:9px; justify-content:center; margin-bottom:12px; }
  .slot{ width:74px; height:74px; border-radius:var(--r-md); background:linear-gradient(180deg,#0e1626,#0a111e); border:1px dashed var(--line2);
    display:grid; place-items:center; position:relative; cursor:pointer; }
  .slot.filled{ border-style:solid; border-color:var(--c1); }
  .slot .slabel{ position:absolute; top:5px; left:0; right:0; text-align:center; font-family:"Orbitron"; font-size:8px; letter-spacing:1px; color:var(--tx-dim); }
  .slot svg{ width:34px; height:34px; }
  .slot.on{ box-shadow:0 0 0 2px var(--c1); }

  /* gacha */
  .gacha-stage{ display:flex; flex-direction:column; align-items:center; gap:14px; padding:6px 0 2px; }
  .capsule{ width:120px; height:120px; border-radius:50%; position:relative; display:grid; place-items:center;
    background:radial-gradient(120% 120% at 35% 28%,#1a2742,#0b1322); border:1px solid var(--line); box-shadow:var(--sh-panel),inset 0 0 30px -10px var(--c1); }
  .capsule svg{ width:64px; height:64px; }
  .capsule.rolling{ animation:wobble .5s ease-in-out infinite; }
  @keyframes wobble{ 0%,100%{transform:rotate(-7deg)} 50%{transform:rotate(7deg)} }

    cursor:pointer; background:linear-gradient(180deg,#ffe9a8,var(--gold) 55%,var(--gold2)); box-shadow:0 14px 32px -8px var(--gold2), inset 0 2px 0 #fff8; display:flex; align-items:center; gap:8px; }
  .roll-btn:active{ transform:scale(.97); } .roll-btn:disabled{ opacity:.45; cursor:default; }
  .roll-btn .ci{ width:16px; height:16px; }

  /* force landscape gate */
  #rotate{ position:fixed; inset:0; z-index:60; display:none; flex-direction:column; align-items:center; justify-content:center;
    gap:22px; text-align:center; padding:30px; background:radial-gradient(circle at 50% 40%, #0e1730 0%, #080c18 60%, var(--bg) 100%); }
  #rotate .phone{ width:74px; height:120px; border:4px solid #4fd4f0; border-radius:14px; position:relative;
    box-shadow:0 0 26px -6px #4fd4f0; animation:tilt 2.4s ease-in-out infinite; }
  #rotate .phone::before{ content:""; position:absolute; left:50%; bottom:6px; width:14px; height:3px; border-radius:2px; background:#4fd4f0; transform:translateX(-50%); }
  #rotate .phone::after{ content:""; position:absolute; inset:8px 8px 16px; border-radius:5px; background:linear-gradient(180deg,#16223a,#0a1322); }
  @keyframes tilt{ 0%,35%{transform:rotate(0)} 60%,100%{transform:rotate(90deg)} }
  #rotate h2{ font-family:"Orbitron"; font-size:20px; letter-spacing:3px; color:var(--tx); }
  #rotate p{ font-size:13px; letter-spacing:1px; color:var(--tx3); }
  @media (orientation:portrait) and (max-width:1024px){ #rotate{ display:flex; } }

  @media (max-width:760px){
    .pinfo{ min-width:84px; } .hpbar{ width:80px; } .ava{ width:36px; height:36px; } .ava svg{width:21px;height:21px;}

<script>
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=1280,H=720,VW=1280,VH=720,DPR=1,drawScale=1; const ZOOM=1.5, PX=2; let cam={scale:1};
const tcan=document.createElement('canvas'); const tctx=tcan.getContext('2d');
let solid=new Uint8Array(1);
const FLOORFRAC=0.085;   // bottom solid band (so terrain never hides behind pads/UI & no fall-through death)

function fitCanvas(){
  VW=Math.max(320,Math.floor(window.innerWidth));
  VH=Math.max(320,Math.floor(window.innerHeight));
  W=Math.round(VW*ZOOM); H=Math.round(VH*ZOOM); cam.scale=VW/W;
  const pw=Math.max(180,Math.round(VW/PX)), ph=Math.max(140,Math.round(VH/PX));
  cv.width=pw; cv.height=ph; drawScale=pw/W;       // low-res backing -> upscaled crisp by CSS
  tcan.width=W; tcan.height=H;
}

/* ---------- save / progression ---------- */
const SAVE_KEY='metalburst_save_v2';
const DEF_SAVE={ name:'PLAYER', coins:160, xp:0, level:1, unlocked:['rail'],
  ammo:{cannon:0,grenade:0,cluster:0,flame:0}, loadout:['rail'], owned:[], equip:{head:null,torso:null,feet:null} };
let save=loadSave();
function loadSave(){ try{ const s=JSON.parse(localStorage.getItem(SAVE_KEY)); if(s&&s.name!=null){ return Object.assign(JSON.parse(JSON.stringify(DEF_SAVE)),s,
  {ammo:Object.assign({},DEF_SAVE.ammo,s.ammo), equip:Object.assign({},DEF_SAVE.equip,s.equip)}); } }catch(e){} return JSON.parse(JSON.stringify(DEF_SAVE)); }
function persist(){ try{ localStorage.setItem(SAVE_KEY,JSON.stringify(save)); }catch(e){} }
const xpForLevel=l=>l*120;
const WEAPON_UNLOCK={2:'cannon',3:'grenade',4:'cluster',5:'flame'};
function gainXP(n){ save.xp+=n; let leveled=[];
  while(save.xp>=xpForLevel(save.level)){ save.xp-=xpForLevel(save.level); save.level++;
    const w=WEAPON_UNLOCK[save.level]; if(w&&!save.unlocked.includes(w)){ save.unlocked.push(w); leveled.push(w); } }
  persist(); return leveled; }

/* ---------- audio ---------- */
let AC=null; const actx=()=>{ if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } return AC; };
function beep(f,d,t='sine',v=.2,s){ const a=actx(); if(!a)return; const o=a.createOscillator(),g=a.createGain();
  o.type=t; o.frequency.value=f; if(s)o.frequency.exponentialRampToValueAtTime(s,a.currentTime+d);
  g.gain.value=v; g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+d); o.connect(g).connect(a.destination); o.start(); o.stop(a.currentTime+d); }
const sfxFire=()=>beep(220,.18,'square',.18,90);
function sfxBoom(){ const a=actx(); if(!a)return; const b=a.createBuffer(1,4400,a.sampleRate), d=b.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2); const s=a.createBufferSource(); s.buffer=b;
  const g=a.createGain(); g.gain.value=.35; g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.35); s.connect(g).connect(a.destination); s.start(); beep(70,.3,'sine',.25,30); }
const sfxHit=()=>beep(520,.12,'triangle',.22,180);
const sfxCoin=()=>{ beep(880,.08,'square',.12,1320); setTimeout(()=>beep(1320,.1,'square',.12),70); };

/* ---------- terrain ---------- */
const isSolid=(x,y)=>{ x|=0;y|=0; return x>=0&&x<W&&y>=0&&y<H&&solid[y*W+x]===1; };
const surfaceY=x=>{ x|=0; if(x<0||x>=W)return H; for(let y=0;y<H;y++) if(solid[y*W+x]===1) return y; return H; };
let bgHills=[], moon={x:0,y:0}, nebula=[], stars=[], towers=[], curStyle='', floorKind='dirt';
const STAGE_NAMES={hills:'ROLLING HILLS',peak:'CENTRAL PEAK',canyon:'BOULDER CANYON',plateaus:'STEP PLATEAU',islands:'FLOATING ISLES'};

function plat(x0,x1,y0,y1){ x0|=0;x1|=0;y0|=0;y1|=0; const r=12;
  for(let y=y0;y<y1;y++)for(let x=x0;x<x1;x++){ let ok=true;
    if(y<y0+r){ if(x<x0+r){ const dx=x-(x0+r),dy=y-(y0+r); if(dx*dx+dy*dy>r*r)ok=false; }
                else if(x>x1-r){ const dx=x-(x1-r),dy=y-(y0+r); if(dx*dx+dy*dy>r*r)ok=false; } }
    if(ok&&x>=0&&x<W&&y>=0&&y<H) solid[y*W+x]=1; } }

function genTerrain(){
  solid=new Uint8Array(W*H);
  const styles=['hills','peak','canyon','plateaus','islands'];
  curStyle=styles[(Math.random()*styles.length)|0];
  floorKind=(curStyle==='islands'&&Math.random()<0.6)?'sea':'dirt';
  const o1=Math.random()*6.28,o2=Math.random()*6.28,o3=Math.random()*6.28;
  const floorTop=H-Math.round(H*FLOORFRAC);

  if(curStyle==='islands'){
    plat(W*0.03,W*0.34, H*0.50, H*0.64);
    plat(W*0.66,W*0.97, H*0.50, H*0.64);
    plat(W*0.40,W*0.60, H*0.36, H*0.50);
    if(Math.random()<0.6){ plat(W*0.20,W*0.30,H*0.72,H*0.78); plat(W*0.70,W*0.80,H*0.72,H*0.78); }
  } else {
    const top=new Float32Array(W);
    for(let x=0;x<W;x++){ let h;
      if(curStyle==='hills') h=H*0.58+Math.sin(x*0.006+o1)*H*0.15+Math.sin(x*0.013+o2)*H*0.07+Math.sin(x*0.03+o3)*H*0.022;
      else if(curStyle==='peak'){ const dx=(x-W/2)/(W*0.16); h=H*0.80-Math.exp(-dx*dx)*H*0.46+Math.sin(x*0.02+o1)*8; }
      else if(curStyle==='canyon') h=H*0.52+Math.sin(x*0.007+o1)*H*0.07+Math.sin(x*0.02+o2)*H*0.03;
      else { const t=x/W; const step=t<0.34?H*0.50:(t<0.66?H*0.66:H*0.46); h=step; }
      top[x]=Math.max(H*0.24,Math.min(floorTop-8,h));
    }
    if(curStyle==='plateaus') for(let k=0;k<10;k++){ const c=top.slice(); for(let x=1;x<W-1;x++) top[x]=(c[x-1]+2*c[x]+c[x+1])/4; }
    for(let x=0;x<W;x++) for(let y=Math.floor(top[x]);y<H;y++) solid[y*W+x]=1;
  }
  // ---- solid floor band (dirt/sea): always present so the bottom is filled & nothing falls through ----
  for(let x=0;x<W;x++) for(let y=floorTop;y<H;y++) solid[y*W+x]=1;

  colorAndDecorate(floorTop);
  spawnRocks();
  // ---- background scenery ----
  const lay=[ {yb:0.50,amp:0.10,top:'#26405f',bot:'#16273f'},
              {yb:0.58,amp:0.085,top:'#1a2e49',bot:'#101f33'},
              {yb:0.66,amp:0.07,top:'#122337',bot:'#0a1424'} ];
  bgHills=[];
  for(let l=0;l<lay.length;l++){ const L=lay[l], pts=[], yb=H*L.yb, amp=H*L.amp;
    for(let x=0;x<=W;x+=36) pts.push(yb+Math.sin(x*0.004+l*2+o1)*amp+Math.sin(x*0.011+l*1.7)*H*0.022);
    bgHills.push({pts,step:36,top:L.top,bot:L.bot}); }
  towers=[]; { const far=bgHills[0], n=6+(Math.random()*5|0);
    for(let i=0;i<n;i++){ const x=W*(0.06+Math.random()*0.88), idx=Math.min(far.pts.length-1,Math.round(x/36));
      towers.push({x, y:far.pts[idx]+2, w:7+Math.random()*16, h:H*(0.05+Math.random()*0.14), lit:Math.random()<0.7, ph:Math.random()*6.28}); } }
  stars=[]; for(let i=0;i<120;i++){ const k=Math.random();
    stars.push({x:Math.random()*W, y:Math.random()*H*0.62, r:k<0.85?0.7+Math.random()*1.1:1.7+Math.random()*1.3,
      base:0.3+Math.random()*0.6, tw:Math.random()*6.28, glow:k>0.9, spark:k>0.97, col:Math.random()<0.22?'#bfe2ff':'#d3def2'}); }
  nebula=[]; const ncol=['#13344d','#241a46','#0e3a3f','#1a2c5a'];
  for(let i=0;i<3;i++) nebula.push({x:W*(0.12+Math.random()*0.76), y:H*(0.06+Math.random()*0.34), r:Math.min(W,H)*(0.32+Math.random()*0.26), c:ncol[(Math.random()*ncol.length)|0]});
  moon={x:W*(0.16+Math.random()*0.66), y:H*(0.09+Math.random()*0.12), r:Math.min(W,H)*0.058, cr:[]};
  for(let i=0;i<5;i++) moon.cr.push({x:Math.random()*1.3-0.65, y:Math.random()*1.3-0.65, s:0.06+Math.random()*0.12});
}
function colorAndDecorate(floorTop){
  const img=tctx.createImageData(W,H), d=img.data;
  const sea=floorKind==='sea';
  for(let x=0;x<W;x++){ let runTop=-1;
    for(let y=0;y<H;y++){ if(solid[y*W+x]===1){ if(runTop<0)runTop=y; const depth=y-runTop, i=(y*W+x)*4;
        if(sea && y>=floorTop){ const t=(y-floorTop)/(H-floorTop); d[i]=20+t*8; d[i+1]=70+t*30; d[i+2]=110+t*40; d[i+3]=235; continue; }
        if(depth<2){ d[i]=150;d[i+1]=246;d[i+2]=186; }                 // lit grass rim
        else if(depth<5){ d[i]=88;d[i+1]=216;d[i+2]=144; }             // grass
        else if(depth<8){ d[i]=44;d[i+1]=132;d[i+2]=92; }              // grass shade
        else if(depth<13){ d[i]=24;d[i+1]=40;d[i+2]=40; }             // AO band under turf
        else { const t=Math.min(1,depth/360), n=(Math.random()*14)|0, band=Math.sin(y*0.06)*8;
          d[i]=60+t*34+n+band; d[i+1]=44+t*24+n+band*0.7; d[i+2]=34+t*16+n; }   // rock strata
        d[i+3]=255;
      } else runTop=-1; } }
  tctx.putImageData(img,0,0);
  if(sea){ // animated-ish sheen line at sea top handled in draw; just a rim here
    tctx.fillStyle='#bfefff55'; tctx.fillRect(0,floorTop,W,2); }
  for(let x=6;x<W-2;x+=6+(Math.random()*14|0)){ const ty=surfaceY(x); if(ty>=H-3||ty>=floorTop-1) continue;
    const rnd=Math.random();
    if(rnd<0.14){ tctx.fillStyle='#2c3744'; tctx.beginPath(); tctx.ellipse(x,ty+1,3+Math.random()*4,3+Math.random()*2,0,0,7); tctx.fill();
      tctx.fillStyle='#3d4a58'; tctx.beginPath(); tctx.ellipse(x-1,ty-1,2,1.4,0,0,7); tctx.fill();
    } else if(rnd<0.18){ const cc=Math.random()<0.5?'#5fe0ff':'#b98cff'; tctx.fillStyle=cc; tctx.shadowColor=cc; tctx.shadowBlur=8;
      tctx.beginPath(); tctx.moveTo(x,ty-9); tctx.lineTo(x+3,ty-1); tctx.lineTo(x,ty+1); tctx.lineTo(x-3,ty-1); tctx.closePath(); tctx.fill(); tctx.shadowBlur=0;
    } else { tctx.lineWidth=1.4;
      for(let b=-1;b<=1;b++){ const bx=x+b*2.2; tctx.strokeStyle=b===0?'#9bf7b8':'#5fcf86';
        tctx.beginPath(); tctx.moveTo(bx,ty+1); tctx.quadraticCurveTo(bx+b*2,ty-6,bx+b*4,ty-10); tctx.stroke(); }
    }
  }
}
function carve(cx,cy,r){
  const r2=r*r, x0=Math.max(0,cx-r|0),x1=Math.min(W-1,cx+r|0),y0=Math.max(0,cy-r|0),y1=Math.min(H-1,cy+r|0);
  for(let y=y0;y<=y1;y++)for(let x=x0;x<=x1;x++){ const dx=x-cx,dy=y-cy; if(dx*dx+dy*dy<=r2) solid[y*W+x]=0; }
  tctx.save(); tctx.globalCompositeOperation='destination-out'; tctx.beginPath(); tctx.arc(cx,cy,r,0,7); tctx.fill(); tctx.restore();
  tctx.save(); tctx.globalCompositeOperation='source-atop'; tctx.beginPath(); tctx.arc(cx,cy,r+4,0,7);
  tctx.lineWidth=7; tctx.strokeStyle='#150f0a'; tctx.stroke(); tctx.restore();
}

/* ---------- weapons ---------- */
const WEAPONS=[
  {id:'rail',   name:'レールガン',sub:'直進・無限', grav:0.14,radius:24,dmg:24, color:'#7ad7ff', bounce:0, type:'normal'},
  {id:'cannon', name:'キャノン', sub:'標準弾', grav:1, radius:38, dmg:16, color:'#ffe27a', bounce:0, type:'normal'},
  {id:'grenade',name:'グレネード',sub:'跳ねる', grav:1, radius:44, dmg:20, color:'#9dff6b', bounce:3, type:'normal'},
  {id:'cluster',name:'クラスター',sub:'分裂',   grav:1, radius:26, dmg:11, color:'#ff9d5c', bounce:0, type:'cluster'},
  {id:'flame',  name:'火炎放射器',sub:'近距離・連射',grav:0.55,radius:18,dmg:6, color:'#ff7a3c', bounce:0, type:'flame'},
];
const WBY={}; WEAPONS.forEach(w=>WBY[w.id]=w);
const WICON={
  rail:'<svg viewBox="0 0 24 24" fill="none" stroke="#7ad7ff" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round"><path d="M13 2.5 5.5 13H10l-1.5 8.5L18.5 10H13z" fill="#7ad7ff26"/></svg>',
  cannon:'<svg viewBox="0 0 24 24" fill="none" stroke="#ffe27a" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round"><path d="M8 13l1.6-6a2.4 2.4 0 0 1 4.8 0L16 13z" fill="#ffe27a26"/><path d="M8 13h8v3.5a1.5 1.5 0 0 1-1.5 1.5h-5A1.5 1.5 0 0 1 8 16.5z" fill="#ffe27a1a"/><path d="M10 9.5h4"/></svg>',

function control(r,mv){ const R=PADR(), spd=r.stat?r.stat.spd:1;

/* ---------- fire ---------- */

function fire(robot,vx,vy,wId){

  const mx=robot.x+Math.cos(a)*20, my=robot.y-8+Math.sin(a)*20;

  } else {
    projectiles.push({x:mx,y:my,vx,vy,w,owner:robot,bounces:w.bounce,armed:false,trail:[]});
  }
  for(let i=0;i<10;i++){ const sp=Math.random()*3+1; particles.push({x:mx,y:my,vx:Math.cos(a)*sp+(Math.random()-.5),vy:Math.sin(a)*sp+(Math.random()-.5),life:.6,color:w.type==='flame'?'#ff9d5c':'#ffd27a',sz:2+Math.random()*2}); }
  shake=Math.max(shake,5); sfxFire(); robot.recoil=1; phase='firing'; pad.aim.active=false; hideHint();
  if(robot.side===0){ consumeAmmo(wId); buildWeaponUI();
    if(!didMove){ postFire=POSTFIRE_TIME; moveTimer=POSTFIRE_TIME; }   // grant a short move window if player never moved
    else { pad.move.active=false; } }
}
function stepProjectiles(){
  for(let pi=projectiles.length-1;pi>=0;pi--){ const p=projectiles[pi]; p.vy+=GRAV*p.w.grav; p.vx+=wind*p.w.grav;
    if(p.flame){ p.vx*=0.92; p.vy=p.vy*0.92+0.12; if(--p.life<=0){ for(let i=0;i<3;i++) particles.push({x:p.x,y:p.y,vx:(Math.random()-.5)*1.5,vy:-Math.random()*1.5,life:.5,color:'#ff7a3c',sz:2+Math.random()*2}); projectiles.splice(pi,1); continue; } }
    const steps=Math.max(1,Math.ceil(Math.hypot(p.vx,p.vy)/3)); let done=false;
    for(let s=0;s<steps;s++){ const nx=p.x+p.vx/steps, ny=p.y+p.vy/steps;
      if(!p.armed && Math.hypot(nx-p.owner.x,ny-p.owner.y)>26) p.armed=true;
      if(nx<-60||nx>W+60||ny>H+80){ projectiles.splice(pi,1); done=true; break; }
      let hit=null; for(const r of robots){ if(r.hp<=0)continue; if(r===p.owner&&!p.armed)continue;
        if(Math.abs(nx-r.x)<14&&Math.abs(ny-(r.y-2))<20){hit=r;break;} }
      if(hit){ explode(nx,ny,p); projectiles.splice(pi,1); done=true; break; }
      if(isSolid(nx,ny)){ if(p.bounces>0){ const n=surfaceNormal(nx,ny), dot=p.vx*n.x+p.vy*n.y;
          p.vx=(p.vx-2*dot*n.x)*0.55; p.vy=(p.vy-2*dot*n.y)*0.55; p.bounces--; p.x=nx-n.x*2; p.y=ny-n.y*2; beep(160,.05,'square',.1);
          if(Math.hypot(p.vx,p.vy)<1.5){ explode(p.x,p.y,p); projectiles.splice(pi,1); done=true; } break;
        } else { explode(nx,ny,p); projectiles.splice(pi,1); done=true; break; } }
      p.x=nx; p.y=ny; }
    if(!done){ p.trail.push({x:p.x,y:p.y}); if(p.trail.length>(p.flame?6:16))p.trail.shift(); } }
}
function surfaceNormal(x,y){ let nx=0,ny=0; for(let dx=-3;dx<=3;dx++)for(let dy=-3;dy<=3;dy++) if(isSolid(x+dx,y+dy)){nx-=dx;ny-=dy;} const m=Math.hypot(nx,ny)||1; return{x:nx/m,y:ny/m}; }
function applyDamage(r,dmg,x,y){ if(r.side===0&&r.stat){ dmg=Math.round(dmg*(1-r.stat.def/100)); }
  if(dmg<=0) return; r.hp=Math.max(0,r.hp-dmg);
  dmgNums.push({x:r.x,y:r.y-26,val:dmg,life:1,vy:-0.7,color:r.side===0?'#9fe8ff':'#ffb0c0'});
  if(r.side===0){ flash=Math.min(1,flash+0.4); } else { dmgDealt+=dmg; }
  sfxHit(); }
function explode(x,y,p){ const w=p.w; carve(x,y,w.radius); spawnExplosion(x,y,w.color,w.radius); shake=Math.max(shake,8+w.radius*0.22); if(!p.flame)sfxBoom();
  for(const r of robots){ if(r.hp<=0)continue; const d=Math.hypot(r.x-x,r.y-y);
    if(d<w.radius+22){ const f=1-d/(w.radius+22), dmg=Math.round(w.dmg*f);
      applyDamage(r,dmg,x,y);
      const a=Math.atan2(r.y-y,r.x-x), k=f*(p.flame?3:9); r.vx+=Math.cos(a)*k; r.vy+=Math.sin(a)*k-(p.flame?0.6:2); r.grounded=false; } }
  // dislodge nearby rocks
  for(const rk of rocks){ if(rk.dead)continue; const d=Math.hypot(rk.x-x,rk.y-y); if(d<w.radius+30){ rk.rolling=true; rk.vx+=(rk.x<x?-1:1)*(2.5+Math.random()*2); rk.vy-=2; } }
  if(w.type==='cluster') for(let i=0;i<5;i++){ const a=-Math.PI/2+(i-2)*0.34, sp=4+Math.random()*2;
    projectiles.push({x,y:y-6,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,w:{...w,type:'normal',radius:22,dmg:8},owner:p.owner,bounces:0,armed:true,trail:[]}); }
  updateHUD();
}

/* ---------- rocks (gimmick) ---------- */
function spawnRocks(){ rocks=[]; if(curStyle!=='canyon'&&!(curStyle==='hills'&&Math.random()<0.5)) return;
  const n=curStyle==='canyon'?2+(Math.random()*2|0):1+(Math.random()*2|0);
  for(let i=0;i<n;i++){ const x=W*(0.28+Math.random()*0.44), gy=surfaceY(x); if(gy>=H-6) continue;
    rocks.push({x, y:gy-12, vx:0, vy:0, r:9+Math.random()*5, rolling:false, dead:false, spin:0}); } }
function stepRocks(){
  for(const rk of rocks){ if(rk.dead)continue;
    rk.vy+=GRAV; rk.x+=rk.vx; rk.y+=rk.vy;
    if(rk.x<rk.r){rk.x=rk.r;rk.vx*=-0.4;} if(rk.x>W-rk.r){rk.x=W-rk.r;rk.vx*=-0.4;}
    const slope=surfaceY(rk.x+rk.r)-surfaceY(rk.x-rk.r);
    // land / roll on surface
    if(isSolid(rk.x,rk.y+rk.r)){ let up=0; while(isSolid(rk.x,rk.y+rk.r)&&up<24){rk.y--;up++;}
      rk.vy*=-0.25;
      if(rk.rolling||Math.abs(slope)>3){ rk.rolling=true; rk.vx+=Math.sign(slope)*0.5; rk.vx*=0.985; }
      else rk.vx*=0.85;
      rk.spin+=rk.vx*0.06;
    }
    if(Math.abs(rk.vx)<0.25 && Math.abs(slope)<3) rk.rolling=false;
    if(rk.y>H+60){ rk.dead=true; continue; }
    // hit robots when moving
    if(Math.abs(rk.vx)>1.4||rk.rolling){ for(const r of robots){ if(r.hp<=0)continue;
      if(Math.abs(r.x-rk.x)<rk.r+12 && Math.abs((r.y-2)-rk.y)<rk.r+16){
        applyDamage(r,Math.round(8+Math.abs(rk.vx)*2),rk.x,rk.y); r.vx+=Math.sign(rk.vx||1)*6; r.vy-=3; r.grounded=false;
        rk.vx*=0.4; shake=Math.max(shake,6); updateHUD(); } } }
  }
  rocks=rocks.filter(r=>!r.dead);
}
function drawRocks(){ for(const rk of rocks){ ctx.save(); ctx.translate(rk.x,rk.y); ctx.rotate(rk.spin);
  ctx.fillStyle='#00000055'; ctx.beginPath(); ctx.ellipse(0,rk.r+3,rk.r*0.9,3,0,0,7); ctx.fill();
  const g=ctx.createRadialGradient(-rk.r*.3,-rk.r*.3,rk.r*.2,0,0,rk.r); g.addColorStop(0,'#6a7382'); g.addColorStop(1,'#39424f');
  ctx.fillStyle=g; ctx.strokeStyle='#222a36'; ctx.lineWidth=1.5; ctx.beginPath();
  for(let i=0;i<7;i++){ const a=i/7*6.28, rr=rk.r*(0.86+Math.sin(i*2.3)*0.12); const px=Math.cos(a)*rr,py=Math.sin(a)*rr; i?ctx.lineTo(px,py):ctx.moveTo(px,py); }
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.strokeStyle='#2b333f'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(-rk.r*.4,-rk.r*.2); ctx.lineTo(rk.r*.2,rk.r*.4); ctx.stroke();
  ctx.restore(); } }

/* ---------- particles ---------- */
function spawnExplosion(x,y,color,r){

    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,life:1,color:Math.random()<.5?color:'#fff',sz:2+Math.random()*4}); }
  for(let i=0;i<16;i++) particles.push({x,y,vx:(Math.random()*2-1)*2,vy:-Math.random()*3-1,life:1,color:'#3a3a3a',sz:7+Math.random()*9,smoke:true});

function stepParticles(){
  for(let i=particles.length-1;i>=0;i--){ const p=particles[i];
    if(p.flashRing){ p.life-=0.08; if(p.life<=0)particles.splice(i,1); continue; }
    p.vy+=p.smoke?-0.02:0.18; p.x+=p.vx; p.y+=p.vy; p.vx*=0.98; p.life-=p.smoke?0.012:0.03; if(p.life<=0)particles.splice(i,1); }
  for(let i=dmgNums.length-1;i>=0;i--){ const n=dmgNums[i]; n.y+=n.vy; n.vy*=0.96; n.life-=0.018; if(n.life<=0)dmgNums.splice(i,1); }

function respawn(r){
  const dmg=30; applyDamage(r,dmg,r.x,r.y);
  if(r.hp<=0){ return; }
  let x=W*0.5, gy=H, tries=0;
  while(tries<40){ const tx=18+Math.random()*(W-36), ty=surfaceY(tx); if(ty<H-2){ x=tx; gy=ty; break; } tries++; }
  if(gy>=H){ x=W*0.5; gy=surfaceY(x); if(gy>=H)gy=H*0.5; }
  r.x=x; r.y=gy-18; r.vx=0; r.vy=0; r.grounded=true;
  spawnExplosion(r.x, r.y, '#9fd0ff', 22); shake=Math.max(shake,7); updateHUD();
}
function stepRobots(){
  for(const r of robots){ if(r.recoil>0)r.recoil*=0.86; if(r.hp<=0)continue;
    r.vy+=GRAV; r.vx*=0.8;
    const ox=r.x; r.x+=r.vx; if(r.x<14)r.x=14; if(r.x>W-14)r.x=W-14;
    if(isSolid(r.x,r.y+16)){ let up=0; while(isSolid(r.x,r.y+16)&&up<13){r.y--;up++;}
      if(isSolid(r.x,r.y+16)){ r.y+=up; r.x=ox; r.vx=0; } }
    r.y+=r.vy;
    if(r.vy>=0 && isSolid(r.x,r.y+18)){ let up=0; while(isSolid(r.x,r.y+18)&&up<70){r.y--;up++;}
      if(r.vy>9){ const fd=Math.round((r.vy-9)*3); applyDamage(r,fd,r.x,r.y); }
      r.vy=0; r.grounded=true; r.jumps=0; }
    else if(r.vy<0 && isSolid(r.x,r.y-18)){ r.vy=0; }

}

function gameOver(){ phase='over'; playing=false; document.getElementById('hud').style.visibility='hidden';

/* ---------- AI (now moves too) ---------- */
function aiThink(){ const me=robots[1],foe=robots[0];
  weaponSel[1]=Math.floor(Math.random()*wlist[1].length); buildWeaponUI();
  const w=curWeapon(1), dir=foe.x<me.x?-1:1; let best=null;
  for(let ang=18*Math.PI/180;ang<78*Math.PI/180;ang+=4*Math.PI/180)
    for(let pw=5;pw<=15;pw+=1){ const vx=dir*Math.cos(ang)*pw, vy=-Math.sin(ang)*pw;
      const d=simShot(me.x,me.y,vx,vy,w); if(best===null||d<best.d)best={vx,vy,d}; }
  const err=1+(Math.random()*2-1)*0.07; aiPlan={vx:best.vx*err,vy:best.vy*err}; }
function simShot(sx,sy,vx,vy,w){ const a=Math.atan2(vy,vx); let x=sx+Math.cos(a)*20,y=sy-8+Math.sin(a)*20; const foe=robots[0]; let md=1e9;
  for(let t=0;t<500;t++){ vy+=GRAV*w.grav; vx+=wind*w.grav; x+=vx; y+=vy; const d=Math.hypot(x-foe.x,y-(foe.y-2)); if(d<md)md=d; if(x<0||x>W||y>H||isSolid(x,y))break; } return md; }
function aiStep(){ const me=robots[1],foe=robots[0];
  if(aiMoveTimer>0){ aiMoveTimer--;
    if(aiMoveDir===null){ const dist=Math.abs(foe.x-me.x), ideal=W*0.42;
      aiMoveDir = Math.random()<0.4 ? 0 : (dist>ideal ? (foe.x<me.x?-1:1) : (foe.x<me.x?1:-1)); }
    if(aiMoveDir!==0){ const R=PADR(); control(me,{x:aiMoveDir*R*0.8,y: (Math.random()<0.04?-R:0)}); }
    return; }
  if(aiPlan===null){ if(--aiTimer<=0) aiThink(); }
  else { aiTimer--; if(aiTimer<-22){ fire(robots[1],aiPlan.vx,aiPlan.vy,wlist[1][weaponSel[1]]); aiPlan=null; } }
}

function drawAim(){

function powerColor(f){ // 0..1 -> green to red

  return 'rgb(255,70,90)';
}

  ctx.globalAlpha=.09; ctx.fillStyle=col; ctx.beginPath(); ctx.arc(b.x,b.y,R,0,7); ctx.fill(); ctx.globalAlpha=1;
  ctx.strokeStyle=col+'55'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(b.x,b.y,R,0,7); ctx.stroke();
  if(isMove){ // jump zone marker: upper arc above threshold
    const jt=-Math.PI/2, span=0.62;
    ctx.strokeStyle='#ffd98a'; ctx.globalAlpha=.55; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(b.x,b.y,R*JUMP_THRESH,jt-span,jt+span); ctx.stroke();
    ctx.globalAlpha=.16; ctx.fillStyle='#ffd98a'; ctx.beginPath(); ctx.moveTo(b.x,b.y); ctx.arc(b.x,b.y,R,jt-span,jt+span); ctx.closePath(); ctx.fill();
    ctx.globalAlpha=.7; ctx.fillStyle='#ffd98a'; ctx.font='700 9px Orbitron,sans-serif'; ctx.textAlign='center'; ctx.fillText('JUMP',b.x,b.y-R*JUMP_THRESH-6); ctx.globalAlpha=1;
  }
  ctx.globalAlpha=.45; ctx.fillStyle=col; ctx.font='700 11px Orbitron,sans-serif'; ctx.textAlign='center'; ctx.fillText(label,b.x,b.y+4); ctx.globalAlpha=1; }
function drawThumb(pd,col){ if(!pd.active)return; const R=PADR(); let dx=pd.tx-pd.bx,dy=pd.ty-pd.by,len=Math.hypot(dx,dy); if(len>R){dx*=R/len;dy*=R/len;}
  ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=14; ctx.beginPath(); ctx.arc(pd.bx+dx,pd.by+dy,18,0,7); ctx.fill(); ctx.shadowBlur=0;
  ctx.fillStyle='#06101f'; ctx.beginPath(); ctx.arc(pd.bx+dx,pd.by+dy,5,0,7); ctx.fill(); }

/* ---------- loop ---------- */
function loop(){ tick++; stepItems(); stepRocks();
  if(phase==='firing'){ stepProjectiles(); stepParticles(); stepRobots();
    if(postFire>0){ const human=!(vsCOM&&cur===1);
      if(human){ const mv=moveActive(); if(mv){ control(robots[cur],mv); didMove=true; } postFire--; updateFuel(); }
      else postFire=0; }
    endTurnCheck(); }
  else{ stepParticles();
    const human=phase==='aim'&&!(vsCOM&&cur===1);
    if(human){ const mv=moveActive();
      if(mv&&!moveStarted)moveStarted=true;
      if(moveStarted&&moveTimer>0)moveTimer--;
      if(mv&&moveStarted&&moveTimer>0){ control(robots[cur],mv); didMove=true; }
      updateFuel(); }
    stepRobots();
    if(phase==='aim'&&vsCOM&&cur===1) aiStep(); }
  if(msgTimer>0)msgTimer--; draw(); requestAnimationFrame(loop);
}

/* ---------- input ---------- */
const canMove=()=>(phase==='aim'||(phase==='firing'&&postFire>0))&&!(vsCOM&&cur===1)&&playing;
const canAim=()=>phase==='aim'&&!(vsCOM&&cur===1)&&playing;
function pos(e){ const r=cv.getBoundingClientRect(); return {x:((e.clientX-r.left)*(VW/r.width))/cam.scale, y:((e.clientY-r.top)*(VH/r.height))/cam.scale}; }
function onDown(e){ if(!playing)return; const p=pos(e);
  const which=(e.pointerType==='mouse')?(p.x<W*0.5?'move':'aim'):(p.x<W*0.5?'move':'aim'); const pd=pad[which];
  if(which==='move'&&!canMove())return; if(which==='aim'&&!canAim())return;
  e.preventDefault(); actx(); if(pd.active)return; const b=padBase(which); pd.active=true; pd.id=e.pointerId; pd.bx=b.x; pd.by=b.y; pd.tx=p.x; pd.ty=p.y; hideHint(); }
function onMove(e){ for(const k of ['move','aim']){ const pd=pad[k]; if(pd.active&&pd.id===e.pointerId){ e.preventDefault(); const p=pos(e); pd.tx=p.x; pd.ty=p.y; } } }
function onUp(e){ for(const k of ['move','aim']){ const pd=pad[k]; if(pd.active&&pd.id===e.pointerId){
    if(k==='aim'&&canAim()){ const v=aimVel(); const wId=wlist[cur][weaponSel[cur]];
      if(v.frac>=0.12){ if(cur===0&&ammoOf(wId)<=0){ toast('弾切れ：武器を変更'); setDock(true); } else fire(robots[cur],v.vx,v.vy,wId); } else showHint(); }
    pd.active=false; pd.id=-1; } } }
cv.addEventListener('pointerdown',onDown); cv.addEventListener('pointermove',onMove);
window.addEventListener('pointerup',onUp); window.addEventListener('pointercancel',onUp);
window.addEventListener('keydown',e=>{ if(!playing)return; if(canAim()){ const n=+e.key;
  if(n>=1&&n<=wlist[cur].length){ weaponSel[cur]=n-1; buildWeaponUI(); } }
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','a','d','w','s'].includes(e.key)) keyState[e.key]=true; });
window.addEventListener('keyup',e=>{ keyState[e.key]=false; });

/* ---------- weapon dock UI (pull-up) ---------- */
const wdock=document.getElementById('wdock'), wtray=document.getElementById('wtray');
const whandle=document.getElementById('whandle');
let dockOpen=false;
function setDock(o){ dockOpen=o; wdock.classList.toggle('open',o); }
whandle.onclick=()=>{ if(vsCOM&&cur===1)return; setDock(!dockOpen); };
function buildWeaponUI(){ const side=cur; const list=wlist[side]; wtray.innerHTML='';
  const locked=(vsCOM&&cur===1); wdock.classList.toggle('locked',locked);
  list.forEach((id,i)=>{ const w=WBY[id]; const am=side===0?ammoOf(id):Infinity; const isLock=side===0&&am<=0;
    const b=document.createElement('div'); b.className='wcard'+(i===weaponSel[side]?' sel':'')+(isLock?' lock':'');
    const amTxt= id==='rail'?'∞':(side===0?('<b>'+am+'</b>'):'∞');
    b.innerHTML=`<div class="wi">${WICON[id]}</div><div class="wn">${w.name}</div><div class="wammo">${amTxt}</div>`;
    b.onclick=()=>{ if(locked||isLock)return; weaponSel[side]=i; buildWeaponUI(); setDock(false); };
    wtray.appendChild(b); });
  // handle reflects current
  const cw=WBY[list[weaponSel[side]]]; document.getElementById('whi').innerHTML=WICON[cw.id];
  document.getElementById('whn').textContent=cw.name;
  const cam2=side===0?ammoOf(cw.id):Infinity;
  document.getElementById('wha').innerHTML= cw.id==='rail'?'∞':('×<b>'+(side===0?cam2:'∞')+'</b>');
}
let lastHp=[100,100];
function updateHUD(){ for(let i=0;i<2;i++){ const hp=Math.max(0,Math.round(robots[i].hp));
    document.getElementById('hp'+(i+1)).style.width=hp+'%'; document.getElementById('hn'+(i+1)).textContent=hp;
    if(hp<lastHp[i]){ const el=document.getElementById('p'+(i+1)); el.classList.remove('hurt'); void el.offsetWidth; el.classList.add('hurt'); } lastHp[i]=hp; }
  document.getElementById('p1name').textContent=(save.name||'PLAYER').toUpperCase();
  document.getElementById('p2name').textContent=vsCOM?'COM':'PLAYER 2';
  const hudName=(save.name||'PLAYER').toUpperCase().slice(0,8);
  document.getElementById('turn').innerHTML=(cur===0?hudName:(vsCOM?'COM':'PLAYER 2'))+' <b>TURN</b>';
  const pw=Math.round(Math.abs(wind)*90), f=document.getElementById('windfill');
  f.style.left=wind<0?(50-pw/2)+'%':'50%'; f.style.width=(pw/2)+'%';
  f.style.background=wind<0?'linear-gradient(90deg,#4fd4f0,#7fe6ff)':'linear-gradient(90deg,#7fe6ff,#4fd4f0)';
  document.getElementById('windval').textContent=pw?(wind<0?'◀':'▶')+pw:'無風'; }
function updateFuel(){ const human=!(vsCOM&&cur===1);
  const active=human&&(phase==='aim'||(phase==='firing'&&postFire>0));
  document.getElementById('fuelbox').classList.toggle('show', active);
  const denom=(phase==='firing')?POSTFIRE_TIME:MOVE_TIME;
  document.getElementById('fuelfill').style.width=Math.max(0,moveTimer/denom*100)+'%'; }
function updateCoinHud(){ document.getElementById('coinHud').innerHTML='<span class="ci">'+COIN_ICON+'</span>'+save.coins; }
function refreshActive(){ document.getElementById('p1').classList.toggle('active',cur===0); document.getElementById('p2').classList.toggle('active',cur===1);
  setDock(false); buildWeaponUI(); updateFuel(); }
function banner(t){ msg=t; msgTimer=78; }
let hintT=null;
function showHint(){ if(hintUsed)return; hintUsed=true; const h=document.getElementById('hint'); h.classList.add('show'); clearTimeout(hintT); hintT=setTimeout(hideHint,3600); }
function hideHint(){ document.getElementById('hint').classList.remove('show'); }
let toastT=null;
function toast(t){ const el=document.getElementById('toast'); el.textContent=t; el.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),2200); }
document.getElementById('av1').innerHTML=WICON.rail; document.getElementById('av2').innerHTML=WICON.cannon;
document.getElementById('coinIcon').innerHTML=COIN_ICON;

/* ---------- overlay / home ---------- */
const overlay=document.getElementById('overlay');
function showResult(title,sub,stat){ overlay.classList.remove('hidden');
  document.querySelectorAll('.home-only').forEach(e=>e.style.display='none');
  document.getElementById('logo').innerHTML=title.replace(/WIN/,'<span class="b">WIN</span>');

  const rs=document.getElementById('resStat'); rs.style.display='block'; rs.textContent=stat;

  document.getElementById('logo').innerHTML='METAL <span class="b">BURST</span>';
  document.getElementById('tagline').textContent='TURN-BASED ARTILLERY DUEL';

mPVE.onclick=()=>{ vsCOM=true; mPVE.classList.add('on'); mPVP.classList.remove('on'); };

/* name input */
const nameInput=document.getElementById('nameInput');
nameInput.value=save.name;
nameInput.addEventListener('input',()=>{ save.name=nameInput.value.trim().slice(0,10)||'PLAYER'; persist(); });
nameInput.addEventListener('blur',()=>{ nameInput.value=save.name; });

/* tabs */
document.querySelectorAll('#tabs button').forEach(btn=>{ btn.onclick=()=>{
  document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('on',b===btn));
  const t=btn.dataset.tab; document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('on',p.id==='panel-'+t));

/* EQUIP: weapon loadout + armor */
function renderEquip(){ const el=document.getElementById('equipBody');
  let h='<div class="sect-h">武器ロードアウト（持っていく武器）</div><div class="grid">';
  WEAPONS.forEach(w=>{ const unlocked=save.unlocked.includes(w.id); const inLoad=w.id==='rail'||save.loadout.includes(w.id);
    const am=w.id==='rail'?'∞':(save.ammo[w.id]||0);
    h+=`<div class="item ${inLoad?'on':''}" data-w="${w.id}">
      <div class="ihead"><span class="iic">${WICON[w.id]}</span><span class="inm">${w.name}</span></div>
      <div class="idesc">${w.sub}　弾:${am}</div>
      <button class="ibtn" data-act="load" data-w="${w.id}" ${(!unlocked||w.id==='rail')?'disabled':''}>${w.id==='rail'?'常備・無限':(inLoad?'はずす':'装備する')}</button>
      ${unlocked?'':'<div class="idesc" style="color:var(--c2)">Lv'+Object.keys(WEAPON_UNLOCK).find(k=>WEAPON_UNLOCK[k]===w.id)+'で解放</div>'}
    </div>`; });
  h+='</div>';
  // armor
  h+='<div class="sect-h">防具スロット</div><div class="slots">';
  for(const sl of ['head','torso','feet']){ const id=save.equip[sl]; const a=id?ABY[id]:null;
    h+=`<div class="slot ${id?'filled r'+(a.rar):''}" data-slot="${sl}"><span class="slabel">${SLOT_NAMES[sl]}</span>${id?armorMini(a):'<svg viewBox="0 0 24 24" fill="none" stroke="#3a4660" stroke-width="1.5"><circle cx="12" cy="12" r="8"/><path d="M8 12h8"/></svg>'}</div>`; }
  h+='</div>';
  h+='<div class="sect-h">所持防具</div>';
  if(!save.owned.length){ h+='<div class="empty">防具をまだ持っていません。GACHAで入手しよう。</div>'; }
  else { h+='<div class="grid">';
    save.owned.forEach((id,idx)=>{ const a=ABY[id]; if(!a)return; const eq=save.equip[a.slot]===id;
      h+=`<div class="item r${a.rar} ${eq?'equip-on':''}" data-owned="${idx}">
        <span class="rar">${a.rar}</span>
        <div class="ihead"><span class="iic">${armorMini(a)}</span><span class="inm">${a.name}</span></div>
        ${statTags(a)}
        <button class="ibtn" data-act="equip" data-owned="${idx}">${eq?'はずす':'装備'}</button>
      </div>`; });
    h+='</div>'; }
  el.innerHTML=h;
  el.querySelectorAll('[data-act="load"]').forEach(b=>b.onclick=e=>{ e.stopPropagation(); const id=b.dataset.w;
    const i=save.loadout.indexOf(id); if(i>=0)save.loadout.splice(i,1); else save.loadout.push(id); persist(); renderEquip(); });
  el.querySelectorAll('[data-act="equip"]').forEach(b=>b.onclick=e=>{ e.stopPropagation(); const a=ABY[save.owned[+b.dataset.owned]];
    save.equip[a.slot]= save.equip[a.slot]===a.id?null:a.id; persist(); renderEquip(); });
}
function armorMini(a){ const col=a.slot==='head'?'#9fb6e0':(a.slot==='torso'?'#7fa0d8':'#9dffb0');
  if(a.slot==='head') return `<svg viewBox="0 0 24 24" fill="${col}33" stroke="${col}" stroke-width="1.5"><path d="M6 14a6 6 0 0 1 12 0v1H6z"/><path d="M5 15h14v2H5z"/></svg>`;
  if(a.slot==='torso') return `<svg viewBox="0 0 24 24" fill="${col}33" stroke="${col}" stroke-width="1.5"><path d="M8 5l4 2 4-2 2 3-2 2v7H8v-7L6 8z"/></svg>`;
  return `<svg viewBox="0 0 24 24" fill="${col}33" stroke="${col}" stroke-width="1.5"><path d="M8 5h4v8l5 2v3H7v-4z"/></svg>`; }
function statTags(a){ let t='<div class="stat-tags">';
  if(a.def)t+=`<span class="tag def">DEF +${a.def}</span>`;
  if(a.spd)t+=`<span class="tag spd">SPD ${a.spd>0?'+':''}${Math.round(a.spd*100)}%</span>`;
  if(a.jet)t+=`<span class="tag jet">JET ${a.jet>=2?'×2':'×1'}</span>`;
  return t+'</div>'; }

/* SHOP: ammo for unlocked weapons */
function renderShop(){ const el=document.getElementById('shopBody');
  let h='<div class="sect-h">弾薬ショップ（'+AMMO_BUNDLE+'発ずつ購入）</div><div class="grid">';
  WEAPONS.forEach(w=>{ if(w.id==='rail')return; const unlocked=save.unlocked.includes(w.id); const cost=AMMO_COST[w.id]*AMMO_BUNDLE;
    h+=`<div class="item" data-w="${w.id}">
      <div class="ihead"><span class="iic">${WICON[w.id]}</span><span class="inm">${w.name}</span></div>
      <div class="idesc">${w.sub}　所持:${save.ammo[w.id]||0}発</div>
      <button class="ibtn" data-act="buy" data-w="${w.id}" ${(!unlocked||save.coins<cost)?'disabled':''}>
        ${unlocked?('+'+AMMO_BUNDLE+'発  <span class="ci">'+COIN_ICON+'</span>'+cost):'Lv'+Object.keys(WEAPON_UNLOCK).find(k=>WEAPON_UNLOCK[k]===w.id)+'で解放'}</button>
    </div>`; });
  h+='</div><div class="tip" style="margin-top:12px">勝利・与ダメージでコインとXPを獲得。レベルアップで新武器が解放され、ここで弾を買えるようになる。</div>';
  el.innerHTML=h;
  el.querySelectorAll('[data-act="buy"]').forEach(b=>b.onclick=()=>{ const id=b.dataset.w, cost=AMMO_COST[id]*AMMO_BUNDLE;
    if(save.coins>=cost){ save.coins-=cost; save.ammo[id]=(save.ammo[id]||0)+AMMO_BUNDLE; persist(); sfxCoin(); renderMeta(); } });
}

/* GACHA: armor */
let gachaRolling=false;
function renderGacha(){ const el=document.getElementById('gachaBody');
  el.innerHTML=`<div class="gacha-stage">
    <div class="capsule" id="capsule"><span id="capIcon"><svg viewBox="0 0 24 24" fill="none" stroke="#7fa0d8" stroke-width="1.4"><path d="M12 3a6 6 0 0 1 6 6v3H6V9a6 6 0 0 1 6-6z" fill="#7fa0d822"/><rect x="5" y="12" width="14" height="8" rx="3" fill="#3a4f7a33"/><path d="M5 14h14"/></svg></span></div>
    <div class="gacha-result" id="gachaResult">防具ガチャ ／ 1回 ${GACHA_COST}¢</div>
    <button class="roll-btn" id="rollBtn" ${save.coins<GACHA_COST?'disabled':''}>ROLL <span class="ci">${COIN_ICON}</span>${GACHA_COST}</button>
    <div class="tip">頭・胴・脚パーツが排出。レアほど防御力やジェットなどの効果が強い。装備タブで装着。</div>
  </div>`;
  const btn=document.getElementById('rollBtn');
  btn.onclick=()=>{ if(gachaRolling||save.coins<GACHA_COST)return; gachaRolling=true; save.coins-=GACHA_COST; persist(); updateCoinHud();
    document.getElementById('coinText').textContent=save.coins;
    const cap=document.getElementById('capsule'); cap.classList.add('rolling'); btn.disabled=true;
    document.getElementById('gachaResult').textContent='...';
    beep(440,.1,'square',.12,660);
    setTimeout(()=>{ const a=rollGacha(); save.owned.push(a.id); persist();
      cap.classList.remove('rolling'); document.getElementById('capIcon').innerHTML=armorMini(a);
      const rc={N:'#8aa0c0',R:'#56b8ff',SR:'#c98cff',UR:'#ffd45e'}[a.rar];
      document.getElementById('gachaResult').innerHTML=`<span style="color:${rc}">[${a.rar}] ${a.name}</span>`;
      if(a.rar==='UR'||a.rar==='SR'){ beep(880,.12,'square',.16,1320); setTimeout(()=>beep(1320,.16,'square',.16,1760),110); } else sfxCoin();
      gachaRolling=false; btn.disabled=save.coins<GACHA_COST; document.getElementById('coinText').textContent=save.coins; renderMeta();
    },900);
  };
}

fitCanvas(); genTerrain(); robots=[makeRobot(W*0.16,0),makeRobot(W*0.84,1)]; buildWeaponUI();
